<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metamorphosis in Motion</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #222;
        }
        canvas {
            border: none;
            display: block;
        }
        .archive-link {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #efefef;
            text-decoration: none;
            font-family: 'Courier New', Courier, monospace;
            background-color: rgba(30, 30, 30, 0.7);
            padding: 8px 15px;
            border-radius: 8px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
</head>
<body>
    <script>
        let t = 0;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            noFill();
            strokeWeight(2);
        }

        function draw() {
            background(34);
            translate(width / 2, height / 2);
            stroke(255, 100, 150, 150);
            
            for (let i = 0; i < 30; i++) {
                let angle = map(i, 0, 30, 0, TWO_PI);
                let x = map(sin(t + angle), -1, 1, 0, width / 4);
                let y = map(cos(t - angle), -1, 1, 0, height / 4);
                ellipse(x * cos(angle), y * sin(angle), 50, 50);
            }

            t += 0.02;
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
    <a class="archive-link" href="https://www.beautyisapattern.com/archive">Explore the Archive</a>
</body>
</html>
