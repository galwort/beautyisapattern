<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transformative Thoughts</title>
<link rel="icon" type="image/x-icon" href="https://www.beautyisapattern.com/favicon.ico">
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
<style>
  body {
    margin: 0;
    overflow: hidden;
  }
  a {
    position: absolute;
    right: 10px;
    bottom: 10px;
    z-index: 10;
    color: white;
    text-decoration: none;
    font-family: Arial, sans-serif;
    background: rgba(0, 0, 0, 0.5);
    padding: 5px 10px;
    border-radius: 5px;
  }
</style>
</head>
<body>

<a href="https://www.beautyisapattern.com/archive" target="_blank">Visit Archive</a>

<script>
  let angle = 0;

  function setup() {
    createCanvas(windowWidth, windowHeight);
    noStroke();
    frameRate(30);
  }

  function draw() {
    background(20, 30, 40);

    // Dynamic transformation factor based on the frame count
    let transformFactor = (sin(angle) + 1.5) * 150; 
    let centerX = width / 2;
    let centerY = height / 2;

    // Create moving circles influenced by sine and cosine waves
    for (let i = 0; i < 8; i++) {
      let offsetX = transformFactor * cos(angle + i);
      let offsetY = transformFactor * sin(angle + i);

      let r = map(cos(angle + i), -1, 1, 50, 255);
      let g = map(sin(angle + i), -1, 1, 50, 255);
      let b = 255 - (r + g) / 2; // Complementary color to balance

      fill(r, g, b, 150);

      // Draw circles with trail effect
      ellipse(centerX + offsetX, centerY + offsetY, 80, 80);
      ellipse(centerX - offsetX, centerY - offsetY, 80, 80);
    }

    angle += 0.03; // Increment angle for animation
  }

  function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
  }
</script>

</body>
</html>
