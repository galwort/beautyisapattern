<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rediscovering the Essence</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" />
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: #0d0d0d;
        color: #fff;
        font-family: 'Verdana', sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      a {
        color: #b2b2ff;
        text-decoration: none;
        position: absolute;
        bottom: 20px;
      }
    </style>
  </head>
  <body>
    <a href="https://www.beautyisapattern.com/archive" target="_blank">Visit the Thoughts Archive</a>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
      let waves = [];
      let maxWaves = 6;

      function setup() {
        createCanvas(windowWidth, windowHeight);
        for (let i = 0; i < maxWaves; i++) {
          waves.push(new Wave());
        }
      }

      function draw() {
        background(13, 13, 13, 90);
        for (let wave of waves) {
          wave.update();
          wave.display();
        }
      }

      class Wave {
        constructor() {
          this.amplitude = random(20, 50);
          this.wavelength = random(80, 150);
          this.offset = random(TWO_PI);
          this.yOffset = random(height);
        }

        update() {
          this.offset += 0.02;
        }

        display() {
          noFill();
          stroke(255, 150);
          strokeWeight(2);
          beginShape();

          for (let x = 0; x < width; x += 5) {
            let angle = map(x, 0, width, 0, TWO_PI);
            let y = this.amplitude * sin(angle + this.offset);
            vertex(x, this.yOffset + y);
          }
          endShape();
        }
      }

      function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
      }
    </script>
  </body>
</html>
