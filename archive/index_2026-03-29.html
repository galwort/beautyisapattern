<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winds of Wisdom</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #edf6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .archive-link {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #585858;
            font-family: Arial, sans-serif;
            font-size: 0.9em;
            text-decoration: none;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 5px 10px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .archive-link:hover {
            background-color: rgba(208, 216, 220, 0.8);
        }
    </style>
</head>
<body>
    <script>
        let particles = [];
        let colors = ['rgba(21, 101, 192, 0.6)', 'rgba(255, 165, 0, 0.6)', 'rgba(76, 175, 80, 0.6)', 'rgba(156, 39, 176, 0.6)'];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < 100; i++) {
                particles.push(new WisdomParticle(random(width), random(height)));
            }
        }

        function draw() {
            background(237, 246, 249, 100);
            particles.forEach(particle => {
                particle.move();
                particle.connect(particles);
                particle.display();
            });
        }

        class WisdomParticle {
            constructor(x, y) {
                this.position = createVector(x, y);
                this.velocity = p5.Vector.random2D();
                this.velocity.setMag(random(0.5, 2));
                this.radius = random(4, 12);
                this.color = random(colors);
                this.isOffScreen = false;
            }

            move() {
                this.position.add(this.velocity);
                this.wrapEdges();
            }

            wrapEdges() {
                if (this.position.x > width) this.position.x = 0;
                if (this.position.x < 0) this.position.x = width;
                if (this.position.y > height) this.position.y = 0;
                if (this.position.y < 0) this.position.y = height;
            }

            connect(particles) {
                particles.forEach(particle => {
                    let distance = dist(this.position.x, this.position.y, particle.position.x, particle.position.y);
                    if (distance < 100) {
                        stroke(85, 85, 85, map(distance, 0, 100, 150, 0));
                        line(this.position.x, this.position.y, particle.position.x, particle.position.y);
                    }
                });
            }

            display() {
                noStroke();
                fill(this.color);
                ellipse(this.position.x, this.position.y, this.radius);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>

    <a href="https://www.beautyisapattern.com/archive" class="archive-link">Visit the Archive</a>
</body>
</html>
