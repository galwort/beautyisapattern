<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dance of the Willows</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f4f8;
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        a {
            position: absolute;
            bottom: 10px;
            left: 10px;
            text-decoration: none;
            color: #333;
            font-size: 14px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let trees = [];
        
        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < 5; i++) {
                trees.push(new Willow(random(width), height - 100));
            }
        }

        function draw() {
            background('#f0f4f8');
            for (let tree of trees) {
                tree.sway();
                tree.display();
            }
        }

        class Willow {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.angle = 0;
                this.length = random(100, 200);
                this.color = color(34, 139, 34, 150);
            }

            sway() {
                this.angle = sin((frameCount + this.x) * 0.01) * PI / 6; 
            }

            display() {
                push();
                translate(this.x, this.y);
                stroke(this.color);
                strokeWeight(8);
                for (let i = 0; i < 10; i++) {
                    push();
                    rotate(this.angle);
                    line(0, 0, 0, -this.length);
                    translate(0, -this.length);
                    if (i % 2 === 0) {
                        this.branch();
                    }
                    pop();
                }
                pop();
            }

            branch() {
                push();
                rotate(PI / 6);
                line(0, 0, -this.length / 3, 0);
                pop();
                push();
                rotate(-PI / 6);
                line(0, 0, this.length / 3, 0);
                pop();
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</head>
<body>
    <a href="https://www.beautyisapattern.com/archive">Explore the Archive</a>
</body>
</html>
