<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metamorphic Journey</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #archive-link {
            position: absolute;
            bottom: 10px;
            right: 10px;
            text-decoration: none;
            color: #fff;
            background-color: rgba(0,0,0,0.6);
            padding: 5px 10px;
            border-radius: 4px;
            transition: background-color 0.3s;
        }
        #archive-link:hover {
            background-color: rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

<a id="archive-link" href="https://www.beautyisapattern.com/archive">Visit the Archive</a>

<script>
    let butterflies = [];
    let flutterSpeed = 0.01;
    let colors = ['#FFA07A', '#FF6347', '#FFD700', '#EEE8AA'];
    let maxButterflies = 100;

    function setup() {
        createCanvas(windowWidth, windowHeight);
        for (let i = 0; i < maxButterflies; i++) {
            butterflies.push(new Butterfly(random(width), random(height), random(colors)));
        }
    }

    function draw() {
        background(50);
        for (let i = 0; i < butterflies.length; i++) {
            butterflies[i].update();
            butterflies[i].display();
        }
    }

    class Butterfly {
        constructor(x, y, clr) {
            this.x = x;
            this.y = y;
            this.color = clr;
            this.offset = random(TWO_PI);
            this.size = random(10, 60);
        }

        update() {
            this.x += sin(this.offset) * 2;
            this.y += cos(this.offset) * 2;
            this.offset += flutterSpeed;

            // Keep butterflies within screen bounds
            if (this.x > width) this.x = 0;
            if (this.x < 0) this.x = width;
            if (this.y > height) this.y = 0;
            if (this.y < 0) this.y = height;
        }

        display() {
            fill(this.color + '80');
            noStroke();
            push();
            translate(this.x, this.y);
            rotate(sin(frameCount * 0.02 + this.offset) * PI);
            ellipse(0, 0, this.size, this.size / 2);
            pop();
        }
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
    }
</script>

</body>
</html>
