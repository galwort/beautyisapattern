<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unwritten Narrations</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f0f0f0;
        }
        a {
            position: absolute;
            bottom: 10px;
            left: 10px;
            text-decoration: none;
            color: #2c3e50;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.1em;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let letters = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            textSize(24);
            noStroke();
            frameRate(24);
            textFont('Courier');
            createLetters();
        }

        function draw() {
            background(240);
            for (let i = 0; i < letters.length; i++) {
                letters[i].update();
                letters[i].display();
                
                // Remove letters that have faded out
                if (letters[i].alpha < 0) {
                    letters.splice(i, 1);
                    createLetters();  // Generate new letters continuously
                }
            }
        }

        function createLetters() {
            for (let i = 0; i < 100; i++) {
                letters.push(new Letter(random(width), random(height), random(200)));
            }
        }

        class Letter {
            constructor(x, y, lifespan) {
                this.x = x;
                this.y = y;
                this.alpha = 255;
                this.letter = String.fromCharCode(int(random(65, 90)));
                this.lifespan = lifespan;
            }

            update() {
                this.alpha -= 2;
                this.y -= 1;  // Letters float upwards
                if (this.lifespan <= 0) this.alpha -= 5;  // Quick fade after lifespan
                this.lifespan--;
            }

            display() {
                fill(44, 62, 80, this.alpha);
                text(this.letter, this.x, this.y);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            createLetters();  // Recreate letters to fit new canvas
        }

    </script>
</head>
<body>
    <a href="https://www.beautyisapattern.com/archive">Explore Patterns Archive</a>
</body>
</html>
