<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadows of Illusions</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
        .archive-link {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #fff;
            text-decoration: none;
            font-family: 'Arial', sans-serif;
            font-size: 14px;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 8px 12px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .archive-link:hover {
            background-color: rgba(50, 50, 50, 0.8);
        }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let illusions = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < 30; i++) {
                illusions.push(new Illusion(random(width), random(height), random(40, 100)));
            }
        }

        function draw() {
            background(20, 20, 30);
            illusions.forEach(illusion => {
                illusion.update();
                illusion.display();
            });
        }

        class Illusion {
            constructor(x, y, size) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.alpha = random(100, 255);
                this.angle = random(TWO_PI);
                this.speed = random(0.002, 0.008);
            }

            update() {
                this.angle += this.speed;
                this.x += cos(this.angle) * 0.5;
                this.y += sin(this.angle) * 0.5;
            }

            display() {
                fill(255, this.alpha / 2);
                noStroke();
                push();
                translate(this.x, this.y);
                rotate(this.angle);
                beginShape();
                for (let i = 0; i < TWO_PI; i += PI / 4) {
                    let xOff = cos(i) * this.size;
                    let yOff = sin(i) * this.size;
                    vertex(xOff, yOff);
                }
                endShape(CLOSE);
                pop();
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
    <a class="archive-link" href="https://www.beautyisapattern.com/archive" target="_blank">Explore the Archive</a>
</body>
</html>
