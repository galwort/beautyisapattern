<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Fickle Dance of Control</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #eae7dc;

        }
        a {
            margin-top: 20px;
            text-decoration: none;
            color: #3d5a80;
            font-family: 'Trebuchet MS', sans-serif;
            font-size: 1.2em;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let golfBall;

        function setup() {
            createCanvas(windowWidth, windowHeight - 80);
            golfBall = new GolfBall();
        }

        function draw() {
            background(234, 231, 220);
            golfBall.update();
            golfBall.display();

            // Simulate a club-like erratic path
            stroke(58, 50, 19);
            strokeWeight(3);
            noFill();
            beginShape();
            for (let a = 0; a < TWO_PI; a += 0.1) {
                let xoff = map(cos(a), -1, 1, 0, 5);
                let yoff = map(sin(a), -1, 1, 0, 5);
                let radius = map(noise(xoff, yoff, frameCount * 0.01), 0, 1, 50, 100);
                let x = width / 2 + radius * cos(a);
                let y = height / 2 + radius * sin(a);
                vertex(x, y);
            }
            endShape(CLOSE);
        }

        class GolfBall {
            constructor() {
                this.position = createVector(random(width), random(height));
                this.velocity = createVector();
                this.acceleration = createVector();
                this.r = 15;
            }

            update() {
                let maxForce = 0.2;
                this.acceleration = p5.Vector.random2D().mult(random(maxForce));
                this.velocity.add(this.acceleration);
                this.velocity.limit(2);
                this.position.add(this.velocity);

                this.wrapEdges();
            }

            wrapEdges() {
                if (this.position.x > width + this.r) this.position.x = -this.r;
                if (this.position.x < -this.r) this.position.x = width + this.r;
                if (this.position.y > height + this.r) this.position.y = -this.r;
                if (this.position.y < -this.r) this.position.y = height + this.r;
            }

            display() {
                noStroke();
                fill(130, 99, 56);
                ellipse(this.position.x, this.position.y, this.r * 2);
            }

        }
    </script>
</head>
<body>
    <canvas></canvas>
    <a href="https://www.beautyisapattern.com/archive">Explore the Archive</a>
</body>
</html>
