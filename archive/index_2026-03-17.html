<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worthwhile Journey</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle, #ff6f61, #000);
        }
        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            text-align: center;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 0;
        }
        footer a {
            color: #ffd36f;
            text-decoration: none;
            font-weight: bold;
        }
        footer a:hover {
            text-decoration: underline;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
</head>
<body>
    <script>
        let hearts = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            noStroke();
            for (let i = 0; i < 100; i++) {
                hearts.push(new Heart(random(width), random(height)));
            }
        }

        function draw() {
            background(0, 0, 0, 10);
            for (let heart of hearts) {
                heart.move();
                heart.display();
            }
        }

        class Heart {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.r = random(10, 25);
                this.xSpeed = random(-2, 2);
                this.ySpeed = random(-2, 2);
                this.hue = random(0, 255);
            }

            move() {
                this.x += this.xSpeed;
                this.y += this.ySpeed;

                if (this.x > width || this.x < 0) {
                    this.xSpeed *= -1;
                }
                if (this.y > height || this.y < 0) {
                    this.ySpeed *= -1;
                }
            }

            display() {
                fill(255, this.hue, 150, 150);
                beginShape();
                vertex(this.x, this.y);
                bezierVertex(this.x - this.r / 2, this.y - this.r / 2, 
                            this.x - this.r, this.y + this.r / 3, 
                            this.x, this.y + this.r);
                bezierVertex(this.x + this.r, this.y + this.r / 3, 
                            this.x + this.r / 2, this.y - this.r / 2, 
                            this.x, this.y);
                endShape(CLOSE);
            }
        }
    </script>
    <footer>
        <p>Explore the beauty in patterns: <a href="https://www.beautyisapattern.com/archive">Archive</a></p>
    </footer>
</body>
</html>
