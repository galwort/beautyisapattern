<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sailing into the Unknown</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0e3040;
        }
        #link-container {
            position: fixed;
            bottom: 10px;
            right: 10px;
            z-index: 10;
        }
        .archive-link {
            color: #ffcc00;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-size: 14px;
        }
        @import url('https://fonts.googleapis.com/css2?family=Raleway:wght@300&display=swap');
    </style>
</head>
<body>

<div id="link-container">
    <a href="https://www.beautyisapattern.com/archive" class="archive-link">Visit The Archive</a>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
<script>
    let waveVertices = [];
    
    function setup() {
        createCanvas(windowWidth, windowHeight);
        noStroke();
        generateWave();
    }

    function draw() {
        background(14, 48, 64, 90);

        // Wave animation
        fill(26, 89, 116, 150);
        beginShape();
        for (let i = 0; i < waveVertices.length; i++) {
            let x = waveVertices[i].x;
            let y = waveVertices[i].y + sin(TWO_PI * (i / 100.0 + frameCount * 0.02)) * 15;
            vertex(x, y);
        }
        vertex(width, height);
        vertex(0, height);
        endShape(CLOSE);

        // Ship
        fill(180, 80, 40);
        let shipX = width / 2;
        let shipY = height / 2 + sin(frameCount * 0.03) * 20;
        rectMode(CENTER);
        rect(shipX, shipY, 60, 10);

        // Sail
        fill(255);
        triangle(shipX, shipY - 30, shipX - 20, shipY, shipX + 20, shipY);

        // Mast
        stroke(180, 80, 40);
        strokeWeight(2);
        line(shipX, shipY - 30, shipX, shipY);
    }

    function generateWave() {
        for (let x = 0; x <= width + 100; x += 10) {
            waveVertices.push(createVector(x, height * 0.7));
        }
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
        waveVertices = [];
        generateWave();
    }
</script>

</body>
</html>
