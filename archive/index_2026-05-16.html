<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Journey Within</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #archive-link {
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-family: 'Arial', sans-serif;
        }
        #archive-link a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <script>

    let paths = [];
    
    function setup() {
        createCanvas(windowWidth, windowHeight);
        
        // Generate multiple flowing paths
        for (let i = 0; i < 10; i++) {
            paths.push(new FlowingPath(random(width), random(height)));
        }

        strokeWeight(2);
    }

    function draw() {
        background(26, 26, 26);

        // Display and animate each path
        for (let path of paths) {
            path.display();
            path.update();
        }
    }

    class FlowingPath {
        constructor(x, y) {
            this.origin = createVector(x, y);
            this.points = [];
            this.numPoints = 50;
            this.direction = random(TWO_PI);

            // Initialize path points
            for (let i = 0; i < this.numPoints; i++) {
                let angle = noise(i * 0.1, y * 0.01) * TWO_PI;
                this.points.push(p5.Vector.fromAngle(angle).mult(i * 5));
            }
        }

        update() {
            this.direction += 0.01;

            // Update each point to simulate organic movement
            for (let i = 0; i < this.points.length; i++) {
                let angle = noise(this.points[i].x * 0.01, this.points[i].y * 0.01) * TWO_PI + this.direction;
                this.points[i].add(p5.Vector.fromAngle(angle).mult(0.5));
            }
        }

        display() {
            push();
            translate(this.origin.x, this.origin.y);

            // Draw the path
            beginShape();
            stroke(255);
            noFill();
            for (let point of this.points) {
                vertex(point.x, point.y);
            }
            endShape();

            pop();
        }
    }

    </script>

    <div id="archive-link">
        <a href="https://www.beautyisapattern.com/archive">Explore the archive</a>
    </div>

</body>
</html>
