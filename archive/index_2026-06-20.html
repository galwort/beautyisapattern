<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagined Realities</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
        body, html {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(45deg, #ece9e6, #ffffff);
        }
        a {
            position: fixed;
            bottom: 20px;
            right: 20px;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-size: 14px;
            color: #555;
            background: rgba(255, 255, 255, 0.8);
            padding: 5px 10px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            transition: background 0.3s, color 0.3s;
        }
        a:hover {
            background: #555;
            color: #fff;
        }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let colors;
        let angle = 0;
        
        function setup() {
            createCanvas(windowWidth, windowHeight);
            colors = [
                color(255, 204, 204, 150),
                color(204, 255, 204, 150),
                color(204, 204, 255, 150)
            ];
            noStroke();
            frameRate(30);
        }

        function draw() {
            background(0, 15);
            translate(width / 2, height / 2);
            let t = frameCount * 0.02;

            // Beauty: Draw rotating arcs
            push();
            for (let i = 0; i < 6; i++) {
                fill(colors[i % colors.length]);
                arc(0, 0, 250, 250, angle + i*PI/3, angle + i*PI/3 + PI/12);
            }
            pop();

            // Justice: Draw rotating cubes
            for (let i = 0; i < TWO_PI; i += PI / 6) {
                let x = cos(i + angle) * 150;
                let y = sin(i + angle) * 150;
                push();
                translate(x, y);
                fill(colors[(int(i / PI)) % colors.length]);
                rotate(angle);
                rect(0, 0, 30, 30);
                pop();
            }

            // Happiness: Draw circles pulsating
            for (let i = 0; i < TWO_PI; i += PI / 6) {
                let x = cos(i + angle) * 250;
                let y = sin(i + angle) * 250;
                push();
                translate(x, y);
                fill(colors[(int(i / PI)) % colors.length]);
                ellipse(0, 0, 20 + 10 * sin(t + i));
                pop();
            }

            angle += 0.02;
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
    <a href="https://www.beautyisapattern.com/archive">Explore More</a>
</body>
</html>
