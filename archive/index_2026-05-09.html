<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celebrate Your True Colors</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #111;
        }
        a {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #fff;
            text-decoration: none;
            font-family: Arial, sans-serif;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let shapes = [];
        const shapeCount = 200;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < shapeCount; i++) {
                shapes.push(new Shape(random(width), random(height)));
            }
        }

        function draw() {
            background(17, 17, 17, 20);
            for (let shape of shapes) {
                shape.move();
                shape.bounce();
                shape.display();
            }
        }

        class Shape {
            constructor(x, y) {
                this.pos = createVector(x, y);
                this.vel = createVector(random(-2, 2), random(-2, 2));
                this.acc = createVector(0, 0);
                this.size = random(15, 30);
                this.hue = random(360);
            }

            move() {
                this.vel.add(this.acc);
                this.pos.add(this.vel);
                this.acc.mult(0);
            }

            bounce() {
                if (this.pos.x > width || this.pos.x < 0) {
                    this.vel.x *= -1;
                }
                if (this.pos.y > height || this.pos.y < 0) {
                    this.vel.y *= -1;
                }
            }

            display() {
                colorMode(HSB, 360, 100, 100, 1);
                noStroke();
                fill(this.hue, 100, 100, 0.6);
                ellipse(this.pos.x, this.pos.y, this.size);

                // Change hue over time
                this.hue = (this.hue + 1) % 360;
            }
        }
    </script>
</head>
<body>
    <a href="https://www.beautyisapattern.com/archive">Explore the Archive</a>
</body>
</html>
