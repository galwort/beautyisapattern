<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmony in Togetherness</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f5f5f5;
        }

        #archive-link {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-family: Arial, sans-serif;
            font-size: 14px;
            text-decoration: none;
            color: #104E8B;
        }
    </style>
</head>
<body>
    <script>
        let particles = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle());
            }
        }

        function draw() {
            background('#f5f5f5', 100);
            for (let particle of particles) {
                particle.update();
                particle.display();
            }
        }

        class Particle {
            constructor() {
                this.position = createVector(random(width), random(height));
                this.velocity = createVector(random(-2, 2), random(-2, 2));
                this.size = random(5, 15);
                this.color = color(random(50, 255), random(50, 255), random(50, 255), 150);
            }

            update() {
                this.position.add(this.velocity);
                if (this.position.x < 0 || this.position.x > width) this.velocity.x *= -1;
                if (this.position.y < 0 || this.position.y > height) this.velocity.y *= -1;
            }

            display() {
                fill(this.color);
                noStroke();
                ellipse(this.position.x, this.position.y, this.size);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
    <a id="archive-link" href="https://www.beautyisapattern.com/archive" target="_blank">Explore More Patterns</a>
</body>
</html>
