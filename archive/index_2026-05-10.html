<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art of Perseverance</title>
    <link rel="icon" type="image/x-icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body {
            margin: 0;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        a {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 16px;
            text-decoration: none;
            color: #333;
            background: rgba(255, 255, 255, 0.8);
            padding: 5px 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            transition: background 0.3s ease;
        }
        a:hover {
            background: rgba(0, 0, 0, 0.1);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let points = [];
        let mult = 0.005;
        
        function setup() {
            createCanvas(windowWidth, windowHeight);
            background(240, 244, 248);
            
            // Generate random points
            for (let i = 0; i < 1500; i++) {
                points.push(createVector(random(width), random(height)));
            }
        }

        function draw() {
            noFill();
            strokeWeight(0.5);
            stroke(30, 50, 180, 150);
            
            for (let i = 0; i < points.length; i++) {
                let v = points[i];
                
                // Generate noise-based velocity
                let angle = noise(v.x * mult, v.y * mult) * TAU;
                let velocity = p5.Vector.fromAngle(angle);
                
                v.add(velocity);
                ellipse(v.x, v.y, 1);

                // Wrap-around the edges
                if (v.x > width) v.x = 0;
                if (v.x < 0) v.x = width;
                if (v.y > height) v.y = 0;
                if (v.y < 0) v.y = height;
            }
        }
    </script>
</head>
<body>
    <a href="https://www.beautyisapattern.com/archive">Explore the Archive</a>
</body>
</html>
