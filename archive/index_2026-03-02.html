<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unexpected Paths</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #e0f7fa;
            overflow: hidden;
        }
        #archive {
            position: absolute;
            bottom: 15px;
            right: 15px;
            color: #006064;
            font-size: 1.1em;
            text-decoration: none;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 7px 12px;
            border-radius: 8px;
        }
        #archive:hover {
            background-color: rgba(255, 255, 255, 1);
        }
    </style>
</head>
<body>

    <a id="archive" href="https://www.beautyisapattern.com/archive">Explore Archive</a>

    <script>
        let particles = [];
        let numParticles = 200;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < numParticles; i++) {
                particles.push(new Particle(random(width), random(height)));
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            particles = [];
            for (let i = 0; i < numParticles; i++) {
                particles.push(new Particle(random(width), random(height)));
            }
        }

        function draw() {
            noStroke();
            fill(224, 247, 250, 30);
            rect(0, 0, width, height);
            for (let particle of particles) {
                particle.update();
                particle.wrapAround();
                particle.display();
            }
        }

        class Particle {
            constructor(x, y) {
                this.pos = createVector(x, y);
                this.vel = createVector(random(-2, 2), random(-2, 2));
                this.acc = createVector(0, 0);
                this.maxSpeed = 2;
                this.size = random(10, 20);
                this.color = color(random(0, 255), random(100, 255), random(150, 255), 150);
            }

            update() {
                let randomFactor = p5.Vector.random2D();
                this.acc.add(randomFactor);
                this.vel.add(this.acc);
                this.vel.limit(this.maxSpeed);
                this.pos.add(this.vel);
                this.acc.mult(0);
            }

            wrapAround() {
                if (this.pos.x > width) this.pos.x = 0;
                if (this.pos.x < 0) this.pos.x = width;
                if (this.pos.y > height) this.pos.y = 0;
                if (this.pos.y < 0) this.pos.y = height;
            }

            display() {
                fill(this.color);
                ellipse(this.pos.x, this.pos.y, this.size);
            }
        }
    </script>
</body>
</html>
