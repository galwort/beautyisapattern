<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Dreams, Quiet Joys</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #2d3e50;
        }

        a {
            position: fixed;
            bottom: 10px;
            right: 10px;
            color: white;
            text-decoration: none;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 10px 15px;
            border-radius: 10px;
            font-family: 'Courier New', Courier, monospace;
            transition: background-color 0.3s ease;
        }

        a:hover {
            background-color: rgba(255, 255, 255, 0.6);
        }

        canvas {
            display: block;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
</head>
<body>
    <script>
        let angle = 0;
        let colorOffset = 0;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            noStroke();
            ellipseMode(RADIUS);
        }

        function draw() {
            background(20, 30, 50);

            let maxR = min(width, height) * 0.35;
            let orbiterRadius = 10;

            // Gradient background orbs
            for (let i = 0; i < 100; i++) {
                let x = random(width);
                let y = random(height);
                let rs = random(40, 70);
                let col = color(100 + 155*sin(i + colorOffset),
                                150 + 105*cos(i + colorOffset),
                                200 - 140*sin(i + i/10 - colorOffset/2));
                fill(col);
                ellipse(x, y, rs, rs);
            }

            // Central pulsating orb
            let bigRadius = maxR + sin(angle) * 30;
            fill(255, 100, 150, 180);
            ellipse(width / 2, height / 2, bigRadius);

            // Orbiting small orbits
            let orbiters = 12;
            for (let i = 0; i < orbiters; i++) {
                let theta = TWO_PI / orbiters * i + angle;
                let x = width / 2 + cos(theta) * bigRadius;
                let y = height / 2 + sin(theta) * bigRadius;
                let oCol = color(255, 240, 220, 200 + 55 * sin(angle));
                fill(oCol);
                ellipse(x, y, orbiterRadius);
            }

            angle += 0.01;
            colorOffset += 0.01;
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
    <a href="https://www.beautyisapattern.com/archive" target="_blank">Visit the Archive</a>
</body>
</html>
