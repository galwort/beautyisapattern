<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balance in Equanimity</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .archive-link {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #fff;
            text-decoration: none;
            background-color: #444;
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 0.9em;
            transition: background-color 0.3s ease;
        }
        .archive-link:hover {
            background-color: #666;
        }
    </style>
</head>
<body>
    <div>
        <a href="https://www.beautyisapattern.com/archive" target="_blank" class="archive-link">Visit Archive</a>
    </div>
    <script>
        const NUM_PARTICLES = 150;
        let particles = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < NUM_PARTICLES; i++) {
                particles.push(new Particle(random(width), random(height), random(5, 15)));
            }
        }

        function draw() {
            background(17, 17, 17, 80);
            for (let particle of particles) {
                particle.update();
                particle.connect(particles);
                particle.display();
            }
        }

        class Particle {
            constructor(x, y, r) {
                this.x = x;
                this.y = y;
                this.r = r;
                this.speed = createVector(random(-1.5, 1.5), random(-1.5, 1.5));
                this.color = [random(100, 255), random(100, 255), random(100, 255), 150];
            }

            update() {
                this.x += this.speed.x;
                this.y += this.speed.y;
                this.borders();
            }

            borders() {
                if (this.x < 0 || this.x > width) this.speed.x *= -1;
                if (this.y < 0 || this.y > height) this.speed.y *= -1;
            }

            connect(others) {
                for (let other of others) {
                    let distBetween = dist(this.x, this.y, other.x, other.y);
                    if (distBetween < 100) {
                        stroke(255, 255, 254, map(distBetween, 0, 100, 255, 50));
                        line(this.x, this.y, other.x, other.y);
                    }
                }
            }

            display() {
                noStroke();
                fill(this.color);
                ellipse(this.x, this.y, this.r * 2);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
