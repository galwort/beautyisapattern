<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faithful Companions</title>
    <link rel="icon" type="image/x-icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #e6eaf0;
        }
        a {
            position: absolute;
            bottom: 20px;
            right: 20px;
            text-decoration: none;
            color: #333;
            font-size: 14px;
            background-color: #fff;
            padding: 5px 10px;
            border-radius: 5px;
            box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.2);
            transition: background-color 0.3s;
        }
        a:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        function setup() {
            createCanvas(windowWidth, windowHeight);
            noStroke();
        }

        function draw() {
            background(230, 234, 240);

            // Animation representing "an old wife"
            drawEternalLoop(width / 2, height / 2, sin(frameCount * 0.02) * 50 + 100, color(190, 100, 160, 100));

            // Animation representing "an old dog"
            drawBouncingBall(width / 4, height, width / 2, color(139, 69, 19, 200));

            // Animation representing "ready money"
            drawGrowingLines(frameCount);
        }

        function drawEternalLoop(x, y, radius, col) {
            fill(col);
            for (let i = 0; i < TWO_PI; i += PI / 12) {
                ellipse(x + cos(i) * radius, y + sin(i) * radius, 15);
            }
        }

        function drawBouncingBall(startX, startY, amplitude, col) {
            fill(col);
            let x = startX + sin(frameCount * 0.05) * amplitude;
            let y = startY - abs(sin(frameCount * 0.05)) * (height / 4);
            ellipse(x, y, 30, 30);
        }

        function drawGrowingLines(time) {
            push();
            translate(width * 3 / 4, height / 3);
            stroke(255, 223, 0, 150);
            for (let i = 0; i < 10; i++) {
                line(i * 15, 0, i * 15, cos(time * 0.02 + i) * 50 + 50);
            }
            pop();
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>

    <a href="https://www.beautyisapattern.com/archive">Explore the Archive</a>
</body>
</html>
