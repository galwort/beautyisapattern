<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winding Paths Over Mountains</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f0f8ff;
        }
        .archive-link {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-family: "Arial", sans-serif;
            text-decoration: none;
            color: #6A5ACD;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <script>
        let xoff = 0;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            noFill();
        }

        function draw() {
            background('#f0f8ff');
            stroke('#6A5ACD');
            strokeWeight(2);

            for (let y = height; y > 0; y -= 50) {
                beginShape();
                
                for (let x = 0; x <= width; x += 10) {
                    let xOffset = xoff + x * 0.02;
                    let yNoise = noise(xOffset) * 60;
                    curveVertex(x, y - yNoise);
                }
                endShape();
            }

            // Increment xoff to animate noise
            xoff += 0.03;
        }
    </script>
    <a href="https://www.beautyisapattern.com/archive" class="archive-link">Explore the Archive</a>
</body>
</html>
