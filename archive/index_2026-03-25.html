<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Visual Representation of Nature's Path">
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <title>Nature's Guiding Path</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #1b232a;
        }

        a {
            position: absolute;
            bottom: 10px;
            right: 10px;
            text-decoration: none;
            color: #cfd2d6;
            font-family: Arial, sans-serif;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        a:hover {
            color: #f8b400;
        }
    </style>
</head>
<body>

<script>
    let dots = [];

    function setup() {
        createCanvas(windowWidth, windowHeight);
        for (let i = 0; i < 100; i++) {
            dots.push(new Dot(random(width), random(height), random(1, 4)));
        }
    }

    function draw() {
        background(27, 35, 42, 50);
        for (let dot of dots) {
            dot.move();
            dot.display();
        }
    }

    class Dot {
        constructor(x, y, r) {
            this.x = x;
            this.y = y;
            this.r = r; // radius
            this.angle = random(TWO_PI);
            this.speed = random(0.5, 1.5);
        }

        move() {
            this.angle += noise(this.x * 0.01, this.y * 0.01) * 0.1;
            this.x += cos(this.angle) * this.speed;
            this.y += sin(this.angle) * this.speed;

            // Bounce back from edges
            if (this.x < 0) this.x = width;
            if (this.x > width) this.x = 0;
            if (this.y < 0) this.y = height;
            if (this.y > height) this.y = 0;
        }

        display() {
            noStroke();
            fill(248, 180, 0, 150);
            ellipse(this.x, this.y, this.r * 2, this.r * 2);
        }
    }

</script>

<a href="https://www.beautyisapattern.com/archive" target="_blank">Explore the Archive</a>

</body>
</html>
