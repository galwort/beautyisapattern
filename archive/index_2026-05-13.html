<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inquiry and Insight</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #f0f8ff, #e6e6fa);
            font-family: 'Open Sans', sans-serif;
        }
        #archive-link {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #4a4a4a;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.min.js"></script>
    <script>
        let numCircles = 150;
        let circles = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < numCircles; i++) {
                circles.push(new Circle(random(width), random(height), random(1, 4)));
            }
            noStroke();
        }

        function draw() {
            background(240);

            circles.forEach(circle => {
                circle.update();
                circle.display();
            });
        }

        class Circle {
            constructor(x, y, s) {
                this.pos = createVector(x, y);
                this.size = s;
                this.angle = random(TWO_PI);
                this.speed = random(0.001, 0.005);
            }

            update() {
                this.angle += this.speed;
                this.pos.x = width / 2 + cos(this.angle) * (noise(this.angle) * (width / 2));
                this.pos.y = height / 2 + sin(this.angle) * (noise(this.angle) * (height / 2));
            }

            display() {
                fill(`rgba(150, 180, 255, 0.${floor(random(1, 10))})`);
                ellipse(this.pos.x, this.pos.y, this.size * 5, this.size * 5);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>

    <a id="archive-link" href="https://www.beautyisapattern.com/archive">Visit Archive</a>

</body>
</html>
