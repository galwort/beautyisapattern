<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Evolution</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1d1f20;
            font-family: 'Arial', sans-serif;
        }
        .archive-link {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #ffffff;
            font-size: 14px;
            text-decoration: none;
        }
        .archive-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let shapes = [];
        let t = 0;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            noStroke();
        }

        function draw() {
            background(29, 31, 32, 25);

            // Display animated shapes inspired by calculator, typewriter letter, TV, and brochures
            drawCalculatorShapes();
            drawTypewriterLetters();
            drawTVGraphics();
            drawBrochureSpread();

            t += 0.01;
        }

        function drawCalculatorShapes() {
            let x = map(noise(t), 0, 1, 0, width);
            let y = map(noise(t + 100), 0, 1, 0, height);
            let size = (sin(t * 5) + 1) * 10;
            fill(245, 130, 49, 150);
            rect(x, y, size, size);
        }

        function drawTypewriterLetters() {
            fill(255, 206, 150, 150);
            let maxLetters = 50;
            for (let i = 0; i < maxLetters; i++) {
                let x = i * width / maxLetters;
                let y = height / 2 + sin(t * 2 + i) * 50;
                ellipse(x, y, 5, 5);
            }
        }

        function drawTVGraphics() {
            let x = width/2 + cos(t) * 200;
            let y = height/2 + sin(t) * 200;
            fill(52, 152, 219, 150);
            beginShape();
            vertex(width / 2, height / 2);
            vertex(x, y);
            vertex(width / 2 + 50, height/2);
            endShape(CLOSE);
        }

        function drawBrochureSpread() {
            let xOffset = cos(t) * 100;
            let yOffset = sin(t) * 100;
            fill(162, 217, 206, 120);
            triangle(width/2 - xOffset, height/2, width/2, height/2 - yOffset, width/2 + xOffset, height/2);
        }

    </script>
    <a href="https://www.beautyisapattern.com/archive" class="archive-link">Explore Archive</a>
</body>
</html>
