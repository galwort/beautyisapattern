<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timely Repair</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1d1f21;
        }

        .link-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
        }

        .archive-link {
            color: #f5f5f5;
            text-decoration: none;
            font-family: 'Arial', sans-serif;
            font-size: 14px;
            background: #333;
            padding: 8px 12px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            transition: background 0.3s ease;
        }

        .archive-link:hover {
            background: #444;
        }

    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
</head>
<body>

<div class="link-container">
    <a href="https://www.beautyisapattern.com/archive" class="archive-link">Explore the Archive</a>
</div>

<script>
    let shapes = [];

    function setup() {
        createCanvas(windowWidth, windowHeight);
        for (let i = 0; i < 200; i++) {
            shapes.push(new AnimatedShape());
        }
    }

    function draw() {
        background(29, 31, 33, 20);  // semi-transparent background for trailing effect

        for (let i = shapes.length - 1; i >= 0; i--) {
            shapes[i].update();
            shapes[i].display();

            // Remove small shapes to simulate decay
            if (shapes[i].isTooSmall()) {
                shapes.splice(i, 1);
            }
        }

        // Constantly add new shapes to simulate the need for repair
        while (shapes.length < 200) {
            shapes.push(new AnimatedShape());
        }
    }

    class AnimatedShape {
        constructor() {
            this.x = random(width);
            this.y = random(height);
            this.color = [random(150, 250), random(100, 200), random(200, 255)];
            this.size = random(20, 50);
            this.speedX = random(-1, 1);
            this.speedY = random(-1, 1);
            this.decrement = 0.2;
        }

        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.size -= this.decrement;
            if (this.x > width || this.x < 0) this.speedX *= -1;
            if (this.y > height || this.y < 0) this.speedY *= -1;
        }

        display() {
            noStroke();
            fill(this.color[0], this.color[1], this.color[2], 150);
            ellipse(this.x, this.y, this.size);
        }

        isTooSmall() {
            return this.size < 5;
        }
    }
</script>

</body>
</html>
