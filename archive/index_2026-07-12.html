<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Essence of Individuality</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            color: #ffffff;
        }
        a {
            color: #9e9e9e;
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 12px;
            text-decoration: none;
            transition: color 0.3s;
        }
        a:hover {
            color: #ffffff;
            cursor: pointer;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        function setup() {
            createCanvas(windowWidth, windowHeight);
            noStroke();
        }

        function draw() {
            background(26, 26, 26, 100);
            translate(width / 2, height / 2);

            let t = millis() / 1000;
            let radius = min(width, height) / 4;

            // Draw main circle
            fill(255);
            ellipse(radius * cos(t), radius * sin(t), 20);

            // Draw shadow circles
            fill(153, 153, 153, 150);
            for (let i = 0; i < 5; i++) {
                let offset = map(i, 0, 5, 0, radius / 2);
                ellipse(radius * cos(t + offset), radius * sin(t + offset), 10);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</head>
<body>
    <a href="https://www.beautyisapattern.com/archive">Visit the Archive</a>
</body>
</html>
