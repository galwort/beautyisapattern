<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dance of Silent Words</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f6f6f6;
        }
        .archive-link {
            position: absolute;
            left: 20px;
            bottom: 20px;
            text-decoration: none;
            color: #333;
            font-family: 'Arial', sans-serif;
            font-size: 15px;
            transition: color 0.3s;
        }
        .archive-link:hover {
            color: #555;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.4.0/lib/p5.js"></script>
</head>
<body>

<script>
    let particles = [];
    const numParticles = 50;
    
    function setup() {
        createCanvas(windowWidth, windowHeight);
        for (let i = 0; i < numParticles; i++) {
            particles.push(new Particle(random(width), random(height)));
        }
    }

    function draw() {
        clear();
        for (let p of particles) {
            p.move();
            p.show();
        }
    }

    class Particle {
        constructor(x, y) {
            this.pos = createVector(x, y);
            this.vel = p5.Vector.random2D().mult(random(1, 3));
            this.acc = createVector();
            this.radius = random(3, 10);
        }

        move() {
            this.pos.add(this.vel);
            this.edgeWrap();
            this.vel.add(this.acc);
            this.acc.mult(0);
        }

        show() {
            stroke(255, 150);
            strokeWeight(2);
            fill(34, 32, 52, 150);
            ellipse(this.pos.x, this.pos.y, this.radius * 2);
        }

        edgeWrap() {
            if (this.pos.x > width) this.pos.x = 0;
            if (this.pos.x < 0) this.pos.x = width;
            if (this.pos.y > height) this.pos.y = 0;
            if (this.pos.y < 0) this.pos.y = height;
        }
    }
</script>

<a href="https://www.beautyisapattern.com/archive" class="archive-link">Explore Our Archive</a>

</body>
</html>
