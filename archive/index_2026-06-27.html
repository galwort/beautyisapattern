<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Spirit of Perseverance</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1b1b2f;
            color: white;
            font-family: 'Helvetica', sans-serif;
        }

        .link {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 14px;
        }

        a {
            color: #e94560;
            text-decoration: none;
        }
    </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
<script>
    let angle = 0;
    const radius = 200;
    const particleCount = 200;
    let particles = [];

    function setup() {
        createCanvas(windowWidth, windowHeight);
        for (let i = 0; i < particleCount; i++) {
            let p = createVector(random(width), random(height));
            particles.push(p);
        }
    }

    function draw() {
        background(27, 27, 47, 25);
        noStroke();

        // Dynamic pulsing center representing success
        fill(233, 69, 96, 200);
        ellipse(width / 2, height / 2, radius + sin(angle) * 30, radius + sin(angle) * 30);
        angle += 0.05;

        // Radiating circles symbolizing continuation
        fill(255, 255, 255, 100);
        for (let i = 0; i < particles.length; i++) {
            let x = particles[i].x + sin(angle + i) * 50;
            let y = particles[i].y + cos(angle + i) * 50;
            ellipse(x, y, 5, 5);

            particles[i].x += cos(angle + i) * 0.5;
            particles[i].y += sin(angle + i) * 0.5;
            if (particles[i].x > width) particles[i].x = 0;
            if (particles[i].y > height) particles[i].y = 0;
            if (particles[i].x < 0) particles[i].x = width;
            if (particles[i].y < 0) particles[i].y = height;
        }
    }
</script>

<div class="link">
    <a href="https://www.beautyisapattern.com/archive">Visit the Archive</a>
</div>

</body>
</html>
