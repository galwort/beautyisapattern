<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essence of Simplicity</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #fbfbfb;
            overflow: hidden;
        }
        a {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #555;
            text-decoration: none;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>

    <script>
        let circles = [];
        let totalCircles = 0;
        let reduceRate = 0.99; // Reduce the size slightly on each frame to mimic loss.

        function setup() {
            createCanvas(windowWidth, windowHeight);
            generateCircles(100); // Initial circles
        }

        function draw() {
            background('#fbfbfb');
            for (let circle of circles) {
                circle.update();
                circle.display();
            }

            if (frameCount % 60 === 0 && circles.length > 1) { // every second
                circles.pop();
            }

            if (circles.length === 0) {
                noLoop(); // stop animation when all circles went away
            }
        }

        function generateCircles(num) {
            for (let i = 0; i < num; i++) {
                let location = createVector(random(width), random(height));
                let size = random(15, 50);
                circles.push(new CircleItem(location, size));
            }
        }

        class CircleItem {
            constructor(location, size) {
                this.location = location;
                this.size = size;
                this.color = color(random(100, 200), random(100, 200), random(100, 200), 150);
            }

            update() {
                this.size *= reduceRate;
            }

            display() {
                noStroke();
                fill(this.color);
                ellipse(this.location.x, this.location.y, this.size);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>

    <a href="https://www.beautyisapattern.com/archive">Archive</a>

</body>
</html>
