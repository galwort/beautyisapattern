<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Quiet Escape</title>
    <link rel="icon" type="image/x-icon" href="https://www.beautyisapattern.com/favicon.ico">
    <script src="https://cdn.jsdelivr.net/npm/p5@1.4.0/lib/p5.js"></script>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0f0f0f;
            color: white;
            overflow: hidden;
        }
        a {
            position: absolute;
            bottom: 15px;
            right: 15px;
            color: #ccc;
            text-decoration: none;
            font-size: 0.9em;
        }
        a:hover {
            color: #fff;
        }
    </style>
</head>
<body>
    <script>
        let particles = [];
        let gradientColors;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            gradientColors = [color(29, 161, 242), color(255, 45, 85), color(88, 86, 214)];
            for (let i = 0; i < 150; i++) {
                particles.push(new Particle(random(width), random(height)));
            }
        }

        function draw() {
            background(15, 15, 15, 25);  // Soft trailing effect for movement
            let gradientFill = drawingContext.createLinearGradient(0, 0, width, height);
            gradientFill.addColorStop(0, gradientColors[0].toString());
            gradientFill.addColorStop(0.5, gradientColors[1].toString());
            gradientFill.addColorStop(1, gradientColors[2].toString());
            drawingContext.fillStyle = gradientFill;

            for (let particle of particles) {
                particle.update();
                particle.show();
            }
        }

        class Particle {
            constructor(x, y) {
                this.position = createVector(x, y);
                this.velocity = p5.Vector.random2D().mult(random(0.5, 2));
                this.size = random(2, 7);
            }

            update() {
                this.position.add(this.velocity);
                this.edges();
            }

            edges() {
                if (this.position.x > width || this.position.x < 0) {
                    this.velocity.x *= -1;
                }
                if (this.position.y > height || this.position.y < 0) {
                    this.velocity.y *= -1;
                }
            }

            show() {
                ellipse(this.position.x, this.position.y, this.size);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            gradientColors = [color(29, 161, 242), color(255, 45, 85), color(88, 86, 214)];
        }
    </script>
    <a href="https://www.beautyisapattern.com/archive">Visit Archive</a>
</body>
</html>
