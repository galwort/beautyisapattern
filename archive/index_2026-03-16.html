<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canvas of Possibilities</title>
  <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
  <style>
    body { 
      margin: 0; 
      overflow: hidden; 
      background-color: #222; 
    }
    .archive-link {
      position: fixed;
      bottom: 20px;
      left: 20px;
      color: #0af;
      text-decoration: none;
      font-family: "Courier New", Courier, monospace;
      font-size: 14px;
      background-color: rgba(0, 0, 0, 0.5);
      padding: 5px 10px;
      border-radius: 5px;
    }
    .archive-link:hover {
      text-decoration: underline;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <script>
    let particles = [];
    function setup() {
      createCanvas(windowWidth, windowHeight);
      for (let i = 0; i < 200; i++) {
        particles.push(new Particle(random(width), random(height)));
      }
    }

    function draw() {
      background(34, 34, 34, 40); 
      for (let particle of particles) {
        particle.update();
        particle.display();
      }
    }

    class Particle {
      constructor(x, y) {
        this.pos = createVector(x, y);
        this.vel = p5.Vector.random2D().mult(random(0.5, 2));
        this.size = random(3, 6);
        this.color = color(random(50, 255), random(50, 255), 255, 200);
      }

      update() {
        this.pos.add(this.vel);
        if (this.pos.x < 0 || this.pos.x > width || this.pos.y < 0 || this.pos.y > height) {
          this.pos.x = random(width);
          this.pos.y = random(height);
        }
      }

      display() {
        noStroke();
        let gradient = drawingContext.createRadialGradient(this.pos.x, this.pos.y, 0, this.pos.x, this.pos.y, this.size);
        gradient.addColorStop(0, this.color);
        gradient.addColorStop(1, 'rgba(0,0,0,0)');
        drawingContext.fillStyle = gradient;
        ellipse(this.pos.x, this.pos.y, this.size * 2);
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>
</head>
<body>
  <a class="archive-link" href="https://www.beautyisapattern.com/archive">Visit Archive</a>
</body>
</html>
