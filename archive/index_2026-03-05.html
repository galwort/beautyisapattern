<html>
<head>
    <title>Dynamic Balance of Knowledge</title>
    <link rel="shortcut icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #1b1d1f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #archive {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #f5f5f5;
            text-decoration: none;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-size: 14px;
        }

        #archive:hover {
            text-shadow: 0 0 5px #f5f5f5;
        }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let particles = [];
        const maxParticles = 150;
        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < maxParticles; i++) {
                particles.push(new Particle());
            }
        }

        function draw() {
            background('rgba(27, 29, 31, 0.1)');
            particles.forEach(particle => {
                particle.update();
                particle.connect(particles);
                particle.display();
            });
        }

        class Particle {
            constructor() {
                this.position = createVector(random(windowWidth), random(windowHeight));
                this.velocity = createVector(random(-1, 1), random(-1, 1));
                this.radius = random(1, 3);
            }

            update() {
                this.position.add(this.velocity);

                if (this.position.x > width || this.position.x < 0) {
                    this.velocity.x *= -1;
                }

                if (this.position.y > height || this.position.y < 0) {
                    this.velocity.y *= -1;
                }
            }

            display() {
                noStroke();
                fill(125, 200, 125, 150);
                ellipse(this.position.x, this.position.y, this.radius * 2);
            }

            connect(particles) {
                particles.forEach(other => {
                    let distance = dist(this.position.x, this.position.y, other.position.x, other.position.y);
                    if (distance < 100) {
                        stroke(125, 200, 125, 150 * (1 - distance / 100));
                        line(this.position.x, this.position.y, other.position.x, other.position.y);
                    }
                });
            }
        } 

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>

    <a id="archive" href="https://www.beautyisapattern.com/archive">View Archive</a>
</body>
</html>
