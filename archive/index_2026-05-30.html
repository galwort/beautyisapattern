<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>A Strong Foundation</title>
    <link rel="icon" type="image/x-icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f0e6da;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .link-container {
            text-align: center;
            padding: 20px 0;
        }
        a {
            color: #111;
            text-decoration: none;
            font-family: 'Arial', sans-serif;
            background-color: rgba(250, 250, 250, 0.85);
            padding: 10px 15px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        a:hover {
            background-color: rgba(200, 200, 200, 0.9);
        }
        
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let sandColor = [194, 178, 128];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            noStroke();
            setAttributes('antialias', true);
        }

        function draw() {
            background('#f0e6da');

            // Drawing the sand base
            fill(sandColor[0], sandColor[1], sandColor[2], 180);
            rect(0, height - 60, width, height);

            translate(width / 2, height - 60);

            // Drawing mansion blocks
            for (let i = 0; i < 10; i++) {
                push();
                fill(80, 120, 160, 220);
                translate(random(-30, 30), -i * 40 - 20);
                rotate(sin(frameCount * 0.01 + i) * 0.1);
                rectMode(CENTER);
                rect(0, 0, 100, 40);
                pop();
            }

            // Floating heart animation
            for (let i = 0; i < width; i += 60) {
                drawHeart(i, -80 * sin(frameCount * 0.02 + i), 20);
            }
        }

        function drawHeart(x, y, size) {
            beginShape();
            fill(255, 70, 70, 160);
            vertex(x, y);
            bezierVertex(x - size, y - size, x - size * 1.5, y + size / 3, x, y + size);
            bezierVertex(x + size * 1.5, y + size / 3, x + size, y - size, x, y);
            endShape(CLOSE);
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }

    </script>
</head>
<body>
    <div class="link-container">
        <a href="https://www.beautyisapattern.com/archive">Explore The Archive</a>
    </div>
</body>
</html>
