<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divine Harmony</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, #e0f7fa, #80deea);
            font-family: 'Arial', sans-serif;
        }
        .footer {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 5px 10px;
            border-radius: 5px;
        }
        .footer a {
            text-decoration: none;
            color: #1a237e;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="footer">
    <a href="https://www.beautyisapattern.com/archive">View Archive</a>
</div>

<script>
    let circles = [];
    let colors = ['#ffadad', '#ffd6a5', '#fdffb6', '#caffbf', '#9bf6ff', '#a0c4ff', '#bdb2ff', '#ffc6ff'];

    function setup() {
        createCanvas(windowWidth, windowHeight);
        background(240);
        for (let i = 0; i < 50; i++) {
            circles.push(new Circle(random(width), random(height), random(30, 80)));
        }
        noStroke();
    }
    
    function draw() {
        background(240, 20); // Low alpha background to blend frames
        for (let circle of circles) {
            circle.update();
            circle.display();
        }
    }

    class Circle {
        constructor(x, y, diameter) {
            this.x = x;
            this.y = y;
            this.diameter = diameter;
            this.color = random(colors);
            this.zOffset = random(TWO_PI);
        }

        update() {
            this.x += map(noise(this.zOffset), 0, 1, -2, 2);
            this.y += map(noise(this.zOffset + 10000), 0, 1, -2, 2);
            this.zOffset += 0.02;

            if (this.x < 0) this.x = width;
            if (this.x > width) this.x = 0;
            if (this.y < 0) this.y = height;
            if (this.y > height) this.y = 0;
        }

        display() {
            fill(this.color);
            ellipse(this.x, this.y, this.diameter);
        }
    }
</script>

</body>
</html>
