<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waves of Emotion</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #e0e0e0;
        }
        .archive-link {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #333;
            text-decoration: none;
            padding: 8px 15px;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 8px;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            transition: background-color 0.3s;
        }
        .archive-link:hover {
            background-color: rgba(255, 255, 255, 1);
        }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let waves = [];
        let waveColors;
        let rows;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            waveColors = [
                color(255, 204, 203),
                color(198, 255, 206),
                color(255, 213, 153),
                color(204, 255, 255)
            ];
            rows = waveColors.length;
            initializeWaves();
        }

        function draw() {
            background(225);
            noLoop();
            for (let i = 0; i < waves.length; i++) {
                drawWave(waves[i], i);
            }
        }

        function initializeWaves() {
            let amplitude = height / (2 * rows);
            for (let i = 0; i < rows; i++) {
                waves[i] = {
                    amplitude: amplitude,
                    phase: random(TWO_PI),
                    speed: random(0.005, 0.02),
                    color: waveColors[i]
                };
            }
        }

        function drawWave(wave, index) {
            fill(wave.color);
            noStroke();
            beginShape();
            let xoff = 0;
            for (let x = 0; x <= width + 30; x += 20) {
                let y = (height / rows) * index + sin(xoff + wave.phase) * wave.amplitude;
                vertex(x, y);
                xoff += 0.1;
            }
            vertex(width, height);
            vertex(0, height);
            endShape(CLOSE);

            // Animate wave phase
            wave.phase += wave.speed;
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            initializeWaves();
            loop();
        }
    </script>
    <a class="archive-link" href="https://www.beautyisapattern.com/archive">Visit Archive</a>
</body>
</html>
