<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exploring Inner Shades</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0d0d0d;
            color: #999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
        }
        a {
            color: #999;
            text-decoration: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            border: 1px solid #555;
            border-radius: 4px;
            transition: background 0.3s;
        }
        a:hover {
            background-color: #555;
        }
    </style>
</head>
<body>

    <a href="https://www.beautyisapattern.com/archive">Explore the Archive</a>

    <script>
        let particles = [];
        let numParticles = 200;
        let centers = [];
        
        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < numParticles; i++) {
                particles.push(new Particle(random(width), random(height)));
            }
            centers.push(createVector(width / 3, height / 2));
            centers.push(createVector(2 * width / 3, height / 2));
            noStroke();
        }

        function draw() {
            background(13, 13, 13, 25);
            fill(50);
            for (let i = 0; i < centers.length; i++) {
                ellipse(centers[i].x, centers[i].y, 200, 200);
            }

            for (let i = 0; i < particles.length; i++) {
                particles[i].seek(centers);
                particles[i].update();
                particles[i].show();
            }
        }

        class Particle {
            constructor(x, y) {
                this.pos = createVector(x, y);
                this.vel = p5.Vector.random2D();
                this.acc = createVector(0, 0);
                this.maxSpeed = 2;
            }

            update() {
                this.vel.add(this.acc);
                this.vel.limit(this.maxSpeed);
                this.pos.add(this.vel);
                this.acc.mult(0);
                this.edges();
            }

            applyForce(force) {
                this.acc.add(force);
            }

            seek(targets) {
                let desired = createVector(0, 0);
                for (let i = 0; i < targets.length; i++) {
                    let steering = p5.Vector.sub(targets[i], this.pos);
                    steering.limit(0.05);
                    desired.add(steering);
                }
                this.applyForce(desired);
            }

            edges() {
                if (this.pos.x > width || this.pos.x < 0) this.pos.x = random(width);
                if (this.pos.y > height || this.pos.y < 0) this.pos.y = random(height);
            }

            show() {
                strokeWeight(2);
                fill(255, 90);
                ellipse(this.pos.x, this.pos.y, 3, 3);
            }
        }
    </script>
</body>
</html>
