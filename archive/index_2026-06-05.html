<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solitary Journey</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #f4f4f9;
      }
      footer {
        position: fixed;
        bottom: 10px;
        right: 10px;
        background: rgba(255, 255, 255, 0.8);
        padding: 8px;
        border-radius: 8px;
        font-size: 14px;
      }
      a {
        text-decoration: none;
        color: #333;
      }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
      let solitaryPath;

      function setup() {
        createCanvas(windowWidth, windowHeight);
        solitaryPath = new Path(width / 2, height / 2);
      }

      function draw() {
        background(244, 244, 249);
        solitaryPath.update();
        solitaryPath.display();
      }

      class Path {
        constructor(x, y) {
          this.x = x;
          this.y = y;
          this.noiseOffset = random(1000);
          this.path = [];
        }

        update() {
          this.noiseOffset += 0.005;
          let radius = noise(this.noiseOffset) * 200;
          let angle = frameCount * 0.01;

          this.x += cos(angle) * 2;
          this.y += sin(angle) * 2;
          this.path.push(createVector(this.x, this.y));

          // Keep path within screen by bouncing off edges
          if (this.x > width || this.x < 0) cos(angle) *= -1;
          if (this.y > height || this.y < 0) sin(angle) *= -1;

          // Limit the path size to avoid memory bloat
          if (this.path.length > 200) {
            this.path.splice(0, 1);
          }
        }

        display() {
          noFill();
          stroke(60, 100, 150, 200);
          strokeWeight(2);

          beginShape();
          for (let v of this.path) {
            vertex(v.x, v.y);
          }
          endShape();
        }
      }

      function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
      }
    </script>
  </head>
  <body>
    <footer>
      <a href="https://www.beautyisapattern.com/archive" target="_blank" rel="noopener noreferrer">Explore the Archive</a>
    </footer>
  </body>
</html>
