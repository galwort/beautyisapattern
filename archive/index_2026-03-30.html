<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <title>Whispers of Impermanence</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        a {
            color: #f4a261;
            margin-bottom: 20px;
            text-decoration: none;
            font-size: 14px;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let particles = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < 150; i++) {
                particles.push(new Particle(random(width), random(height)));
            }
        }

        function draw() {
            background(26, 26, 26, 50);
            particles.forEach(particle => {
                 particle.move();
                 particle.display();
                 particle.checkEdges();
            });
        }

        class Particle {
            constructor(x, y) {
                this.pos = createVector(x, y);
                this.vel = createVector(random(-2, 2), random(-1, 1));
                this.size = random(5, 20);
                this.opacity = random(100, 255);
                this.color = color(random(50, 255), random(50, 255), random(50, 255), this.opacity);
            }

            move() {
                this.pos.add(this.vel);
            }

            checkEdges() {
                if (this.pos.x > width || this.pos.x < 0) {
                    this.vel.x *= -1; 
                }
                if (this.pos.y > height || this.pos.y < 0) {
                    this.vel.y *= -1;
                }
            }

            display() {
                noStroke();
                fill(this.color);
                ellipse(this.pos.x, this.pos.y, this.size);
            }
        }
    </script>
</head>
<body>
    <a href="https://www.beautyisapattern.com/archive" target="_blank">Visit the Archive</a>
</body>
</html>
