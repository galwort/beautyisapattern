<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle of Joy</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #F5F5F5;
        }
        a {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #333;
            text-decoration: none;
            font-weight: bold;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/p5@1.4.0/lib/p5.min.js"></script>
<script>
    let circles = [];
    const circleCount = 12;
    let maxSize = 50;
    let colors = [];

    function setup() {
        createCanvas(windowWidth, windowHeight);
        noFill();
        for (let i = 0; i < circleCount; i++){
            circles.push({
                x: random(width),
                y: random(height),
                color: random(['#FFD700', '#FF8C00', '#FF6347', '#4682B4']),
                maxSize: random(30, maxSize),
                speedX: random(-2, 2),
                speedY: random(-2, 2)
            });
        }
    }

    function draw() {
        clear();
        background(255, 204, 0, 10);

        for (let circle of circles) {
            strokeWeight(2);
            stroke(circle.color);

            // Animate circle growth
            let currentSize = circle.maxSize * (0.5 + 0.5 * sin(frameCount * 0.03));
            ellipse(circle.x, circle.y, currentSize);

            // Move circles within the canvas
            circle.x += circle.speedX;
            circle.y += circle.speedY;

            // Wrap around logic to keep circles within the canvas
            if (circle.x > width || circle.x < 0) circle.speedX *= -1;
            if (circle.y > height || circle.y < 0) circle.speedY *= -1;
        }
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
        // Re-position circles dynamically upon resize
        for (let circle of circles) {
            circle.x = random(width);
            circle.y = random(height);
        }
    }
</script>

</body>
</html>
