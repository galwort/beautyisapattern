<html>
<head>
    <title>Harmony in Motion</title>
    <link rel="icon" type="image/x-icon" href="https://www.beautyisapattern.com/favicon.ico">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #282c34;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #f5f5f5;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .archive-link {
            position: absolute;
            bottom: 10px;
            right: 10px;
            text-decoration: none;
            color: #bbb;
            transition: color 0.3s;
        }

        .archive-link:hover {
            color: #f5f5f5;
        }
    </style>
</head>
<body>
<script>
    let hearts = [];
    let numHearts = 60;
    
    function setup() {
        createCanvas(windowWidth, windowHeight);
      
        for (let i = 0; i < numHearts; i++) {
            hearts.push(new Heart(random(width), random(height), random(20, 50)));
        }
    }

    function draw() {
        background(28, 44, 52, 127);
        for (let heart of hearts) {
            heart.update();
            heart.display();
            heart.edges();
        }
    }

    class Heart {
        constructor(x, y, size) {
            this.x = x;
            this.y = y;
            this.size = size;
            this.angle = random(TWO_PI);
            this.theta = random(0.01, 0.03);
            this.color = color(random(200, 255), random(100, 200), random(150, 255), 150);
        }

        update() {
            this.angle += this.theta;
            this.x += sin(this.angle);
            this.y += cos(this.angle);
        }

        display() {
            push();
            translate(this.x, this.y);
            fill(this.color);
            noStroke();
            beginShape();
            vertex(0, -this.size / 4);
            bezierVertex(-this.size / 2, -this.size / 2, -this.size, this.size / 4, 0, this.size);
            bezierVertex(this.size, this.size / 4, this.size / 2, -this.size / 2, 0, -this.size / 4);
            endShape(CLOSE);
            pop();
        }

        edges() {
            if (this.x > width || this.x < 0) {
                this.theta *= -1;
            }
            if (this.y > height || this.y < 0) {
                this.theta *= -1;
            }
        }
    }
</script>

<a class="archive-link" href="https://www.beautyisapattern.com/archive" target="_blank">Visit Archive</a>

</body>
</html>
