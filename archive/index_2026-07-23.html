<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tennis Tranquility in Action</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #2E8B57;
        }
        #archive-link {
            position: absolute;
            top: 10px;
            left: 10px;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 5px 15px;
            border-radius: 15px;
            text-decoration: none;
            color: #006400;
            transition: background-color 0.3s ease;
        }
        #archive-link:hover {
            background-color: rgba(255, 255, 255, 1);
        }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        class TennisBall {
            constructor(x, y, radius) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.xSpeed = random(-5, 5);
                this.ySpeed = random(-5, 5);
                this.trail = [];
            }

            update() {
                this.x += this.xSpeed;
                this.y += this.ySpeed;

                if (this.x > width - this.radius || this.x < this.radius) {
                    this.xSpeed *= -1;
                }
                if (this.y > height - this.radius || this.y < this.radius) {
                    this.ySpeed *= -1;
                }

                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 20) {
                    this.trail.shift();
                }
            }

            display() {
                strokeWeight(0.5);
                stroke(255, 255, 255, 150);
                noFill();
                beginShape();
                for (let i = 0; i < this.trail.length; i++) {
                    let pos = this.trail[i];
                    vertex(pos.x, pos.y);
                }
                endShape();

                fill(255, 165, 0);
                noStroke();
                ellipse(this.x, this.y, this.radius * 2);
            }
        }

        let balls = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < 15; i++) {
                balls.push(new TennisBall(random(width), random(height), random(20, 30)));
            }
        }

        function draw() {
            background(0, 100, 0, 20);
            for (let ball of balls) {
                ball.update();
                ball.display();
            }
        }
    </script>
    <a id="archive-link" href="https://www.beautyisapattern.com/archive" target="_blank">Explore Archive</a>
</body>
</html>
