<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graceful Attraction</title>
    <link rel="icon" type="image/x-icon" href="https://www.beautyisapattern.com/favicon.ico">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        footer {
            position: absolute;
            bottom: 20px;
            text-align: center;
            width: 100%;
            font-family: 'Verdana', sans-serif;
        }
        #archive-link {
            color: #2980b9;
            text-decoration: none;
            font-size: 18px;
        }
    </style>
</head>
<body>

<script>
    let particles = [];
    
    function setup() {
        createCanvas(windowWidth, windowHeight);
        for (let i = 0; i < 150; i++) {
            particles.push(new Particle(random(width), random(height)));
        }
    }

    function draw() {
        background(255, 245, 238);  // Soft cream background
        for (let p of particles) {
            p.move();
            p.display();
        }
    }

    class Particle {
        constructor(x, y) {
            this.pos = createVector(x, y);
            this.vel = createVector(random(-0.5, 0.5), random(-0.5, 0.5));
            this.acc = createVector(0, 0);
            this.color = color(`hsla(${int(random(30, 60))}, 100%, 72%, ${random(0.3, 0.6)})`);
            this.size = random(4, 8);
        }

        move() {
            this.acc.add(createVector(random(-0.1, 0.1), random(-0.1, 0.1)));
            this.vel.add(this.acc);
            this.pos.add(this.vel);
            this.vel.limit(1);
            this.acc.mult(0);

            // Wrap around edges
            if (this.pos.x > width) this.pos.x = 0;
            if (this.pos.x < 0) this.pos.x = width;
            if (this.pos.y > height) this.pos.y = 0;
            if (this.pos.y < 0) this.pos.y = height;
        }

        display() {
            noStroke();
            fill(this.color);
            ellipse(this.pos.x, this.pos.y, this.size, this.size);
        }
    }
</script>

<footer>
    <a id="archive-link" href="https://www.beautyisapattern.com/archive" target="_blank">Explore the Beauty Archive</a>
</footer>

</body>
</html>
