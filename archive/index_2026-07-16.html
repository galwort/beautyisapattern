<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Essence of Effort</title>
    <link rel="shortcut icon" href="https://www.beautyisapattern.com/favicon.ico" />
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #e0eafc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }

        a {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #0077b6;
            text-decoration: none;
            font-size: 0.9em;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        a:hover {
            background-color: #d3f8e2;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let circles = [];
        const maxCircles = 50;
        const maxSize = 100;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < maxCircles; i++) {
                circles.push(new MovingCircle());
            }
        }

        function draw() {
            background('#e0eafc');
            for (let circle of circles) {
                circle.move();
                circle.display();
            }
        }

        class MovingCircle {
            constructor() {
                this.x = random(width);
                this.y = random(height);
                this.size = random(10, maxSize);
                this.speedX = random(-1, 1);
                this.speedY = random(-1, 1);
                this.opacity = random(0.5, 1);
                this.color = color(random(100, 200), random(100, 200), random(200, 255), this.opacity * 255);
            }

            move() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x < 0 || this.x > width) this.speedX *= -1;
                if (this.y < 0 || this.y > height) this.speedY *= -1;
            }

            display() {
                noStroke();
                fill(this.color);
                ellipse(this.x, this.y, this.size);
            }
        }
    </script>
</head>
<body>
    <a href="https://www.beautyisapattern.com/archive" target="_blank" rel="noopener noreferrer">Explore Archive</a>
</body>
</html>
