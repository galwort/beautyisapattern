<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empower Your Beliefs</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(140deg, #e6e9f0, #eef1f5);
        }
        .bottom-link {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        a {
            color: #333;
            text-decoration: none;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 5px;
            background-color: #fff;
            box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.2);
        }
        a:hover {
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let particles = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle(random(width), random(height)));
            }
        }

        function draw() {
            background(255, 20);

            for (let particle of particles) {
                particle.update();
                particle.show();
            }

            fill('#ffa07a');
            noStroke();
            let d = sin(frameCount * 0.05) * 50 + 100;
            ellipse(width / 2, height / 2, d, d);
        }

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = random(10, 20);
                this.speed = random(0.5, 3);
                this.angle = random(TWO_PI);
            }

            update() {
                this.x += this.speed * cos(this.angle);
                this.y += this.speed * sin(this.angle);

                let angleChange = random(-0.1, 0.1);
                this.angle += angleChange;

                this.x = (this.x + width) % width;
                this.y = (this.y + height) % height; 
            }

            show() {
                fill('#4682b4');
                noStroke();
                ellipse(this.x, this.y, this.size);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
    <div class="bottom-link">
        <a href="https://www.beautyisapattern.com/archive">Visit the Archive</a>
    </div>
</body>
</html>
