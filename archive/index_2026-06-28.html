<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Blooming Wisdom</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f7fafc;
            font-family: Arial, sans-serif;
        }

        .archive-link {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #5a5a5a;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 5px 10px;
            border-radius: 5px;
            text-decoration: none;
            transition: background-color 0.3s, color 0.3s;
        }

        .archive-link:hover {
            background-color: #5a5a5a;
            color: white;
        }
    </style>
</head>
<body>

<main>
    <a class="archive-link" href="https://www.beautyisapattern.com/archive">Explore More Patterns</a>
</main>

<script>
    let petals = [];
    let numPetals = 8;
    let angleOffset = 0;

    function setup() {
        createCanvas(windowWidth, windowHeight);
        angleMode(DEGREES);
        for (let i = 0; i < numPetals; i++) {
            let angle = map(i, 0, numPetals, 0, 360);
            petals.push(createPetal(angle));
        }
    }

    function draw() {
        background('#f7fafc');
        translate(width / 2, height / 2);
        let currentAngle = angleOffset;
        
        for (let petal of petals) {
            drawPetal(petal);
            rotateElement(petal, 0.5);
            currentAngle += 2;
        }

        angleOffset += 0.1;
    }

    function createPetal(angle) {
        return {
            angle,
            length: random(100, 150),
            color: color(random(100, 200), random(100, 150), random(150, 250), 150)
        };
    }

    function drawPetal({ angle, length, color }) {
        push();
        rotate(angle);
        noStroke();
        fill(color);
        ellipse(length, 0, 50, 100);
        pop();
    }

    function rotateElement(petal, speed) {
        petal.angle += speed;
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
    }
</script>

</body>
</html>
