<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Clarity of Simplicity</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #f5f5f5;
        }
        .archive-link {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #888888;
            font-family: Arial, sans-serif;
            font-size: 14px;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div id="sketch-holder"></div>
<a class="archive-link" href="https://www.beautyisapattern.com/archive">Explore the Archive</a>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
<script>
    let pointSets = [];
    
    function setup() {
        let cnv = createCanvas(windowWidth, windowHeight);
        cnv.parent('sketch-holder');
        let numSets = 30;
        for (let i = 0; i < numSets; i++) {
            let points = [];
            for (let j = 0; j < 5; j++) {
                points.push({x: random(width), y: random(height)});
            }
            pointSets.push({
                points: points,
                isSimple: random() > 0.5
            });
        }
        frameRate(20);
    }

    function draw() {
        background(245);
        noFill();
        stroke('#444444');
        strokeWeight(2);

        for (let set of pointSets) {
            beginShape();
            for (let point of set.points) {
                vertex(point.x, point.y);
                point.x += random(-2, 2);
                point.y += random(-2, 2);
                if (point.x < 0 || point.x > width) point.x = random(width);
                if (point.y < 0 || point.y > height) point.y = random(height);
            }
            if (set.isSimple) {
                endShape(CLOSE);
            } else {
                endShape();
                for (let i = 0; i < set.points.length - 1; i++) {
                    line(set.points[i].x, set.points[i].y, set.points[i+1].x, set.points[i+1].y);
                }
            }
        }
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
    }
</script>
</body>
</html>
