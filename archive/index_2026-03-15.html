<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chasing Dreams</title>
    <link rel="icon" type="image/x-icon" href="https://www.beautyisapattern.com/favicon.ico">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
        }
        
        footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
        }

        a {
            color: #FFFFFF;
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
            font-weight: 600;
            background-color: #d35400;
            padding: 12px 24px;
            border-radius: 24px;
            transition: background-color 0.3s ease;
        }

        a:hover {
            background-color: #e67e22;
        }
    </style>
</head>
<body>
    <script>
        let particles = [];
        const particleCount = 100;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle(random(width), random(height), random(10, 50)));
            }
            noFill();
        }

        function draw() {
            background(26, 26, 26, 25);
            for (let particle of particles) {
                particle.update();
                particle.display();
            }
        }

        class Particle {
            constructor(x, y, size) {
                this.pos = createVector(x, y);
                this.vel = createVector(random(-2, 2), random(-2, 2));
                this.size = size;
                this.color = color(random(100, 255), random(100, 255), random(100, 255), 200);
            }

            update() {
                this.pos.add(this.vel);

                // Wrap around edges
                if (this.pos.x > width) this.pos.x = 0;
                if (this.pos.x < 0) this.pos.x = width;
                if (this.pos.y > height) this.pos.y = 0;
                if (this.pos.y < 0) this.pos.y = height;
            }

            display() {
                stroke(this.color);
                ellipse(this.pos.x, this.pos.y, this.size);
            }
        }
    </script>
    
    <footer>
        <a href="https://www.beautyisapattern.com/archive">Explore the Archive</a>
    </footer>
</body>
</html>
