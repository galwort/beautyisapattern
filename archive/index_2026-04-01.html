<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whispers in the Avalanche</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #001f3f;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #archive-link {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            border: 1px solid white;
            padding: 5px 10px;
            border-radius: 5px;
        }
        #archive-link:hover {
            background-color: white;
            color: #001f3f;
            transition: background-color 0.3s;
        }
    </style>
</head>
<body>

<div id="canvas-container"></div>
<a id="archive-link" href="https://www.beautyisapattern.com/archive" target="_blank">Explore the Archive</a>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
<script>
    let snowflakes = [];
    let gravity;
    
    function setup() {
        createCanvas(window.innerWidth, window.innerHeight);
        gravity = createVector(0, 0.03);
        for (let i = 0; i < 200; i++) {
            snowflakes.push(new snowflake());
        }
    }

    function windowResized() {
        resizeCanvas(window.innerWidth, window.innerHeight);
    }

    function draw() {
        background('#001f3f');
        for (let flake of snowflakes) {
            flake.applyForce(gravity);
            flake.update();
            flake.render();
			if (flake.offScreen()) {
				flake.reset();
			}
        }
    }

    class snowflake {
        constructor() {
            this.pos = createVector(random(width), random(-height, 0));
            this.vel = createVector(0, 0);
            this.acc = createVector();
            this.size = random(2, 6);
        }
        
        applyForce(force) {
            let f = force.copy();
            f.mult(this.size);
            this.acc.add(f);
        }

        update() {
            this.vel.add(this.acc);
            this.vel.limit(this.size * 0.2);
            this.pos.add(this.vel);
            this.acc.mult(0);
        }
        
        render() {
            fill(255);
            noStroke();
            ellipse(this.pos.x, this.pos.y, this.size);
        }
        
        offScreen() {
            return this.pos.y > height || this.pos.x < 0 || this.pos.x > width;
        }

        reset() {
            this.pos.y = random(-100, 0);
            this.pos.x = random(width);
            this.vel = createVector(0, 0);
        }
    }
</script>

</body>
</html>
