            position: absolute;

<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
<script>
    let t = 0;
    
    function setup() {
        createCanvas(windowWidth, windowHeight);
        noFill();
        stroke(255, 100);
    }

    function draw() {
        background(13, 17, 23);
        translate(width / 2, height / 2);
        beginShape();
        for (let i = 0; i <= TWO_PI; i += 0.01) {
            let radius = map(noise(i + t), 0, 1, 50, 200);
            let x = radius * cos(i * 3);
            let y = radius * sin(i * 3);
            vertex(x, y);
        }
        endShape(CLOSE);

        t += 0.01;
    }

    windowResized = () => resizeCanvas(windowWidth, windowHeight);
</script>
