<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essence of Friendship</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #E8F1F2;
        }
        footer {
            position: fixed;
            bottom: 10px;
            left: 10px;
            color: #6D676E;
            font-family: 'Arial', sans-serif;
            font-size: 0.9em;
            z-index: 10;
        }
        footer a {
            color: #138D75;
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let hearts = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < 50; i++) {
                hearts.push(new Heart(random(width), random(height), random(2, 4)));
            }
        }

        function draw() {
            background(232, 241, 242);
            for (let heart of hearts) {
                heart.move();
                heart.display();
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }

        class Heart {
            constructor(x, y, size) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.xSpeed = random(-1, 1);
                this.ySpeed = random(-1, 1);
            }

            move() {
                this.x += this.xSpeed;
                this.y += this.ySpeed;

                if (this.x > width || this.x < 0) this.xSpeed *= -1;
                if (this.y > height || this.y < 0) this.ySpeed *= -1;
            }

            display() {
                fill(233, 89, 80, 150);
                noStroke();
                beginShape();
                vertex(this.x, this.y);
                bezierVertex(this.x - this.size/2, this.y - this.size/2, this.x - this.size, this.y + this.size/3, this.x, this.y + this.size);
                bezierVertex(this.x + this.size, this.y + this.size/3, this.x + this.size/2, this.y - this.size/2, this.x, this.y);
                endShape(CLOSE);
            }
        }
    </script>
</head>
<body>
    <footer>
        <a href="https://www.beautyisapattern.com/archive" target="_blank">Discover More Patterns</a>
    </footer>
</body>
</html>
