<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eternal Exchange</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background-color: #f4f1ec;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333333;
        }
        #link {
            position: absolute;
            bottom: 15px;
            right: 15px;
            text-decoration: none;
            color: #0077cc;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        function setup() {
            createCanvas(windowWidth, windowHeight);
        }

        function draw() {
            background('#f4f1ec');
            let time = frameCount * 0.02;
            let infinityX = width / 2;
            let infinityY = height / 2;
            
            // Draw expansive circles (eternal gain)
            for (let i = 0; i < 10; i++) {
                let size = sin(time + i) * 200 + 300;
                noFill();
                stroke(234, 177, 84, 255 - i * 25);
                strokeWeight(2);
                ellipse(infinityX, infinityY, size, size);
            }

            // Draw fleeting particle clusters (things cannot keep)
            noStroke();
            for (let i = 0; i < 100; i++) {
                let angle = i * TWO_PI / 100;
                let xOffset = cos(angle + time) * 150;
                let yOffset = sin(angle + time) * 150;
                let x = infinityX + xOffset;
                let y = infinityY + yOffset;

                fill(0, 100 + xOffset, 150 + yOffset, 150);
                ellipse(x, y, 5 + sin(angle + time) * 3);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>

    <a href="https://www.beautyisapattern.com/archive" id="link">Explore More Patterns</a>
</body>
</html>
