<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmony of Wisdom</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f6f6f6;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
        }
        footer {
            position: absolute;
            bottom: 10px;
            text-align: center;
            width: 100%;
        }
        a {
            text-decoration: none;
            color: #0a4e78;
        }
    </style>
</head>
<body>
    <script>
        let angle = 0;
        let radiusMax;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            radiusMax = min(windowWidth, windowHeight) / 2;
            angleMode(DEGREES);
            noStroke();
        }

        function draw() {
            background('#f6f6f6');
            translate(width / 2, height / 2);
            let t = frameCount * 0.01;

            for (let i = 0; i < 120; i++) {
                let index = i * 3 + t * 50;
                let x = sin(index + angle) * radiusMax * 0.4;
                let y = cos(index - angle) * radiusMax * 0.4;
                let size = map(sin(index - angle), -1, 1, 10, 40);
                let col = lerpColor(color('#ffcc00'), color('#3366cc'), sin(t + i / 10));

                fill(col);
                ellipse(x, y, size, size);
            }

            angle += 1;
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }

    </script>
    <footer>
        <a href="https://www.beautyisapattern.com/archive" target="_blank">Visit the Archive</a>
    </footer>
</body>
</html>
