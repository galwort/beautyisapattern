<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carving New Trails</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #111;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        a {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: #fff;
            text-decoration: none;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 15px;
            border-radius: 5px;
            transition: background 0.3s;
        }
        a:hover {
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let wanderers = [];
        
        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < 7; i++) {
                wanderers.push(new Wanderer(random(width), random(height)));
            }
        }

        function draw() {
            background(17, 17, 17, 25); // Slight trail effect
            for (let wanderer of wanderers) {
                wanderer.move();
                wanderer.display();
                wanderer.seekNewPath();
            }
        }

        class Wanderer {
            constructor(x, y) {
                this.position = createVector(x, y);
                this.velocity = createVector(random(-2, 2), random(-2, 2));
                this.color = color(random(150, 255), random(150, 255), random(150, 255), 150);
                this.size = random(5, 10);
            }

            move() {
                this.position.add(this.velocity);
                if (this.position.x > width || this.position.x < 0) this.velocity.x *= -1;
                if (this.position.y > height || this.position.y < 0) this.velocity.y *= -1;
            }

            display() {
                noStroke();
                fill(this.color);
                ellipse(this.position.x, this.position.y, this.size);
            }

            seekNewPath() {
                if (random() < 0.01) {
                    this.velocity = createVector(random(-3, 3), random(-3, 3));
                    this.size = random(5, 10);
                }
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</head>
<body>
    <a href="https://www.beautyisapattern.com/archive">Explore the Archive</a>
</body>
</html>
