<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <title>Tools of Timeless Utility</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f0f0f0;
        }
        a {
            position: absolute;
            bottom: 10px;
            right: 10px;
            text-decoration: none;
            color: #333333;
            background: rgba(255,255,255,0.8);
            padding: 8px 12px;
            border-radius: 5px;
            font-family: 'Helvetica', sans-serif;
        }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.min.js"></script>
    <script>
        let tools = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < 10; i++) {
                tools.push(new Tool(random(width), random(height)));
            }
        }

        function draw() {
            background(240);
            tools.forEach(tool => {
                tool.move();
                tool.display();
            });
        }

        class Tool {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = random(30, 80);
                this.speed = random(-2, 2);
                this.angle = random(TWO_PI);
                this.isHammer = random() > 0.5;
            }

            move() {
                this.x += this.speed * cos(this.angle);
                this.y += this.speed * sin(this.angle);
                if (this.x < 0 || this.x > width) this.angle = PI - this.angle;
                if (this.y < 0 || this.y > height) this.angle = TWO_PI - this.angle;
            }

            display() {
                stroke(0);
                strokeWeight(2);
                fill(this.isHammer ? '#C0392B' : '#2980B9');
                if (this.isHammer) {
                    this.drawHammer();
                } else {
                    this.drawBook();
                }
            }

            drawHammer() {
                push();
                translate(this.x, this.y);
                rotate(this.angle - PI / 4);
                rectMode(CENTER);
                rect(0, 0, this.size * 0.3, this.size);
                rect(0, -this.size / 2, this.size, this.size * 0.2);
                pop();
            }

            drawBook() {
                push();
                translate(this.x, this.y);
                rotate(this.angle);
                rectMode(CENTER);
                rect(0, 0, this.size, this.size * 0.6);
                for (let i = -this.size * 0.25; i <= this.size * 0.25; i += 5) {
                    line(-this.size / 2, i, this.size / 2, i);
                }
                pop();
            }
        }

    </script>
    <a href="https://www.beautyisapattern.com/archive" target="_blank">Explore the Archive</a>
</body>
</html>
