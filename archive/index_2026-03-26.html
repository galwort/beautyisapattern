<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endless Aspirations</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0e0b16;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .archive-link {
            position: fixed;
            bottom: 10px;
            right: 10px;
            color: #a239ca;
            text-decoration: none;
            font-size: 1.2em;
            font-family: Arial, sans-serif;
            transition: color 0.3s ease;
        }

        .archive-link:hover {
            color: #47177f;
        }
    </style>
</head>
<body>

<a href="https://www.beautyisapattern.com/archive" class="archive-link">View Our Archive</a>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
<script>
    let stars = [];
    let starColors = ['#ffffff', '#CFB0FF', '#A683E9'];

    function setup() {
        createCanvas(windowWidth, windowHeight);
        noStroke();
        for (let i = 0; i < 200; i++) {
            stars.push(new Star());
        }
    }

    function draw() {
        background(20);
        for (let star of stars) {
            star.update();
            star.show();
        }
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
        stars = [];
        for (let i = 0; i < 200; i++) {
            stars.push(new Star());
        }
    }

    class Star {
        constructor() {
            this.x = random(width);
            this.y = random(height);
            this.z = random(width);
            this.pz = this.z;
            this.color = random(starColors);
        }

        update() {
            this.z = this.z - 2;
            if (this.z < 1) {
                this.z = width;
                this.x = random(width);
                this.y = random(height);
                this.pz = this.z;
            }
        }

        show() {
            fill(this.color);
            let sx = map(this.x / this.z, 0, 1, 0, width);
            let sy = map(this.y / this.z, 0, 1, 0, height);

            let r = map(this.z, 0, width, 8, 0);
            ellipse(sx, sy, r, r);

            let px = map(this.x / this.pz, 0, 1, 0, width);
            let py = map(this.y / this.pz, 0, 1, 0, height);

            this.pz = this.z;

            stroke('rgba(255,255,255,0.2)');
            line(px, py, sx, sy);
        }
    }
</script>

</body>
</html>
