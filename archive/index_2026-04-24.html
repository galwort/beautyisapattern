<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uncharted Patterns</title>
  <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #1a1a1a;
    }
    .archive-link {
      position: absolute;
      bottom: 15px;
      right: 20px;
      color: #e0e0e0;
      text-decoration: none;
      font-family: Arial, sans-serif;
      font-size: 14px;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px 15px;
      border-radius: 5px;
      transition: background 0.3s, color 0.3s;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .archive-link:hover {
      background: rgba(0, 0, 0, 0.8);
      color: #ffffff;
    }
  </style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <script>
    let stars = [];

    function setup() {
      createCanvas(windowWidth, windowHeight);
      for (let i = 0; i < 200; i++) {
        stars.push(new Star(random(width), random(height), random(1, 4), color(random(200, 255), random(200, 255), 255, 150)));
      }
    }

    function draw() {
      background(30, 30, 60);
      translate(width / 2, height / 2);
      for (let star of stars) {
        star.update();
        star.display();
      }
    }

    class Star {
      constructor(x, y, size, col) {
        this.x = x - width / 2;
        this.y = y - height / 2;
        this.size = size;
        this.col = col;
        this.angle = random(TWO_PI);
      }

      update() {
        this.angle += 0.02;
        this.x += 0.1 * cos(this.angle);
        this.y += 0.1 * sin(this.angle);
      }

      display() {
        fill(this.col);
        noStroke();
        ellipse(this.x, this.y, this.size, this.size);
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>
  <a href="https://www.beautyisapattern.com/archive" class="archive-link">Explore the Archive</a>
</body>
</html>
