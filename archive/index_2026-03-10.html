<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awakening Dreams</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0c0f1a;
        }
        #archive-link {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #ffd700;
            z-index: 10;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            text-decoration: none;
            background-color: rgba(12, 15, 26, 0.8);
            padding: 5px;
            border-radius: 3px;
            transition: background-color 0.3s;
        }
        #archive-link:hover {
            background-color: rgba(25, 30, 50, 0.8);
        }
    </style>
</head>
<body>
    <a id="archive-link" href="https://www.beautyisapattern.com/archive" target="_blank">Visit Archive</a>
    <script>
        let stars = [];
        let clouds = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < 200; i++) {
                stars.push(createStar());
            }
            for (let i = 0; i < 10; i++) {
                clouds.push(createCloud());
            }
        }

        function draw() {
            background(20, 24, 40);
            drawStars();
            drawClouds();
        }

        function createStar() {
            return {
                x: random(width),
                y: random(height / 2),
                z: random(width)
            };
        }

        function drawStars() {
            fill(255);
            noStroke();
            for (let i = 0; i < stars.length; i++) {
                let star = stars[i];
                let sx = map(star.x / star.z, 0, 1, 0, width);
                let sy = map(star.y / star.z, 0, 1, 0, height / 2);

                let size = map(star.z, 0, width, 5, 0);
                ellipse(sx, sy, size, size);

                star.z -= 5;
                if (star.z < 1) {
                    stars[i] = createStar();
                }
            }
        }

        function createCloud() {
            return { x: random(width), y: random(height - 100, height), speed: random(0.5, 2) }; 
        }

        function drawClouds() {
            fill(255, 50);
            noStroke();
            for (let i = 0; i < clouds.length; i++) {
                let cloud = clouds[i];
                ellipse(cloud.x, cloud.y, 100, 50);
                cloud.x += cloud.speed;
                if (cloud.x > width + 50) {
                    clouds[i] = createCloud();
                    clouds[i].x = -50;
                }
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
