<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Path of Virtue</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f2efe9;
        }
        a {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #333;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let shapes = [];
        let numShapes = 100;  // Number of animated shapes
        let mainColor = '#4a4e69';
        let accentColor = '#9a8c98';

        function setup() {
            createCanvas(windowWidth, windowHeight);
            noStroke();
            for (let i = 0; i < numShapes; i++) {
                shapes.push(new VirtueShape(random(width), random(height), random(100)));
            }
        }

        function draw() {
            background('#fefae0');
            for (const shape of shapes) {
                shape.move();
                shape.display();
            }
        }

        class VirtueShape {
            constructor(x, y, offset) {
                this.x = x;
                this.y = y;
                this.offset = offset;
                this.size = random(5, 20);
                this.angle = random(TWO_PI);
                this.color = lerpColor(color(mainColor), color(accentColor), random(1));
                this.speed = 0.001 * this.size;
            }

            move() {
                this.angle += this.speed;
                this.x += cos(this.angle) * 0.5;
                this.y += sin(this.angle) * 0.5;

                // Wrap around edges
                if (this.x < 0) this.x += width;
                if (this.x > width) this.x -= width;
                if (this.y < 0) this.y += height;
                if (this.y > height) this.y -= height;
            }

            display() {
                fill(this.color);
                ellipse(this.x, this.y, this.size);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
    <a href="https://www.beautyisapattern.com/archive">Visit Gallery Archive</a>
</body>
</html>
