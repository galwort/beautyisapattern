<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growth and Determination</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #191919;
        }
        #archiveLink {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #ffffff;
            text-decoration: none;
            font-family: Arial, sans-serif;
            background-color: #282828;
            padding: 5px 10px;
            border-radius: 5px;
        }
        #archiveLink:hover {
            background-color: #333333;
        }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let flowers = [];
        let weeds = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < 15; i++) {
                let xPos = random(width);
                flowers.push(new Plant(xPos, height, true));
                weeds.push(new Plant(random(width), height, false));
            }
        }

        function draw() {
            background(20, 50, 20);
            for (let flower of flowers) {
                flower.grow();
                flower.display();
            }
            for (let weed of weeds) {
                weed.spread();
                weed.display();
            }
        }

        class Plant {
            constructor(x, y, isFlower) {
                this.x = x;
                this.y = y;
                this.isFlower = isFlower;
                this.size = isFlower ? random(5, 10) : random(3, 6);
                this.speed = isFlower ? random(1, 2) : random(0.5, 1);
                this.color = isFlower ? color(random(200, 255), random(100, 200), random(200, 255)) : color(80, random(100, 150), 80);
                this.bloomed = false;
            }

            grow() {
                if (this.y > height * 0.7 && this.isFlower) {
                    this.y -= this.speed * 0.5;
                } else if (!this.isFlower && random() < 0.05) {
                    this.y -= this.speed;
                    this.x += random(-1, 1);
                }
            }

            spread() {
                if (this.y > height * 0.7 && random() < 0.2) {
                    this.y -= this.speed;
                    this.x += random(-0.5, 0.5);
                }
            }

            display() {
                noStroke();
                if (this.isFlower && this.y < height * 0.7 && !this.bloomed) {
                    this.bloomed = true;
                    this.size *= 1.5;
                }
                fill(this.color);
                ellipse(this.x, this.y, this.size);
            }
        }
    </script>

    <a href="https://www.beautyisapattern.com/archive" id="archiveLink">Explore the Archive</a>

</body>
</html>
