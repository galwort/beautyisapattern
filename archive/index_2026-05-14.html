<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Art of Connection</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #fafafa;
            color: #333333;
            font-family: 'Arial', sans-serif;
        }
        a {
            position: absolute;
            bottom: 15px;
            right: 15px;
            color: #ff6f61;
            text-decoration: none;
        }
    </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
<script>
    let angle = 0;  // Global variable for rotating stars

    function setup() {
        createCanvas(windowWidth, windowHeight);
        noFill();
    }

    function draw() {
        background(250, 248, 245);
        translate(width / 2, height / 2);
  
        // Create a pulsating background with color variations
        for (let a = 0; a < TWO_PI; a += PI / 12) {
            let r = map(sin(angle + a), -1, 1, 150, 200);
            let x = r * cos(a);
            let y = r * sin(a);
            let colorValue = map(sin(angle + a), -1, 1, 0, 255);
            stroke(colorValue, 105, 255 - colorValue, 200);
            drawHeart(x, y, 80, 110);
        }

        angle += 0.007;  // Adjust rotation speed
    }

    function drawHeart(x, y, width, height) {
        beginShape();
        vertex(x, y);
        bezierVertex(x - width / 2, y - height / 2, x - width, y + height / 3, x, y + height);
        bezierVertex(x + width, y + height / 3, x + width / 2, y - height / 2, x, y);
        endShape(CLOSE);
    }
</script>
<a href="https://www.beautyisapattern.com/archive">Explore Archive</a>
</body>
</html>
