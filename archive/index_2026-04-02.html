<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chase the Stars</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0d1b2a;
        }
        #archive-link {
            position: fixed;
            bottom: 10px;
            right: 10px;
            color: #ffffff;
            text-decoration: none;
            background-color: rgba(13, 27, 42, 0.7);
            padding: 10px;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        #archive-link:hover {
            background-color: rgba(13, 27, 42, 0.9);
        }
    </style>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
</head>
<body>

<script>
    let stars = [];

    function setup() {
        createCanvas(windowWidth, windowHeight);
        // Create an array of stars
        for (let i = 0; i < 300; i++) {
            stars.push(new Star());
        }
    }

    function draw() {
        background(13, 27, 42);
        translate(width / 2, height / 2);

        
        // Display each star and update its position
        for (let star of stars) {
            star.update();
            star.show();
        }

        // Create an arc-like path
        stroke(89, 138, 178, 180);
        strokeWeight(2);
        noFill();
        let time = millis() / 1000;
        arc(0, 0, 
            200 + sin(time) * 10, 
            200 + sin(time) * 10, 
            QUARTER_PI, 
            PI + QUARTER_PI 
        );
    }

    class Star {
        constructor() {
            this.x = random(-width, width);
            this.y = random(-height, height);
            this.z = random(width);
            this.sz = this.z;
        }

        update() {
            this.z -= 3;
            if (this.z < 1) {
                this.z = width;
                this.x = random(-width, width);
                this.y = random(-height, height);
                this.sz = this.z;
            }
        }

        show() {
            fill(255);
            noStroke();

            let sx = map(this.x / this.z, 0, 1, 0, width);
            let sy = map(this.y / this.z, 0, 1, 0, height);

            let r = map(this.z, 0, width, 6, 0);
            ellipse(sx, sy, r, r);
        }
    }

</script>
<a id="archive-link" href="https://www.beautyisapattern.com/archive">View Archive</a>
</body>
</html>
