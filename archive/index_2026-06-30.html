<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Illumination Symphony</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #fefae0;
        }
        #archive-link {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #6c757d;
            text-decoration: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #archive-link:hover {
            text-decoration: underline;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
</head>
<body>
    <a id="archive-link" href="https://www.beautyisapattern.com/archive">Explore the Archive</a>
    <script>
        const particles = [];
        let sparkles = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for(let i = 0; i < 150; i++) {
                particles.push(new Particle());
            }
        }

        function draw() {
            background(254, 250, 224);
            for(const particle of particles) {
                particle.update();
                particle.show();
            }
            for(const sparkle of sparkles) {
                sparkle.update();
                sparkle.show();
            }
            sparkles = sparkles.filter(sparkle => !sparkle.finished());
        }

        class Particle {
            constructor() {
                this.x = random(windowWidth);
                this.y = random(windowHeight);
                this.size = random(5, 10);
                this.alpha = 255;
            }

            update() {
                this.y -= 1;
                this.alpha -= 5;
                if(this.y < 0) {
                    this.y = windowHeight;
                    this.x = random(windowWidth);
                    this.alpha = random(200, 255);
                }
                if (this.alpha < 100) {
                    sparkles.push(new Sparkle(this.x, this.y));
                    this.alpha = 255;
                }
            }

            show() {
                noStroke();
                fill(255, this.alpha);
                ellipse(this.x, this.y, this.size);
            }
        }

        class Sparkle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.r = random(5, 15);
                this.alpha = 255;
            }

            update() {
                this.r += 1;
                this.alpha -= 15;
            }

            finished() {
                return this.alpha < 0;
            }

            show() {
                noFill();
                stroke(248, 192, 200, this.alpha);
                strokeWeight(2);
                ellipse(this.x, this.y, this.r * 2);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
