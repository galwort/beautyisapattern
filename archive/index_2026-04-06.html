<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wisdom's Pathway</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0d1b2a;
        }

        #archive-link {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #ffffff;
            text-decoration: none;
            background: rgba(13, 27, 42, 0.8);
            padding: 5px 15px;
            border-radius: 5px;
            font-family: 'Lato', sans-serif;
            transition: background 0.3s ease, color 0.3s ease;
        }

        #archive-link:hover {
            background: rgba(255, 255, 255, 0.8);
            color: #0d1b2a;
        }
    </style>
</head>
<body>
    <script>
        let stars = [];
        let wisdomPaths = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            noStroke();

            // Create stars
            for (let i = 0; i < 150; i++) {
                stars.push(new Star());
            }

            // Create wisdom paths
            for (let j = 0; j < 40; j++) {
                wisdomPaths.push(new WisdomPath());
            }
        }

        function draw() {
            background(13, 27, 42, 200); // Deep blue backdrop

            // Display stars
            for (let star of stars) {
                star.update();
                star.display();
            }

            // Display wisdom paths
            for (let path of wisdomPaths) {
                path.update();
                path.display();
            }
        }

        class Star {
            constructor() {
                this.x = random(width);
                this.y = random(height);
                this.z = random(width);
                this.pz = this.z;
            }

            update() {
                this.z -= 2;
                if (this.z < 1) {
                    this.z = width;
                    this.x = random(width);
                    this.y = random(height);
                    this.pz = this.z;
                }
            }

            display() {
                fill(255);
                noStroke();

                let sx = map(this.x / this.z, 0, 1, 0, width);
                let sy = map(this.y / this.z, 0, 1, 0, height);

                let r = map(this.z, 0, width, 8, 0);
                ellipse(sx, sy, r, r);
            }
        }

        class WisdomPath {
            constructor() {
                this.x = random(width);
                this.y = random(height);
                this.angle = random(TWO_PI);
                this.length = random(100, 200);
                this.speed = random(0.01, 0.05);
                this.offset = 0;
            }

            update() {
                this.offset += this.speed;
                this.drawX = this.x + cos(this.angle + this.offset) * this.length;
                this.drawY = this.y + sin(this.angle + this.offset) * this.length;
            }

            display() {
                strokeWeight(map(sin(this.offset), -1, 1, 1, 3));
                stroke(255, map(sin(this.offset), -1, 1, 100, 255));
                line(this.x, this.y, this.drawX, this.drawY);
            }
        }


        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
    <a id="archive-link" href="https://www.beautyisapattern.com/archive" target="_blank">Visit Archive</a>
</body>
</html>
