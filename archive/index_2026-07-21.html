<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endless Journey</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #e0e7ff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
        }
        #archive-link {
            position: absolute;
            bottom: 15px;
            right: 15px;
            text-decoration: none;
            font-size: 14px;
            color: #4c51bf;
            transition: color 0.3s;
        }
        #archive-link:hover {
            color: #2d3748;
        }
    </style>
</head>
<body>
    <div id="sketch-holder"></div>
    
    <a id="archive-link" href="https://www.beautyisapattern.com/archive">Explore the Archive</a>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let numShapes = 10;
        let angle = 0;
        let radius;

        function setup() {
            let canvas = createCanvas(window.innerWidth, window.innerHeight);
            canvas.parent('#sketch-holder');
            radius = min(width, height) / 4;
            colorMode(HSB, 360, 100, 100);
        }

        function draw() {
            background(240, 60, 100);
            translate(width / 2, height / 2);

            // Spiral path
            for (let i = 0; i < numShapes; i++) {
                let phase = angle + i * PI / numShapes;

                let x = radius * cos(phase + frameCount * 0.02);
                let y = radius * sin(phase + frameCount * 0.02);

                fill((frameCount + i * 30) % 360, 70, 90);
                ellipse(x, y, 45, 45);
            }

            radius -= 0.5;
            if(radius < 0) radius = min(width, height) / 4;

            angle += 0.03;
        }

        function windowResized() {
            resizeCanvas(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
