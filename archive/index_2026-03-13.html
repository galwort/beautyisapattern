<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Path to Enduring Happiness</title>
    <link rel="shortcut icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f0f8ff;
        }
        #archive {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-family: Arial, sans-serif;
            font-size: 14px;
            color: #333;
            text-decoration: none;
            background: rgba(255,255,255,0.8);
            padding: 5px 10px;
            border-radius: 5px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.3);
            transition: background-color 0.3s ease;
        }

        #archive:hover {
            background-color: #d3d3d3;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.3.1/p5.js"></script>
    <script>
        let arcs = [];
        let colors = ['#ff6f61', '#2ec4b6', '#e71d36', '#f4a261', '#264653'];
        
        class Arc {
            constructor(x, y, diameter, col) {
                this.x = x;
                this.y = y;
                this.diameter = diameter;
                this.color = col;
                this.startAngle = random(0, PI);
                this.angleIncrement = random(0.005, 0.02);
            }

            update() {
                this.startAngle += this.angleIncrement;
                if (this.startAngle > TWO_PI) {
                    this.startAngle = 0;
                }
            }

            display() {
                stroke(this.color);
                strokeWeight(2);
                noFill();
                let endAngle = this.startAngle + random(PI/4, THREE_QUARTERS_PI);
                arc(this.x, this.y, this.diameter, this.diameter, this.startAngle, endAngle);
            }
        }

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < 50; i++) {
                let x = random(width);
                let y = random(height);
                let diameter = random(50, 150);
                let col = random(colors);
                arcs.push(new Arc(x, y, diameter, col));
            }
        }

        function draw() {
            background('#f0f8ff');
            arcs.forEach(arc => {
                arc.update();
                arc.display();
            });
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</head>
<body>
    <a id="archive" href="https://www.beautyisapattern.com/archive" target="_blank">Visit the Archive</a>
</body>
</html>
