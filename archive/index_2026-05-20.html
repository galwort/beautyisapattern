<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echoes of Thought</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #271f30;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        a {
            color: #f4a261;
            text-decoration: none;
            font-family: 'Arial', sans-serif;
            font-size: 1rem;
            margin-top: 20px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/p5"></script>
    <script>
        let lines = [];
        const totalLines = 10;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < totalLines; i++) {
                lines.push({
                    x1: random(width),
                    y1: random(height),
                    x2: random(width),
                    y2: random(height),
                    speedX: random(-2, 2),
                    speedY: random(-2, 2),
                    age: 0,
                });
            }
        }

        function draw() {
            background(39, 31, 48, 50);

            stroke('#f4a261');
            strokeWeight(2);
            noFill();

            lines.forEach(line => {
                line.age += 0.01;
                line.x1 += line.speedX * cos(line.age);
                line.y1 += line.speedY * sin(line.age);
                line.x2 += line.speedX * sin(line.age);
                line.y2 += line.speedY * cos(line.age);

                line.x1 = constrain(line.x1, 0, width);
                line.y1 = constrain(line.y1, 0, height);
                line.x2 = constrain(line.x2, 0, width);
                line.y2 = constrain(line.y2, 0, height);

                line.speedX = random(-0.02, 0.02);
                line.speedY = random(-0.02, 0.02);

                line(line.x1, line.y1, line.x2, line.y2);
            });
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</head>
<body>
    <a href="https://www.beautyisapattern.com/archive">Explore the Archive</a>
</body>
</html>
