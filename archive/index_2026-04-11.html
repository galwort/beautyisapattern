<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golf's Hidden Reflection</title>
    <link rel="shortcut icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f0f0f5;
            font-family: Arial, sans-serif;
        }

        #archive-link {
            position: fixed;
            bottom: 10px;
            right: 15px;
            text-decoration: none;
            color: #333;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 8px 12px;
            border-radius: 7px;
            transition: background-color 0.3s;
        }

        #archive-link:hover {
            background-color: #e0e0eb;
        }
    </style>
</head>
<body>

<div id="sketch-holder"></div>
<a id="archive-link" href="https://www.beautyisapattern.com/archive">Explore More</a>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
<script>
    let ball;
    let angle = 0;

    function setup() {
        let myCanvas = createCanvas(windowWidth, windowHeight);
        myCanvas.parent('sketch-holder');
        ball = new GolfBall();
    }

    function draw() {
        background('#f0f0f5');

        // Draw the rolling hills
        noStroke();
        fill('#87ceeb');
        for (let x = 0; x < width; x += 100) {
            let offset = sin(x * 0.01 + frameCount * 0.02) * 20;
            circle(x, height * 0.8 + offset, 150);
        }

        // Flag Animation
        drawFlag();

        // Draw and move the golf ball
        ball.display();
        ball.update();
    }

    function drawFlag() {
        let flagHeight = 60;
        let flagX = width / 2;
        let flagY = height * 0.42;

        // Draw pole
        stroke('#8b4513');
        strokeWeight(4);
        line(flagX, flagY, flagX, height);

        // Draw flag animation
        noStroke();
        fill('#ff6347');
        beginShape();
        vertex(flagX, flagY);
        vertex(flagX + cos(angle) * 30, flagY + sin(angle) * 15);
        vertex(flagX, flagY + flagHeight);
        endShape(CLOSE);
        
        angle += 0.05;
    }

    class GolfBall {
        constructor() {
            this.x = 100;
            this.y = height * 0.75;
            this.diameter = 30;
            this.speed = 2;
        }

        display() {
            fill('#fff');
            noStroke();
            ellipse(this.x, this.y, this.diameter);
        }

        update() {
            this.x += this.speed;
            if (this.x > width || this.x < 0) this.speed *= -1;
        }
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
    }
</script>

</body>
</html>
