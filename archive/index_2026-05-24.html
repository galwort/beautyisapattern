<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Symphony of Choice</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #f0f8ff;
            font-family: 'Courier New', Courier, monospace;
            color: #333;
        }

        .footer {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 0.9em;
        }

        a {
            color: #0056b3;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<main>
    <!-- p5.js Sketch -->
    <script>
        let colorSet;
        let gridStep = 60;
        let flowAngle = 0;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            colorSet = ["#ff7373", "#ffb773", "#ffff73", "#b7ff73", "#73ffd8", "#73b7ff"];
        }

        function draw() {
            background('#f0f8ff');
            flowAngle += 0.01;
            for (let y = gridStep / 2; y <= height; y += gridStep) {
              for (let x = gridStep / 2; x <= width; x += gridStep) {
                let noiseValue = noise(x * 0.1, y * 0.1, flowAngle);
                let angle = map(noiseValue, 0, 1, 0, TWO_PI);
                let size = map(noiseValue, 0, 1, 20, 60);
                let swirlColor = colorSet[int(noiseValue * colorSet.length)];

                push();
                translate(x, y);
                rotate(angle);
                fill(swirlColor);
                stroke(0, 50);
                strokeWeight(1);
                ellipse(0, 0, size, size * 2);
                pop();
              }
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</main>

<div class="footer">
    Explore the <a href="https://www.beautyisapattern.com/archive" target="_blank">Patterns Archive</a>
</div>

</body>
</html>
