<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmony in the Symphony of Nature</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #eef2f3;
            font-family: Arial, sans-serif;
        }
        #footer {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 0.9em;
            color: #333;
        }
        #footer a {
            color: #004d40;
            text-decoration: none;
            padding: 5px;
        }
        #footer a:hover {
            text-decoration: underline;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let birds = [];
        let totalBirds = 15;
        let colors = ['#EC407A', '#AB47BC', '#7E57C2', '#42A5F5', '#26A69A', '#8D6E63', '#FF7043', '#9CCC65', '#FFA000', '#FF1744'];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < totalBirds; i++) {
                birds.push(new Bird(random(width), random(height), colors[i % colors.length]));
            }
        }

        function draw() {
            background('#eef2f3');
            for (let bird of birds) {
                bird.move();
                bird.display();
            }
        }

        class Bird {
            constructor(x, y, col) {
                this.x = x;
                this.y = y;
                this.size = random(15, 35);
                this.col = col;
                this.xSpeed = random(-1.5, 1.5);
                this.ySpeed = random(-1.5, 1.5);
            }

            move() {
                this.x += this.xSpeed;
                this.y += this.ySpeed;

                // Bounce off the edges
                if (this.x > width || this.x < 0) this.xSpeed *= -1;
                if (this.y > height || this.y < 0) this.ySpeed *= -1;
            }

            display() {
                stroke(255);
                strokeWeight(2);
                fill(this.col);
                push();
                translate(this.x, this.y);
                rotate(atan2(this.ySpeed, this.xSpeed));
                ellipse(0, 0, this.size, this.size / 2);
                pop();
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</head>
<body>
    <div id="footer">
        <a href="https://www.beautyisapattern.com/archive">Explore the Archive</a>
    </div>
</body>
</html>
