<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radiance of the Heart</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #111;
        }
        #archive-link {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 16px;
            text-decoration: none;
            color: white;
        }
    </style>
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.4.0/lib/p5.js"></script>
    <script>
        let sparkles = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
        }

        function draw() {
            background(0, 20);
            addSparkle();

            for (let sparkle of sparkles) {
                sparkle.update();
                sparkle.display();

                if (sparkle.life <= 0) {
                    sparkles.splice(sparkles.indexOf(sparkle), 1);
                }
            }
        }

        function addSparkle() {
            if (random() < 0.1) {
                let x = random(width);
                let y = random(height);
                let sparkColor = color(255);
                sparkles.push(new Sparkle(x, y, sparkColor));
            }
        }

        class Sparkle {
            constructor(x, y, c) {
                this.position = createVector(x, y);
                this.color = c
                this.life = 255; // Transparency decreases over time
            }

            update() {
                this.position.y -= 1; // Moves upwards
                this.life -= 3;      // Fades out
            }

            display() {
                noStroke();
                fill(red(this.color), green(this.color), blue(this.color), this.life);
                ellipse(this.position.x, this.position.y, 8);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>

    <a id="archive-link" href="https://www.beautyisapattern.com/archive">Visit the Archive</a>
</body>
</html>
