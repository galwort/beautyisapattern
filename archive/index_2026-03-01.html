<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <title>The Art of Living</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(to top right, #ff9a9e, #fad0c4, #fad0c4);
        }
        .footer {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-family: Arial, sans-serif;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="footer">
        <a href="https://www.beautyisapattern.com/archive" target="_blank" style="text-decoration: none; color: #ffffff9e;">Explore Our Archive of Inspiration</a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let hearts = [];
        
        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < 50; i++) {
                hearts.push(new Heart(random(width), random(height)));
            }
        }

        function draw() {
            background(0, 0, 0, 30);
            for (let heart of hearts) {
                heart.move();
                heart.display();
            }
        }

        class Heart {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = random(15, 30);
                this.speed = random(0.5, 1.5);
                this.color = color(255, random(100, 200), random(100, 200), 150);
            }

            move() {
                this.y -= this.speed;
                this.x += sin(frameCount / 30) * 2;
                if (this.y < -this.size) {
                    this.y = height + this.size;
                    this.x = random(width);
                }
            }

            display() {
                push();
                translate(this.x, this.y);
                fill(this.color);
                noStroke();
                beginShape();
                let angle = PI / 5;
                let heartSize = this.size / 2;
                for (let i = 0; i < TWO_PI; i += 0.01) {
                    let r = heartSize * 16 * pow(sin(i), 3);
                    let x = r * cos(i);
                    let y = -r * sin(i);
                    vertex(x, y);
                }
                endShape(CLOSE);
                pop();
            }
        }
    </script>

</body>
</html>
