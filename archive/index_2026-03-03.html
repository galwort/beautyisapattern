<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="An artistic illustration encapsulating the potency of actions over mere intentions.">
  <title>Ripple of Deeds</title>
  <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #fff;
    }
    a {
      position: absolute;
      bottom: 10px;
      left: 10px;
      color: #555;
      text-decoration: none;
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body>
  <script>
    const maxParticles = 100;
    let particles = [];

    function setup() {
      createCanvas(windowWidth, windowHeight);
      for (let i = 0; i < maxParticles; i++) {
        particles.push(new Particle(random(width), random(height)));
      }
    }

    function draw() {
      background(255, 220, 200, 25); // A subtle contrast
      particles.forEach(p => p.update());
      particles.forEach(p => p.display());
    }

    class Particle {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.angle = random(TWO_PI);
        this.speed = random(0.5, 2);
        this.size = random(3, 8);
      }

      update() {
        this.x += this.speed * cos(this.angle);
        this.y += this.speed * sin(this.angle);
        this.angle += random(-0.1, 0.1);

        // Wrap-around to give a continuous motion effect
        if (this.x > width + this.size) this.x = -this.size;
        if (this.y > height + this.size) this.y = -this.size;
        if (this.x < -this.size) this.x = width + this.size;
        if (this.y < -this.size) this.y = height + this.size;
      }

      display() {
        fill(255, 100);
        noStroke();
        ellipse(this.x, this.y, this.size * 2);
        fill(150, 150, 250, 70);
        ellipse(this.x, this.y, this.size);
      }
    }
  </script>

  <a href="https://www.beautyisapattern.com/archive">View Archive</a>
</body>
</html>
