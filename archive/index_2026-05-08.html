<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="An artistic representation of intuition through dynamic animation."
    />
    <title>The Leap of Intuition</title>
    <link
      rel="icon"
      href="https://www.beautyisapattern.com/favicon.ico"
      type="image/x-icon"
    />
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #080c1f;
      }

      #archive {
        position: fixed;
        bottom: 15px;
        left: 15px;
        background-color: rgba(0, 0, 0, 0.7);
        color: #ffffff;
        padding: 8px 12px;
        border-radius: 5px;
        font-family: Arial, sans-serif;
        text-decoration: none;
        font-weight: bold;
        transition: background-color 0.3s ease;
      }

      #archive:hover {
        background-color: rgba(255, 204, 0, 0.8);
      }
    </style>
  </head>

  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>

    <script>
      let numPoints = 200;
      let points = [];

      function setup() {
        createCanvas(windowWidth, windowHeight);
        noStroke();
        for (let i = 0; i < numPoints; i++) {
          let a = random(TWO_PI);
          points.push({
            x: cos(a) * random(200),
            y: sin(a) * random(200),
            r: random(5, 15),
          });
        }
      }

      function draw() {
        background(8, 12, 31, 100);

        translate(width / 2, height / 2);

        points.forEach((p) => {
          fill(255, 204, 0, 180);
          ellipse(p.x, p.y, p.r);

          p.x += cos(frameCount / 100) * 0.5;
          p.y += sin(frameCount / 100) * 0.5;
        });

        rotate(frameCount / 200);

        let mainCircleRadius = 250;

        for (let i = 0; i < 10; i++) {
          rotate(TWO_PI / 10);

          let nx = cos(frameCount / 50) * mainCircleRadius;
          let ny = sin(frameCount / 50) * mainCircleRadius;

          fill(255, 204, 0, 150);
          ellipse(nx, ny, 50);
        }
      }

      function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
      }
    </script>

    <a id="archive" href="https://www.beautyisapattern.com/archive">
      Visit the Archive
    </a>
  </body>
</html>
