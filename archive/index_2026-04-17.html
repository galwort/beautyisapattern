<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resilient Harmony</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico"/>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #e0f7fa;  /* Calming blue background */
        }
        .archive-link {
            position: absolute;
            bottom: 15px;
            right: 15px;
            color: #ffffff;
            background: #00796b;
            padding: 7px 12px;
            border-radius: 8px;
            text-decoration: none;
            font-family: "Arial", sans-serif;
            font-weight: bold;
            transition: background 0.3s ease;
        }
        .archive-link:hover {
            background: #004d40;
        }
    </style>
</head>
<body>

<a class="archive-link" href="https://www.beautyisapattern.com/archive">Explore the Archive</a>

<!-- Including the p5.js library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
<script>
    // Canvas setup
    function setup() {
        createCanvas(windowWidth, windowHeight);
        noStroke(); 
        frameRate(30); // To control animation speed
    }

    // Draw function for animated visuals
    function draw() {
        background(224, 247, 250, 25); // Translucent fill for trailing effect

        // Spheres of invalued resilience
        for (let i = 0; i < 50; i++) {
            fill(lerpColor(color('#004d40'), color('#81c784'), i/50), 50);
            let x = noise(i + frameCount * 0.02) * width;
            let y = noise(i + 100 + frameCount * 0.02) * height;
            let size = noise(i + 200 + frameCount * 0.02) * 50 + 20;
            ellipse(x, y, size, size);
        }

        // Waveform of stability
        push();
        translate(0, height / 2);
        stroke('#00796b');
        strokeWeight(1.5);
        noFill();
        beginShape();
        for (let x = 0; x < width; x += 5) {
            let y = sin(x * 0.05 + frameCount * 0.05) * 50;
            vertex(x, y);
        }
        endShape();
        pop();
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
    }
</script>
</body>
</html>
