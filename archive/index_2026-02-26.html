<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <title>Harmony Within</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f0f8ff;
            font-family: Arial, sans-serif;
        }
        footer {
            position: fixed;
            bottom: 20px;
            right: 20px;
        }
        a {
            color: #004080;
            text-decoration: none;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div id="p5Canvas"></div>
    <footer>
        <a href="https://www.beautyisapattern.com/archive">Explore the Archive</a>
    </footer>

    <script>
        function setup() {
            createCanvas(windowWidth, windowHeight);
            blendMode(ADD);
        }

        function draw() {
            background(240, 248, 255, 10);
            let t = frameCount * 0.01;

            for (let i = 0; i < 50; i++) {
                let angle = radians(i * 7.2 + t);
                let x = width / 2 + cos(angle + t) * i * 10;
                let y = height / 2 + sin(angle - t) * i * 10;
                let size = 10 + 5 * sin(t + i);
                fill(100, 150 + i * 2, 255 - i * 5, 150);
                noStroke();
                ellipse(x, y, size);
            }

            push();
            translate(width / 2, height / 2);
            rotate(t);

            for (let i = 0; i < 360; i+= 36) {
                let radius = 150 + 100 * sin(t + i);
                let x = cos(radians(i)) * radius;
                let y = sin(radians(i)) * radius;
                fill(255, 204, 100, 150);
                ellipse(x, y, 10 + 5 * sin(t + i));
            }
            pop();
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
