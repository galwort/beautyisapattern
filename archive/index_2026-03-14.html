<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <title>Vision in Motion</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #archive-link {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #ffffff;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: all 0.4s;
        }
        #archive-link:hover {
            border-bottom: 1px solid white;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        function setup() {
            createCanvas(windowWidth, windowHeight);
            noFill();
            
            strokeWeight(2);
        }

        let time = 0;
        
        function draw() {
            background(15);
            translate(width / 2, height / 2);

            for (let i = 0; i < TAU; i += PI / 6) {  
                let clearDistance = cos(time + i) * 150 + 200;
                let blurDistance = sin(time + i) * 30 + 100;

                // Rearview Mirrors - Clear Spirals
                stroke(255, 100, 100, 180);
                line(0, 0, 
                     clearDistance * cos(i), 
                     clearDistance * sin(i));
                
                // Windshield - Blurry Spirals
                stroke(100, 100, 255, 80);
                line(blurDistance * cos(i + 0.1), 
                     blurDistance * sin(i + 0.1), 
                     blurDistance * cos(i - 0.1), 
                     blurDistance * sin(i - 0.1));
            }
            time += 0.05;
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</head>
<body>
    <a id="archive-link" href="https://www.beautyisapattern.com/archive">Visit the Archive</a>
</body>
</html>
