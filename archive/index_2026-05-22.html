<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Flow of Time</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #0d1117;
        }
        a {
            position: fixed;
            bottom: 20px;
            left: 20px;
            text-decoration: none;
            color: #58a6ff;
            background-color: rgba(255, 255, 255, 0.1);
            padding: 10px 15px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        a:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <script>
        let particles = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            colorMode(HSB, 360, 100, 100, 100);
            for(let i = 0; i < 300; i++) {
                particles.push(new Particle());
            }
        }

        function draw() {
            background(0, 0, 15);
            for(let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].display();
            }
        }

        class Particle {
            constructor() {
                this.position = createVector(random(width/4, 3*width/4), random(height/4, 3*height/4));
                this.velocity = createVector(random(-2, 2), random(-2, 2));
                this.size = random(5, 15);
                this.hue = map(this.position.y, height, 0, 240, 60);
            }

            update() {
                this.position.add(this.velocity);
                if(this.position.x < 0 || this.position.x > width) {
                    this.velocity.x *= -1;
                }
                if(this.position.y < 0 || this.position.y > height) {
                    this.velocity.y *= -1;
                }
            }

            display() {
                noStroke();
                fill(this.hue, 70, 100, 50);
                ellipse(this.position.x, this.position.y, this.size);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
    <a href="https://www.beautyisapattern.com/archive">Visit the Archive</a>
</body>
</html>
