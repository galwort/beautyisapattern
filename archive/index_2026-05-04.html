<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Abstract animation reflecting the resilience and strength found in overcoming challenges.">
    <title>Resilience Through Adversity</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1d1f21;
        }
        .archive-link {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #f7f3e9;
            font-family: 'Arial', sans-serif;
            font-size: 14px;
            text-decoration: none;
            border: 2px solid #f7f3e9;
            padding: 5px;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .archive-link:hover {
            background: #f7f3e9;
            color: #1d1f21;
        }
    </style>
</head>
<body>
    <script>
        let particles = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < 150; i++) {
                particles.push(new Particle());
            }
        }

        function draw() {
            background(29, 31, 33, 50);
            for (let particle of particles) {
                particle.behaviors();
                particle.update();
                particle.show();
            }
        }

        class Particle {
            constructor() {
                this.pos = createVector(random(width), random(height));
                this.vel = p5.Vector.random2D();
                this.acc = createVector();
                this.target = createVector(random(width), random(height));
                this.r = random(4, 8);
                this.maxspeed = 4;
                this.maxforce = 0.1;
            }

            behaviors() {
                let seek = this.seek(this.target);
                this.applyForce(seek);
                this.edges();
            }

            applyForce(f) {
                this.acc.add(f);
            }

            seek(target) {
                let desired = p5.Vector.sub(target, this.pos);
                let d = desired.mag();
                let speed = this.maxspeed;
                desired.setMag(speed);

                let steer = p5.Vector.sub(desired, this.vel);
                steer.limit(this.maxforce);
                return steer;
            }

            update() {
                this.pos.add(this.vel);
                this.vel.add(this.acc);
                this.acc.mult(0);

                if (frameCount % 120 === 0) {
                    this.newTarget();
                }
            }

            show() {
                strokeWeight(this.r);
                stroke(255, 204, 0, 150);
                point(this.pos.x, this.pos.y);
            }

            newTarget() {
                this.target = createVector(random(width), random(height));
            }

            edges() {
                if (this.pos.x > width) this.pos.x = 0;
                if (this.pos.x < 0) this.pos.x = width;
                if (this.pos.y > height) this.pos.y = 0;
                if (this.pos.y < 0) this.pos.y = height;
            }
        }
    </script>
    <a href="https://www.beautyisapattern.com/archive" class="archive-link">Explore the Archive</a>
</body>
</html>
