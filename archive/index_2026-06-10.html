<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dare to Achieve</title>
    <link rel="icon" type="image/x-icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: linear-gradient(45deg, #0a0a0a, #333);
            font-family: Arial, sans-serif;
        }
        a {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #ccc;
            font-size: 14px;
            text-decoration: none;
            background-color: rgba(50, 50, 50, 0.8);
            padding: 10px 20px;
            border-radius: 5px;
            transition: background 0.3s;
        }
        a:hover {
            color: #fff;
            background-color: #444;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
</head>
<body>
    <a href="https://www.beautyisapattern.com/archive" target="_blank">Explore the Archive</a>
    <script>
        let particles = [];
        let gravity;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            gravity = createVector(0, 0.05);
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle(random(width), random(height)));
            }
        }

        function draw() {
            background(0, 20);
            particles.forEach((particle) => {
                particle.applyForce(gravity);
                particle.update();
                particle.edges();
                particle.display();
            });
        }

        class Particle {
            constructor(x, y) {
                this.position = createVector(x, y);
                this.velocity = createVector(random(-2, 2), random(-2, 2));
                this.acceleration = createVector(0, 0);
                this.size = random(5, 15);
                this.lifeSpan = 255;
            }

            applyForce(force) {
                this.acceleration.add(force);
            }

            update() {
                this.velocity.add(this.acceleration);
                this.position.add(this.velocity);
                this.acceleration.mult(0);
                this.lifeSpan -= 2;
            }

            edges() {
                if (this.position.y > height) {
                    this.velocity.y *= -0.9;
                    this.position.y = height;
                }
                if (this.position.x > width || this.position.x < 0) {
                    this.velocity.x *= -0.9;
                }
            }

            display() {
                stroke(200, this.lifeSpan);
                fill(127, this.lifeSpan);
                ellipse(this.position.x, this.position.y, this.size);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
