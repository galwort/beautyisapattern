<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endless Aspirations</title>
    <link rel="icon" type="image/x-icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body, html {
            margin: 0;
            overflow: hidden;
            height: 100%;
            background-color: #eceff1;
            color: #555;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #archive-link {
            position: absolute;
            bottom: 15px;
            right: 18px;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }
        #archive-link a {
            text-decoration: none;
            color: #2196F3;
        }
        #archive-link a:hover {
            text-decoration: underline;
            color: #1e88e5;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let particles = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            blendMode(ADD);
            for (let i = 0; i < 150; i++) {
                particles.push(new Particle(random(width), random(height), color(150, 123, 255, 50), color(74, 144, 226, 50)));
            }
        }

        function draw() {
            background(236, 239, 241, 25);
            particles.forEach(particle => {
                particle.move();
                particle.display();
            });
        }

        class Particle {
            constructor(x, y, c1, c2) {
                this.pos = createVector(x, y);
                this.vel = createVector(random(-0.5, 0.5), random(-0.5, 0.5));
                this.c1 = c1;
                this.c2 = c2;
            }

            move() {
                this.acc = createVector(cos(frameCount * 0.02) * 0.1, sin(frameCount * 0.02) * 0.1);
                this.vel.add(this.acc);
                this.pos.add(this.vel);
                this.edges();
            }

            display() {
                fill(lerpColor(this.c1, this.c2, noise(this.pos.x * 0.01, this.pos.y * 0.01)));
                ellipse(this.pos.x, this.pos.y, 8, 8);
            }

            edges() {
                if (this.pos.x > width) this.pos.x = 0;
                if (this.pos.x < 0) this.pos.x = width;
                if (this.pos.y > height) this.pos.y = 0;
                if (this.pos.y < 0) this.pos.y = height;
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</head>
<body>
    <div id="archive-link">
        <a href="https://www.beautyisapattern.com/archive" target="_blank" rel="noopener noreferrer">Explore Patterns</a>
    </div>
</body>
</html>
