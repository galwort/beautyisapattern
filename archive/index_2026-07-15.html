<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Perfect Fit</title>
    
    <!-- Linking to P5.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    
    <!-- Favicon -->
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    
    <style>
        body {
            background-color: #e0e0e0;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            color: #333;
        }
        footer {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
        }
        a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            
        }
        
    </style>
</head>
<body>

<main id="canvasContainer"></main>

<footer>
    <a href="https://www.beautyisapattern.com/archive" target="_blank">Visit Our Archive</a>
</footer>

<script>
let shoeSize = 50;
let footSize = 50;
let growShoe = true;

function setup() {
  createCanvas(windowWidth, windowHeight).parent('canvasContainer');
  fill('#7d9bcf');
  noStroke();
}

function draw() {
  background(224);
  
  // Central coordinates
  let centerX = width / 2;
  let centerY = height / 2;

  // Draw the shoe
  drawShoe(centerX - 100, centerY, shoeSize);
  // Draw the foot
  drawFoot(centerX + 100, centerY, footSize);

  // Animate shoe size
  if (growShoe) {
    shoeSize += 0.5;
    footSize -= 0.5;
    if (shoeSize > 80) {
      growShoe = false;
    }
  } else {
    shoeSize -= 0.5;
    footSize += 0.5;
    if (footSize > 80) {
      growShoe = true;
    }
  }
}

function drawShoe(x, y, size) {
  ellipse(x, y, size, size * 0.6);
}

function drawFoot(x, y, size) {
  ellipse(x, y, size * 0.7, size);
}

</script>

</body>
</html>
