<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waves of Passion</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1d1d1d;
        }
        #archive-link {
            position: fixed;
            bottom: 10px;
            right: 10px;
            color: #f0f0f0;
            text-decoration: none;
            font-family: 'Roboto', sans-serif;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            transition: background 0.3s;
        }
        #archive-link:hover {
            background: rgba(255, 255, 255, 0.7);
            color: #1d1d1d;
        }
    </style>
</head>
<body>

<!-- Link to Archive -->
<a id="archive-link" href="https://www.beautyisapattern.com/archive" target="_blank">Explore the Archive</a>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
<script>
    let tonalWaves = [];
    const numTonalWaves = 30;

    function setup() {
        createCanvas(windowWidth, windowHeight);
        noFill();
        strokeWeight(2);
        for (let i = 0; i < numTonalWaves; i++) {
            tonalWaves.push(new TonalWave(random(width), height * 0.5, random(60, 150)));
        }
    }

    function draw() {
        background(29, 29, 29, 25);
        stroke(frameCount % 360, 100, 100);
        tonalWaves.forEach(wave => wave.updateAndDisplay());
    }

    class TonalWave {
        constructor(x, y, initialRadius) {
            this.x = x;
            this.y = y;
            this.radius = initialRadius;
            this.theta = random(TWO_PI);
            this.speed = random(0.01, 0.02);
        }

        updateAndDisplay() {
            this.radius += 0.5 * sin(this.theta);
            this.theta += this.speed;

            for (let angle = 0; angle < TWO_PI; angle += PI / 6) {
                let xOff = this.radius * cos(this.theta * 3 + angle);
                let yOff = this.radius * sin(this.theta * 3 + angle);
                ellipse(this.x + xOff, this.y + yOff, 20, 20);
            }
        }
    }
</script>

</body>
</html>
