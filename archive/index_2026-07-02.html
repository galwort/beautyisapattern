<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journey of Formation</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
        }
        a {
            position: absolute;
            bottom: 20px;
            right: 20px;
            text-decoration: none;
            color: #9AA5B1;
            font-family: Arial, sans-serif;
            font-size: 0.85em;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let circles = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < 100; i++) {
                circles.push(new JourneyCircle(random(width), random(height), random(5, 25), random(1, 5)));
            }
        }

        function draw() {
            background(17, 17, 17, 30);
            circles.forEach(circle => {
                circle.move();
                circle.display();
            });
        }

        class JourneyCircle {
            constructor(x, y, size, speed) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.speed = speed;
                this.angle = random(TWO_PI);
                this.currentColor = color(random(100, 255), random(100, 255), random(100, 255));
            }

            move() {
                this.angle += random(-0.05, 0.05);
                this.x += cos(this.angle) * this.speed;
                this.y += sin(this.angle) * this.speed;
                this.x = (this.x + width) % width;
                this.y = (this.y + height) % height;
            }

            display() {
                fill(lerpColor(this.currentColor, color(255), 0.2));
                noStroke();
                ellipse(this.x, this.y, this.size);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</head>
<body>
    <a href="https://www.beautyisapattern.com/archive">View Archive</a>
</body>
</html>
