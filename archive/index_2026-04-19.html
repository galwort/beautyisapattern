<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Path of Tranquility</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1f1f2e;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: 'Arial', sans-serif;
            color: #f5f5f5;
        }

        a {
            margin-top: 20px;
            color: #f5ab6f;
            text-decoration: none;
            font-size: 18px;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let particles = [];

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.r = map(noise(this.x, this.y), 0, 1, 5, 20);
                this.angle = random(TWO_PI);
            }

            move() {
                this.x += cos(this.angle) * 0.5;
                this.y += sin(this.angle) * 0.5;
                this.angle += map(noise(this.x * 0.01, this.y * 0.01), 0, 1, -0.05, 0.05);
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }

            display() {
                fill(200, 100, 255, 100);
                ellipse(this.x, this.y, this.r);
            }
        }

        function setup() {
            createCanvas(windowWidth, windowHeight * 0.9);
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle(random(width), random(height)));
            }
        }

        function draw() {
            background('#1f1f2e');
            for (let particle of particles) {
                particle.move();
                particle.display();
            }
        }
    </script>
</head>
<body>
    <a href="https://www.beautyisapattern.com/archive">Visit the Archive</a>
</body>
</html>
