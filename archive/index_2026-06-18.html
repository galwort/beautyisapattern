<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Power of Balance</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(to right, #e3f2fd, #bbdefb);
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        a {
            position: absolute;
            bottom: 10px;
            right: 10px;
            text-decoration: none;
            color: #0d47a1;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let angle = 0;
        let scale = 1;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            noStroke();
        }

        function draw() {
            clear();
            background(255, 255, 240, 200);

            let centerX = width / 2;
            let centerY = height / 2;

            // Draw the stable circle for wisdom
            fill(70, 130, 180, 200);
            let wisdomSize = 100 + 10 * sin(millis() / 1000);
            ellipse(centerX, centerY, wisdomSize);

            // Draw a pulsing square for strength
            push();
            rectMode(CENTER);
            translate(centerX + 150 * cos(angle), centerY + 150 * sin(angle));
            rotate(angle);
            fill(255, 160, 122, 180);
            let strengthSize = map(sin(angle), -1, 1, 50, 120);
            rect(0, 0, strengthSize * scale);
            pop();

            // Update angle and scale dynamically
            angle += 0.03;
            scale = sin(angle) >= 0 ? 1 : -1;
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>

    <a href="https://www.beautyisapattern.com/archive">Explore More Patterns</a>
</body>
</html>
