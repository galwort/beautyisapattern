<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen on the Mountain Peak</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: linear-gradient(to top, #1a2a6c, #b21f1f, #fdbb2d); /*Smooth dawn gradient*/
            color: #fff;
            font-family: Arial, sans-serif;
        }
        #archiveLink {
            position: fixed;
            bottom: 10px;
            right: 10px;
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            border: 1px solid #fff;
            padding: 5px;
            border-radius: 5px;
            transition: all 0.3s;
        }
        #archiveLink:hover {
            background-color: #fff;
            color: #000;
        }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let particles = [];
        const numParticles = 200;
       
        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < numParticles; i++) {
                particles.push(new Particle(random(width), random(height)));
            }
        }

        function draw() {
            background(26, 42, 108, 100); // Breeze with clarity
            particles.forEach(particle => {
                particle.update();
                particle.show();
            });
        }

        class Particle {
            constructor(x, y) {
                this.pos = createVector(x, y);
                this.vel = createVector(0, 0);
                this.acc = createVector(0, 0);
                this.maxSpeed = 2;
            }

            update() {
                let mouse = createVector(mouseX, mouseY);
                this.acc = p5.Vector.sub(mouse, this.pos);
                this.acc.setMag(1);

                this.vel.add(this.acc);
                this.vel.limit(this.maxSpeed);
                this.pos.add(this.vel);
            }

            show() {
                stroke(255);
                strokeWeight(2);
                point(this.pos.x, this.pos.y);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
    <a id="archiveLink" href="https://www.beautyisapattern.com/archive" target="_blank">Visit the Archive</a>
</body>
</html>
