<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Perspectives of Mind</title>
    <link rel="icon" type="image/x-icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background-color: #1E1E1E;
            color: #ffffff;
        }
        #archive-link {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 8px;
            transition: background 0.3s;
        }
        #archive-link:hover {
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
</head>
<body>
    <a href="https://www.beautyisapattern.com/archive" id="archive-link" target="_blank">Explore the Archive</a>
    <script>
        let t = 0;

        function setup() {
            createCanvas(window.innerWidth, window.innerHeight);
            noStroke();
        }

        function draw() {
            background(30, 30, 30);
            t += 0.01;

            for (let x = 0; x < width; x += 20) {
                for (let y = 0; y < height; y += 20) {
                    let offsetX = noise(x * 0.01 + t, y * 0.01) * 100;
                    let offsetY = noise(x * 0.01, y * 0.01 + t) * 100;
                    let size = noise(x * 0.05 + t, y * 0.05) * 25;
                    fill(50 + 80 * noise(t, x * 0.05), 60, 180, 150);
                    ellipse(x + offsetX - 50, y + offsetY - 50, size, size);
                }
            }
        }

        function windowResized() {
            resizeCanvas(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
