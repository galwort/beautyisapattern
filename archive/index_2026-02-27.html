<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Illusions of Grandeur</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
        }
        #archive-link {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #white;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <script>
        let smallOrbs = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            noStroke();
            for (let i = 0; i < 100; i++) {
                smallOrbs.push(new SmallOrb(random(width), random(height), random(5, 15)));
            }
        }

        function draw() {
            background(26);

            // Draw the large central orb
            fill(150, 0, 0, 150);
            ellipse(width / 2, height / 2, height / 3 + sin(frameCount * 0.02) * 20);

            // Draw smaller orbs orbiting the central orb
            translate(width / 2, height / 2);
            for (let i = 0; i < smallOrbs.length; i++) {
                let orb = smallOrbs[i];
                let angle = frameCount * 0.01 * (i + 1);
                orb.x = cos(angle) * (height / 3 + 50 * sin(frameCount * 0.005 * (i + 1)));
                orb.y = sin(angle) * (height / 3 + 50 * sin(frameCount * 0.005 * (i + 1)));
                orb.display();
            }
        }

        class SmallOrb {
            constructor(x, y, diameter) {
                this.x = x;
                this.y = y;
                this.diameter = diameter;
            }

            display() {
                fill(255, 105, 180);
                ellipse(this.x, this.y, this.diameter);
            }
        }
    </script>
    <a id="archive-link" href="https://www.beautyisapattern.com/archive" target="_blank">Explore More Patterns</a>
</body>
</html>
