<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Harmony of Time</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a2e;
            font-family: "Arial", sans-serif;
            color: #fff;
        }
        .archive-link {
            position: absolute;
            bottom: 20px;
            left: 20px;
            text-decoration: none;
            color: #fff;
            background-color: #333;
            padding: 10px 15px;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        .archive-link:hover {
            background-color: #555;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.min.js"></script>
    <script>
        let particles = [];

        function setup() {
            const canvas = createCanvas(windowWidth, windowHeight);
            canvas.style('display', 'block');
            noStroke();
        }

        function draw() {
            background(26, 26, 46, 30); // Subtle fade for trails

            // Add new particle
            particles.push(new Particle(random(width / 2 - 100, width / 2 + 100), 0));

            // Update and display all particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.update();
                p.display();

                if (p.isFinished()) {
                    particles.splice(i, 1);
                }
            }

            // Draw past and future arcs
            drawPastArc();
            drawFutureArc();
        }

        function drawPastArc() {
            stroke(255, 204, 0, 150);
            noFill();
            strokeWeight(4);
            arc(width / 4, height, 300, 300, PI, TWO_PI);
        }

        function drawFutureArc() {
            stroke(100, 143, 255, 150);
            noFill();
            strokeWeight(4);
            arc(3 * width / 4, height, 300, 300, PI, TWO_PI);
        }

        function Particle(x, y) {
            this.x = x;
            this.y = y;
            this.opacity = 255;
            this.size = random(5, 8);

            this.update = function() {
                this.y += random(1, 3);
                this.x += random(-1, 1);
                this.opacity -= 3;
            };

            this.display = function() {
                fill(255, 255, 255, this.opacity);
                ellipse(this.x, this.y, this.size);
            };

            this.isFinished = function() {
                return this.opacity <= 0;
            };
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</head>
<body>
    <a href="https://www.beautyisapattern.com/archive" class="archive-link">Explore the Archive</a>
</body>
</html>
