<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bliss in Motion</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f5f5f5;
            font-family: 'Arial', sans-serif;
        }
        .link {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 14px;
            color: #444;
            text-decoration: none;
        }
        .link:hover {
            color: #000;
        }
    </style>
</head>
<body>
    <div class="link">
        <a href="https://www.beautyisapattern.com/archive">Visit Archive</a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let circles = [];
        
        function setup() {
            createCanvas(windowWidth, windowHeight);
            noStroke();
            // Create an initial set of circles
            for (let i = 0; i < 50; i++) {
                circles.push(new Circle(random(width), random(height)));
            }
        }

        function draw() {
            background('#f5f5f5');
            // Animate circles
            for (let circle of circles) {
                circle.move();
                circle.display();
            }
            // Occasionally add more circles
            if (frameCount % 60 === 0) {
                circles.push(new Circle(random(width), random(height)));
            }
        }

        class Circle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.diameter = random(10, 50);
                this.xSpeed = random(-3, 3);
                this.ySpeed = random(-3, 3);
                this.color = color(random(255), random(150, 200), 0, 150);
            }

            move() {
                this.x += this.xSpeed;
                this.y += this.ySpeed;

                // Bounce off walls
                if (this.x < 0 || this.x > width) {
                    this.xSpeed *= -1;
                }
                if (this.y < 0 || this.y > height) {
                    this.ySpeed *= -1;
                }
            }

            display() {
                fill(this.color);
                ellipse(this.x, this.y, this.diameter, this.diameter);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
