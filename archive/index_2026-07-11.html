<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Effort Moves Mountains</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f2f2f2;
            font-family: Arial, sans-serif;
        }
        .link-to-archive {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #333;
            text-decoration: none;
            background-color: #efefef;
            padding: 5px 10px;
            border-radius: 5px;
            box-shadow: 0 0 2px rgba(0, 0, 0, 0.2);
            transition: background-color 0.3s;
        }
        .link-to-archive:hover {
            background-color: #ddd;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script type="text/javascript">
        let mountains = [];
        let particles = [];
        let workForce = 0.1; // Simulates the force applied over time

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < 4; i++) {
                mountains.push(new Mountain(i * (width / 4), height - random(height / 4, height / 3)));
            }
        }

        function draw() {
            background('#e6e6e6');
            for (let i = 0; i < mountains.length; i++) {
                mountains[i].show();
            }

            if (frameCount % 5 == 0) {
                particles.push(new Particle(random(width), 0));
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].show();
                if (particles[i].finished) {
                    particles.splice(i, 1);
                }
            }
        }

        class Mountain {
            constructor(x, endY) {
                this.x = x;
                this.currentY = height;
                this.endY = endY;
                this.moveStep = random(0.05, 0.15); // Added randomness for realism
            }

            show() {
                fill('#8c8c8c');
                stroke(110, 107, 107);
                strokeWeight(3);
                beginShape();
                vertex(this.x - 120, height);
                this.x -= this.moveStep * workForce;  // As work increases, mountains slightly move
                this.endY = constrain(this.endY + this.moveStep * workForce, height - height / 3, height * 0.9);
                vertex(this.x + 60, this.endY);
                vertex(this.x + 120, height);
                endShape(CLOSE);
            }
        }

        class Particle {
            constructor(x, y) {
                this.position = createVector(x, y);
                this.velocity = createVector(random(-1, 1), random(1, 3))
                this.acceleration = createVector(0, 0.05);
                this.lifetime = 255;
                this.finished = false;
            }
            update() {
                if (this.lifetime > 0) {
                    this.velocity.add(this.acceleration);
                    this.position.add(this.velocity);
                    this.lifetime -= 4;
                } else {
                    this.finished = true;
                }
            }

            show() {
                noStroke();
                fill(80, this.lifetime);
                ellipse(this.position.x, this.position.y, 8);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</head>
<body>
    <a href="https://www.beautyisapattern.com/archive" class="link-to-archive">Explore the Archive</a>
</body>
</html>
