<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cycle of Transformation</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body { margin: 0; overflow: hidden; background-color: #2b2d42; color: #edf2f4; }
        #archive-link {
            position: fixed;
            bottom: 20px;
            right: 20px;
            text-decoration: none;
            color: #ef233c;
            font-size: 14px;
        }
    </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
<script>
    let particles = [];

    function setup() {
        createCanvas(windowWidth, windowHeight);
        for(let i = 0; i < 20; i++) {
            particles.push(new Particle(random(width), random(height)));
        }
    }

    function draw() {
        background(43, 45, 66, 100);  // softened dark background
        for(let p of particles) {
            p.update();
            p.show();
        }
    }

    class Particle {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.angle = random(TWO_PI);
            this.speed = random(0.5, 2);
            this.color = color(random(100, 255), random(100, 255), random(100, 255));
            this.r = 2;
        }

        update() {
            this.x += cos(this.angle) * this.speed;
            this.y += sin(this.angle) * this.speed;
            
            // Wrap around edges
            if(this.x > width) this.x = 0;
            if(this.x < 0) this.x = width;
            if(this.y > height) this.y = 0;
            if(this.y < 0) this.y = height;

            // Simulate the flutter effect
            this.angle += random(-0.05, 0.05);
        }

        show() {
            fill(this.color);
            noStroke();
            ellipse(this.x, this.y, this.r * 3);
            triangle(this.x, this.y - this.r, this.x - this.r, this.y + this.r, this.x + this.r, this.y + this.r);
        }
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
    }
</script>
<a id="archive-link" href="https://www.beautyisapattern.com/archive">Explore the Archive</a>
</body>
</html>
