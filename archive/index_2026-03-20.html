<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reach Beyond Limits</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #00203fff, #adefd1ff);
        }

        .archive-link {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 14px;
            color: #ffffff;
            text-decoration: none;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 5px 10px;
            border-radius: 5px;
            transition: background-color 0.2s;
        }
        
        .archive-link:hover {
            background-color: rgba(0, 0, 0, 0.8);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
</head>
<body>
    <script>
        let particles = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle(random(width), random(height)));
            }
        }

        function draw() {
            background(0, 0, 0, 20);

            particles.forEach((p, index) => {
                p.move();
                p.edges();
                p.display();

                // Simulate a growth or sparkle over time
                if (frameCount % 60 == 0 && index < 60) {
                    particles.push(new Particle(random(width), random(height), true));
                }
            });
        }

        class Particle {
            constructor(x, y, isGrowing = false) {
                this.position = createVector(x, y);
                this.velocity = p5.Vector.random2D();
                this.velocity.mult(random(1, 3));
                this.size = isGrowing ? 3 : 1;
                this.growth = isGrowing ? 0.2 : 0;
            }

            move() {
                this.position.add(this.velocity);
            }

            edges() {
                if (this.position.x < 0 || this.position.x > width) {
                    this.velocity.x *= -1;
                }
                if (this.position.y < 0 || this.position.y > height) {
                    this.velocity.y *= -1;
                }
            }

            display() {
                noStroke();
                fill(255, 211, 147, 150);
                ellipse(this.position.x, this.position.y, this.size);
                if (this.size < 80) this.size += this.growth; // Increase size for growing particles
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
    <a class="archive-link" href="https://www.beautyisapattern.com/archive">Archive</a>
</body>
</html>
