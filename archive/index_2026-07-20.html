<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
  <title>The Dance of Doubt and Heroism</title>
  <style>
    body {
      background-color: #0f0f17;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    a {
      color: #d4af37;
      position: fixed;
      bottom: 20px;
      right: 20px;
      text-decoration: none;
      font-family: 'Arial', sans-serif;
      font-size: 12px;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
</head>
<body>
  <a href="https://www.beautyisapattern.com/archive">Explore the Beauty Archive</a>

  <script>
    let particles = [];
    const numParticles = 200;
    const circleRadius = 150;
    let centerX, centerY;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      centerX = width / 2;
      centerY = height / 2;
      for (let i = 0; i < numParticles; i++) {
        particles.push(new Particle(random(width), random(height)));
      }
    }

    function draw() {
      background(15, 15, 23, 20);
      noFill();
      stroke(212, 175, 55);
      strokeWeight(2);
      ellipse(centerX, centerY, circleRadius * 2);

      translate(centerX, centerY);
      rotate(frameCount * 0.01);

      for (let p of particles) {
        let angle = atan2(p.pos.y - centerY, p.pos.x - centerX);
        let force = p5.Vector.fromAngle(angle).mult(0.1);
        p.applyForce(force);
        p.update();
        p.edges();
        p.show();
      }
    }

    class Particle {
      constructor(x, y) {
        this.pos = createVector(x, y);
        this.vel = p5.Vector.random2D().mult(2);
        this.acc = createVector(0, 0);
      }

      applyForce(force) {
        this.acc.add(force);
      }

      update() {
        this.vel.add(this.acc);
        this.pos.add(this.vel);
        this.acc.mult(0);
      }

      edges() {
        if (this.pos.x > width) this.pos.x = 0;
        if (this.pos.x < 0) this.pos.x = width;
        if (this.pos.y > height) this.pos.y = 0;
        if (this.pos.y < 0) this.pos.y = height;
      }

      show() {
        stroke(255, 150);
        strokeWeight(1);
        point(this.pos.x - centerX, this.pos.y - centerY);
      }
    }
  </script>
</body>
</html>
