<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Gift of Creation</title>
    <link rel="icon" type="image/x-icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #e09, #d0e, #f5a, #aef);
            overflow: hidden;
        }
        #archive {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-family: Arial, sans-serif;
            color: white;
            text-decoration: none;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 10px 15px;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        #archive:hover {
            background-color: rgba(0, 0, 0, 0.7);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let shapes = [];
        
        function setup() {
            createCanvas(windowWidth, windowHeight);
            noStroke();
            // Create initial shapes
            for (let i = 0; i < 10; i++) {
                shapes.push(new Shape(random(width), random(height), random(20, 70)));
            }
        }

        function draw() {
            background(0, 10); // fade effect
            for (let shape of shapes) {
                shape.update();
                shape.display();
            }
        }

        class Shape {
            constructor(x, y, size) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.step = random(0.005, 0.02);
                this.offset = random(0, TWO_PI);
                this.color = color(random(100, 255), random(100, 255), random(100, 255), 150);
            }
            
            update() {
                this.x += noise(this.offset) * 10 - 5;
                this.y += noise(this.offset + 100) * 10 - 5;
                this.offset += this.step;
                
                // Wrap edges
                if (this.x > width) this.x = 0;
                if (this.x < 0) this.x = width;
                if (this.y > height) this.y = 0;
                if (this.y < 0) this.y = height;
            }

            display() {
                fill(this.color);
                ellipse(this.x, this.y, this.size, this.size);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</head>
<body>
    <a id="archive" href="https://www.beautyisapattern.com/archive">View Archive</a>
</body>
</html>
