<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journey Through the Waves</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #e0f7fa;
        }
        .archive-link {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #00796b;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="archive-link">
    <a href="https://www.beautyisapattern.com/archive">View Archive</a>
</div>

<script>
    let waveLayers = 10;
    let waveSpeed = 0.02;

    function setup() {
        createCanvas(windowWidth, windowHeight);
        noFill();
    }

    function draw() {
        background('#e0f7fa');
        stroke('#00796b');
        translate(0, height / 2);

        for (let i = 0; i < waveLayers; i++) {
            let frequency = (i + 1) * 0.03;
            let amplitude = (i + 1) * 10;
            let offset = frameCount * waveSpeed + i;

            beginShape();
            for (let x = 0; x < width; x += 5) {
                let y = sin(x * frequency + offset) * amplitude;
                curveVertex(x, y);
            }
            endShape();
        }
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
    }
</script>

</body>
</html>
