<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiet Contemplation</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #191919;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        a {
            position: absolute;
            bottom: 20px;
            right: 20px;
            text-decoration: none;
            color: #ffdd99;
            font-family: 'Lucida Console', Monaco, monospace;
            font-size: 12px;
            border-bottom: 1px solid transparent;
            transition: border-bottom 0.3s ease;
        }

        a:hover {
            border-bottom: 1px solid #ffdd99;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let particles = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle(random(width), random(height)));
            }
        }

        function draw() {
            background(15, 15, 15, 25);
            particles.forEach(p => {
                p.update();
                p.show();
            });

            // Control the particles' opacity for a more fading effect
            noFill();
        }

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.r = random(2, 5);
                this.xSpeed = random(-1, 1);
                this.ySpeed = random(-1, 1);
            }

            update() {
                this.x += this.xSpeed;
                this.y += this.ySpeed;

                if (this.x > width || this.x < 0) {
                    this.xSpeed *= -1;
                }

                if (this.y > height || this.y < 0) {
                    this.ySpeed *= -1;
                }
            }

            show() {
                stroke(255, 150);
                strokeWeight(this.r);
                point(this.x, this.y);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</head>
<body>
    <a href="https://www.beautyisapattern.com/archive" target="_blank">Visit the Archive</a>
</body>
</html>
