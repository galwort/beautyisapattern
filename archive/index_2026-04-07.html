<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dance of Imperfections</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #282c34;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        footer {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            z-index: 10;
        }
        footer a {
            color: #61dafb;
            text-decoration: none;
            transition: color 0.3s;
        }
        footer a:hover {
            color: #21a1f1;
            text-decoration: underline;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.min.js"></script>
    <script>
        let maxParticles = 150;
        let particles = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < maxParticles; i++) {
                particles.push(new Particle(random(width), random(height)));
            }
            noStroke();
        }

        function draw() {
            background(40, 44, 52, 75); // Slightly darker shade with transparency
            particles.forEach((particle, idx) => {
                particle.move();
                particle.bounce();
                particle.display();
            });
        }

        class Particle {
            constructor(x, y) {
                this.pos = createVector(x, y);
                this.vel = p5.Vector.random2D();
                this.vel.mult(random(1, 3));
                this.size = random(8, 15);
                this.color = color(
                    random(100, 255), 
                    random(50, 180), 
                    random(180, 255), 
                    180
                );
            }

            move() {
                this.pos.add(this.vel);
            }

            bounce() {
                if (this.pos.x < 0 || this.pos.x > width) this.vel.x *= -1;
                if (this.pos.y < 0 || this.pos.y > height) this.vel.y *= -1;
            }

            display() {
                fill(this.color);
                ellipse(this.pos.x, this.pos.y, this.size);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</head>
<body>
    <footer>
        Discover more at <a href="https://www.beautyisapattern.com/archive" target="_blank">Beauty is a Pattern Archive</a>
    </footer>
</body>
</html>
