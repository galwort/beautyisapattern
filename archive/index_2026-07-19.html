<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Embrace the Rain</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #ccc;
            font-family: 'Courier New', Courier, monospace;
        }
        a {
            color: #7289da;
            text-decoration: none;
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 14px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
</head>
<body>
    <script>
        let drops = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < 500; i++) {
                drops.push(new Drop());
            }
        }

        function draw() {
            background(26, 26, 26, 240);
            for (let drop of drops) {
                drop.fall();
                drop.display();
            }
            drawPuddle();
        }

        class Drop {
            constructor() {
                this.x = random(width);
                this.y = random(-height, 0);
                this.z = random(0, 20);
                this.len = map(this.z, 0, 20, 10, 20);
                this.yspeed = map(this.z, 0, 20, 1, 7);
            }

            fall() {
                this.y += this.yspeed;
                let grav = map(this.z, 0, 20, 0, 0.2);
                this.yspeed += grav;

                if (this.y > height) {
                    this.y = random(-200, -100);
                    this.yspeed = map(this.z, 0, 20, 4, 10);
                }
            }

            display() {
                let thick = map(this.z, 0, 20, 1, 3);
                stroke(120, 150, 255);
                strokeWeight(thick);
                line(this.x, this.y, this.x, this.y + this.len);
            }
        }

        function drawPuddle() {
            noFill();
            stroke(255, 255, 255, 50);
            strokeWeight(3);
            for (let i = 0; i < 5; i++) {
                ellipse(width / 2, height, 150 + i * 20, 20);
            }
        }
    </script>
    <a href="https://www.beautyisapattern.com/archive">View Archive</a>
</body>
</html>
