<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <title>A Heartfelt Kindness</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f7f9fc;
        }
        a {
            position: absolute;
            bottom: 20px;
            right: 20px;
            text-decoration: none;
            color: #4a4a4a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 0.9rem;
            border-bottom: 1px solid transparent;
            transition: border 0.3s ease;
        }
        a:hover {
            border-bottom: 1px solid #4a4a4a;
        }
    </style>
</head>
<body>

    <script>
        let bubbles = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            noStroke();
            frameRate(30);
            for (let i = 0; i < 10; i++) {
                bubbles.push(new Bubble(random(width), random(height)));
            }
        }

        function draw() {
            background(247, 249, 252);
            for (let bubble of bubbles) {
                bubble.move();
                bubble.display();
            }
        }

        class Bubble {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.diameter = random(30, 80);
                this.xSpeed = random(1, 3);
                this.ySpeed = random(1, 3);
            }

            move() {
                this.x += this.xSpeed * cos(frameCount * 0.01);
                this.y += this.ySpeed * sin(frameCount * 0.01);
                if (this.x < 0 || this.x > width) this.xSpeed *= -1;
                if (this.y < 0 || this.y > height) this.ySpeed *= -1;
            }

            display() {
                fill(255, 173, 96, 150);
                ellipse(this.x, this.y, this.diameter);
                fill(255, 232, 166, 80);
                ellipse(this.x + 15, this.y + 15, this.diameter * 0.5);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>

    <a href="https://www.beautyisapattern.com/archive" target="_blank">Explore the Archive</a>

</body>
</html>
