<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <title>Standing Tall Amidst Shadows</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #0f0e0e, #2c2b2b);
            color: white;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            position: relative;
        }
        .archive-link {
            position: absolute;
            bottom: 20px;
            right: 20px;
            text-decoration: none;
            color: #fff;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 5px;
            transition: background-color 0.3s, transform 0.2s;
        }
        .archive-link:hover {
            background-color: #444;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <script>
        let stars = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            noStroke();
            frameRate(60);
            for (let i = 0; i < 100; i++) {
                stars.push(new Star(random(width), random(height), random(1, 3)));
            }
        }

        function draw() {
            background(15, 14, 14);
            for (let star of stars) {
                star.update();
                star.edges();
                star.show();
            }

            drawCentralFigure();
        }

        class Star {
            constructor(x, y, speed) {
                this.x = x;
                this.y = y;
                this.speed = speed;
            }

            update() {
                this.x += this.speed / 2;
                this.y += this.speed / 2;
            }

            show() {
                fill(255);
                ellipse(this.x, this.y, random(1, 3));
            }

            edges() {
                if (this.x > width || this.y > height) {
                    this.x = random(width);
                    this.y = random(height);
                }
            }
        }

        function drawCentralFigure() {
            let time = millis() / 1000;

            // Central luminous circle symbolizing resilience and presence
            fill(255, 204, 0, 150); 
            ellipse(width / 2, height / 2, 80 + sin(time * 3) * 20);

            // Orbiting circles acting as defining moments and challenges
            let radiusOffset = sin(time * 2) * 30;
            let baseRadius = 200;
            for (let i = 0; i < TWO_PI; i += PI / 6) {
                let angle = time + i;
                let x = width / 2 + cos(angle) * (baseRadius + radiusOffset);
                let y = height / 2 + sin(angle) * (baseRadius + radiusOffset);
                fill(0, 153, 204, 180);
                ellipse(x, y, 20 + sin(time * 3 + i) * 5);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
    <a class="archive-link" href="https://www.beautyisapattern.com/archive" target="_blank">Explore the Archive</a>
</body>
</html>
