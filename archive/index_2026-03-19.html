<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precious Bonds</title>
    <link rel="icon" type="image/x-icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #eee;
        }
        .archive-link {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #333;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.8);
            padding: 5px 10px;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .archive-link:hover {
            background: rgba(255, 255, 255, 1);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let particles = [];
        
        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < 80; i++) {
                particles.push(new Particle(random(width), random(height)));
            }
        }
        
        function draw() {
            background(238, 238, 238);
            particles.forEach(particle => {
                particle.update();
                particle.display();
                particle.connect(particles);
            });
        }

        class Particle {
            constructor(x, y) {
                this.position = createVector(x, y);
                this.velocity = createVector(random(-1, 1), random(-1, 1));
                this.acceleration = createVector(0, 0);
                this.maxSpeed = 2;
                this.size = random(2, 5);
            }
            
            update() {
                this.acceleration = p5.Vector.random2D().mult(0.05);
                this.velocity.add(this.acceleration);
                this.velocity.limit(this.maxSpeed);
                this.position.add(this.velocity);
                this.edges();
            }
            
            display() {
                fill(52, 152, 219, 180);
                noStroke();
                ellipse(this.position.x, this.position.y, this.size);
            }

            edges() {
                if (this.position.x < 0) this.position.x = width;
                if (this.position.x > width) this.position.x = 0;
                if (this.position.y < 0) this.position.y = height;
                if (this.position.y > height) this.position.y = 0;
            }

            connect(others) {
                others.forEach(other => {
                    let d = dist(this.position.x, this.position.y, other.position.x, other.position.y);
                    if (d < 120) {
                        strokeWeight(1);
                        stroke(41, 128, 185, map(d, 0, 120, 255, 50));
                        line(this.position.x, this.position.y, other.position.x, other.position.y);
                    }
                });
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</head>
<body>
    <a href="https://www.beautyisapattern.com/archive" class="archive-link">Explore our Archive</a>
</body>
</html>
