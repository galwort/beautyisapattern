<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cycle of Reflection and Learning</title>
    <link rel="icon" type="image/x-icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #2c3e50;
      }
      .archive-link {
        position: absolute;
        bottom: 10px;
        right: 10px;
        color: white;
        background-color: rgba(44, 62, 80, 0.8);
        padding: 5px 10px;
        border-radius: 5px;
        text-decoration: none;
        font-family: Arial, sans-serif;
      }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
    let angle = 0;
    let angleSpeed = 0.05;

    function setup() {
      createCanvas(windowWidth, windowHeight);
      noStroke();
    }

    function draw() {
      background(44, 62, 80);

      let learningColor = color(46, 204, 113, 150);
      let reflectionColor = color(241, 196, 15, 150);

      for (let i = 0; i <= TWO_PI; i += PI / 60) {
        let x = width / 2 + cos(i + angle) * (width / 4);
        let y = height / 2 + sin(i + angle) * (height / 4);

        fill(learningColor);
        ellipse(x, y, 10, 10);

        fill(reflectionColor);
        ellipse(x + cos(angle * 2) * 20, y + sin(angle * 2) * 20, 10, 10);
      }

      angle += angleSpeed;
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
    </script>
    <a class="archive-link" href="https://www.beautyisapattern.com/archive">Visit the Archive</a>
</body>
</html>
