<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyclic Growth</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
        a {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #333;
            text-decoration: none;
            font-family: 'Arial', sans-serif;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 10px;
            border-radius: 8px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let blossoms = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            noFill();
            strokeWeight(2);

            for (let i = 0; i < 50; i++) {
                blossoms.push(new Blossom(random(width), random(height)));
            }
        }

        function draw() {
            background(240, 248, 255);

            for (const blossom of blossoms) {
                blossom.animate();
                blossom.display();
            }
        }

        class Blossom {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = random(20, 40);
                this.growth = 0;
            }

            animate() {
                this.growth += 0.02;
                if (this.growth > TWO_PI) {
                    this.growth = 0;
                }
            }

            display() {
                const bloom = sin(this.growth) * this.size;
                const strokeCol = color(255, 182, 193);
                strokeCol.setAlpha(150 + 100 * sin(this.growth));
                stroke(strokeCol);

                if (bloom > 0) {
                    ellipse(this.x, this.y, bloom);
                }

                if (cos(this.growth) > 0) {
                    const budCol = color(255, 69, 0);
                    budCol.setAlpha(200);
                    stroke(budCol);
                    ellipse(this.x, this.y, bloom / 2);
                }
            }
        }
    </script>
</head>
<body>
    <a href="https://www.beautyisapattern.com/archive" target="_blank">Visit the Archive</a>
</body>
</html>
