<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmony of Opposites</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {margin: 0; overflow: hidden; background-color: #16161d;}
        a {position: absolute; bottom: 15px; right: 15px; color: #bbb; text-decoration: none;}
        a:hover {color: #fff;}
    </style>
</head>
<body>
    <script>
        let nodes = [];
        let numNodes = 120;
        let colors = [
            [255, 87, 51], // Warm
            [79, 195, 247], // Cool
            [255, 234, 51], // Warm
            [129, 212, 250] // Cool
        ];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < numNodes; i++) {
                nodes.push(new Node(random(width), random(height), random(colors)));
            }
        }

        function draw() {
            background(22, 22, 29, 100);
            for (let node of nodes) {
                node.update();
                node.display();
            }
        }

        class Node {
            constructor(x, y, c) {
                this.position = createVector(x, y);
                this.velocity = p5.Vector.random2D();
                this.color = c;
            }

            update() {
                this.position.add(this.velocity);
                
                this.position.x = (this.position.x + width) % width; // Wrap
                this.position.y = (this.position.y + height) % height;

                let attraction = createVector(mouseX, mouseY).sub(this.position);
                if (attraction.mag() < 150) {
                    this.velocity.add(attraction.setMag(0.1));
                }
                this.velocity.limit(3);
            }

            display() {
                stroke(this.color[0], this.color[1], this.color[2], 100);
                fill(this.color[0], this.color[1], this.color[2], 50);
                ellipse(this.position.x, this.position.y, 10, 10);
                this.connectWithCloseNodes();
            }

            connectWithCloseNodes() {
                for (let node of nodes) {
                    let d = dist(this.position.x, this.position.y, node.position.x, node.position.y);
                    if (d < 100) {
                        stroke(255, 255, 255, map(d, 0, 100, 255, 0));
                        line(this.position.x, this.position.y, node.position.x, node.position.y);
                    }
                }
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
    <a href="https://www.beautyisapattern.com/archive">Visit Archive</a>
</body>
</html>
