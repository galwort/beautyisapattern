<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Infinite Embrace</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #222;
            color: #eee;
            font-family: 'Times New Roman', serif;
            position: relative;
            height: 100vh;
            
        }
        .archive-link {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 1.2rem;
            color: #eee;
            text-decoration: none;
            transition: color 0.3s;
        }
        .archive-link:hover {
            color: #ffa07a;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <script>
  let hearts = [];
  
  function setup() {
    createCanvas(windowWidth, windowHeight);
    for (let i = 0; i < 150; i++) {
      hearts.push(new Heart(random(width), random(height), random(0.02, 0.08)));
    }
  }

  function draw() {
    background(34);
    for (let heart of hearts) {
      heart.update();
      heart.show();
    }
  }

  class Heart {
    constructor(x, y, velY) {
      this.x = x;
      this.y = y;
      this.velY = velY;
      this.radius = random(4, 15);
      this.phase = random(TWO_PI);
    }

    update() {
      this.y += this.velY;
      if (this.y > height) {
        this.y = -this.radius*5;
        this.x = random(width);
      }
    }

    show() {
      push();
      fill('#ff6f61');
      noStroke();
      translate(this.x, this.y);
      beginShape();
      vertex(0, 0);
      bezierVertex(
        -this.radius, -this.radius, 
        -this.radius*2, this.radius*,
        0, this.radius*3
      );
      bezierVertex(
        this.radius*2, this.radius*, 
        this.radius, -this.radius,
        0, 0
      );
      endShape(CLOSE);
      pop();
    }
  }
  </script>
</head>
<body>
    <a href="https://www.beautyisapattern.com/archive" class="archive-link">Visit the Archive</a>
</body>
</html>
