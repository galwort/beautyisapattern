<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freedom and Return</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body { 
            margin: 0;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh;
            background: linear-gradient(#f5f5f5, #e0e0e0);
            overflow: hidden;
        }
        a {
            position: absolute;
            bottom: 10px;
            font-size: 14px;
            text-decoration: none;
            color: #333;
        }
        a:hover {
            color: #000;
        }
    </style>
</head>
<body>
    <script>
        let particles = [];
        let released = false;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle(random(width), random(height)));
            }
            setTimeout(() => { released = true; }, 3000);
            setTimeout(() => { released = false; }, 6000);
            noStroke();
        }

        function draw() {
            background(240, 240, 240, 20);
            for (let p of particles) {
                p.move();
                p.display();
            }
        }

        class Particle {
            constructor(x, y) {
                this.pos = createVector(x, y);
                this.defaultPos = this.pos.copy();
                this.speed = createVector(random(-1, 1), random(-1, 1));
                this.size = random(3, 6);
                this.color = color(random(100, 255), random(100, 255), random(100, 255));
            }

            move() {
                if (released) {
                    this.pos.add(this.speed);
                } else {
                    this.pos = this.defaultPos.copy();
                }

                // Boundaries wrap
                if (this.pos.x < 0) this.pos.x = width;
                if (this.pos.x > width) this.pos.x = 0;
                if (this.pos.y < 0) this.pos.y = height;
                if (this.pos.y > height) this.pos.y = 0;
            }

            display() {
                fill(this.color);
                ellipse(this.pos.x, this.pos.y, this.size);
            }
        }

    </script>
    <a href="https://www.beautyisapattern.com/archive" target="_blank">Visit the Archive</a>
</body>
</html>
