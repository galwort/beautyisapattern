<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escaping the Shadows</title>
  <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
    }
    footer {
      position: absolute;
      bottom: 10px;
      text-align: center;
      width: 100%;
      font-size: 12px;
    }
    a {
      color: #0abab5;
      text-decoration: none;
    }
    
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<script>
  let particles;

  function setup() {
    createCanvas(windowWidth, windowHeight);
    particles = [];
    for (let i = 0; i < 200; i++) {
      particles.push(new Particle(random(width), random(height)));
    }
  }

  function draw() {
    background(17, 17, 34, 75);
    particles.forEach(p => {
      p.update();
      p.show();
    });
  }

  function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
  }

  class Particle {
    constructor(x, y) {
      this.pos = createVector(x, y);
      this.vel = createVector(random(-1, 1), random(-1, 1));
      this.acc = createVector(0, 0);
      this.maxSpeed = random(1, 5);
      this.size = random(5, 30);
      this.lifespan = 255;
      this.shrinkRate = random(0.5, 1);
    }

    update() {
      this.lifespan -= this.shrinkRate;
      this.acc = createVector(random(-1, 1), random(-1, 1));
      this.vel.add(this.acc);
      this.vel.limit(this.maxSpeed);
      this.pos.add(this.vel);

      if (this.pos.x > width || this.pos.x < 0) this.vel.x *= -1;
      if (this.pos.y > height || this.pos.y < 0) this.vel.y *= -1;

      if (this.lifespan < 0) {
        this.pos = createVector(random(width), random(height));
        this.vel = createVector(random(-1, 1), random(-1, 1));
        this.lifespan = 255;
      }
    }

    show() {
      noStroke();
      fill(255, this.lifespan);
      circle(this.pos.x, this.pos.y, this.size);
    }
  }
</script>

<footer>
  <a href="https://www.beautyisapattern.com/archive" target="_blank">Explore the Archive</a>
</footer>

</body>
</html>
