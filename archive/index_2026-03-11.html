<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon" />
    <title>Essence of True Kinship</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1e1e1e;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
        }
        footer a {
            text-decoration: none;
            color: #cccccc;
            transition: color 0.3s;
        }
        footer a:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.4.0/lib/p5.js"></script>
    <script>
        let nodes = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            noStroke();
            for (let i = 0; i < 80; i++) {
                nodes.push(new Node(random(width), random(height)));
            }
        }

        function draw() {
            background(30, 40, 60, 100);
            for (let i = 0; i < nodes.length; i++) {
                nodes[i].update();
                nodes[i].display();
            }
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    let distance = dist(nodes[i].pos.x, nodes[i].pos.y, nodes[j].pos.x, nodes[j].pos.y);
                    if (distance < 150) {
                        stroke(107, 185, 240, map(distance, 0, 150, 255, 0));
                        line(nodes[i].pos.x, nodes[i].pos.y, nodes[j].pos.x, nodes[j].pos.y);
                    }
                }
            }
        }

        class Node {
            constructor(x, y) {
                this.pos = createVector(x, y);
                this.vel = p5.Vector.random2D().mult(random(0.3, 2));
                this.r = random(5, 10);
            }

            update() {
                this.pos.add(this.vel);
                if (this.pos.x > width || this.pos.x < 0) this.vel.x *= -1;
                if (this.pos.y > height || this.pos.y < 0) this.vel.y *= -1;
            }

            display() {
                fill(150, 200, 255, 200);
                ellipse(this.pos.x, this.pos.y, this.r * 2);
            }
        }
    </script>

    <footer style="position: fixed; bottom: 15px; right: 15px;">
        <a href="https://www.beautyisapattern.com/archive">Explore the Archive</a>
    </footer>
</body>
</html>
