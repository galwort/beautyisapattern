<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awkward Grace</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #f7f4f1;
        }

        #archive {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-family: Arial, sans-serif;
            color: #555;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.8);
            padding: 5px 10px;
            border-radius: 5px;
        }

        #archive:hover {
            background: rgba(240, 240, 240, 0.8);
        }
    </style>
</head>
<body>
    <script>
        let offset = 0;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            frameRate(60);
        }

        function draw() {
            background(247, 244, 241);
            noFill();

            // Draw spiraling lines
            let cx = width / 2;
            let cy = height / 2;
            stroke(100, 115, 180, 150);
            strokeWeight(2);
            beginShape();
            for (let a = 0; a < TWO_PI * 3; a += 0.05) {
                let r = 50 + offset + a * 10;
                let x = cx + r * cos(a + offset * 0.05);
                let y = cy + r * sin(a + offset * 0.05);
                vertex(x, y);
            }
            endShape();

            // Dynamically expanding and contracting circles
            stroke(180, 100, 115, 180);
            ellipse(cx, cy, 50 + 50 * sin(offset * 0.1));

            // Drifting squares
            fill(115, 180, 100, 150);
            noStroke();
            for (let i = 0; i < 7; i++) {
                let x = cx + (50 + offset % width) * cos(TWO_PI * i / 7 + offset * 0.03);
                let y = cy + (50 + offset % height) * sin(TWO_PI * i / 7 + offset * 0.03);
                push();
                translate(x, y);
                rotate(offset * 0.05 + i);
                rect(-10, -10, 20, 20);
                pop();
            }

            offset += 0.5;
        }
    </script>
    <a id="archive" href="https://www.beautyisapattern.com/archive" target="_blank">Explore More Patterns</a>
</body>
</html>
