<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Illusive Realities</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #121212;
        }
        .archive-link {
            position: absolute;
            bottom: 10px;
            right: 10px;
            text-decoration: none;
            color: #bbdefb;
            font-family: 'Courier New', Courier, monospace;
            background: rgba(18, 18, 18, 0.9);
            padding: 8px 15px;
            border-radius: 8px;
            box-shadow: 0px 0px 15px rgba(33, 150, 243, 0.8);
            transition: 0.3s;
        }
        .archive-link:hover {
            color: #fff;
            background: rgba(33, 150, 243, 0.9);
        }
    </style>
</head>
<body>

<a href="https://www.beautyisapattern.com/archive" class="archive-link">Explore the Archive</a>

<script>
    let multiShapes = [];

    function setup() {
        createCanvas(windowWidth, windowHeight);
        for (let i = 0; i < 20; i++) {
            let shapes = [];
            for (let j = 0; j < 6; j++) {
                shapes.push(new Shape(random(width), random(height), random(30, 80)));
            }
            multiShapes.push(shapes);
        }
    }

    function draw() {
        background(18, 18, 18, 50);
        for (let shapes of multiShapes) {
            for (let shape of shapes) {
                shape.display();
                shape.move();
            }
        }
    }

    class Shape {
        constructor(x, y, size) {
            this.x = x;
            this.y = y;
            this.size = size;
            this.speed = createVector(random(-1, 1), random(-1, 1));
            this.color = color(random(255), random(255), random(255), 150);
        }

        move() {
            this.x += this.speed.x;
            this.y += this.speed.y;

            if (this.x < 0 || this.x > width) {
                this.speed.x *= -1;
            }

            if (this.y < 0 || this.y > height) {
                this.speed.y *= -1;
            }
        }

        display() {
            noFill();
            stroke(this.color);
            strokeWeight(2);

            let noisySize = this.size + sin(frameCount * 0.05) * 20;
            ellipse(this.x, this.y, noisySize, noisySize);

            let angle = frameCount * 0.01;
            for (let i = 0; i < TWO_PI; i += PI / 4) {
                let offset = noisySize / 2 + 20 * cos(angle + i);
                let x = this.x + offset * cos(i);
                let y = this.y + offset * sin(i);
                ellipse(x, y, noisySize * 0.5);
            }
        }
    }
</script>

</body>
</html>
