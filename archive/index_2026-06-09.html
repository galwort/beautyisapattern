<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courage In Simplicity</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #FAF3E0;
        }
        #archive-link {
            position: absolute;
            bottom: 10px;
            right: 10px;
            text-decoration: none;
            font-family: 'Helvetica Neue', sans-serif;
            color: #333;
            font-size: 14px;
            background-color: rgba(255, 255, 255, 0.8);
            padding: 5px 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let waves = [];
        
        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < 10; i++) {
                waves.push(new Wave(i * 20))
            }
            noStroke();
        }

        function draw() {
            background(250, 240, 230);

            waves.forEach((wave, index) => {
                wave.amplitude = map(sin(frameCount * 0.01 + index * 0.2), -1, 1, 20, 50);
                wave.display();
            });
        }

        class Wave {
            constructor(offset) {
                this.offset = offset;
                this.amplitude = 20;
                this.wavelength = 50;
                this.speed = 0.02;
            }

            display() {
                fill(255, 204, 204, 150);
                beginShape();
                for (let x = 0; x <= width; x += 10) {
                    let y = height / 2 + sin(x / this.wavelength + frameCount * this.speed + this.offset) * this.amplitude;
                    curveVertex(x, y);
                }
                vertex(width, height);
                vertex(0, height);
                endShape(CLOSE);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</head>
<body>
    <a href="https://www.beautyisapattern.com/archive" id="archive-link">Visit Archive</a>
</body>
</html>
