<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <title>Stillness & Whispers</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Arial', sans-serif;
            color: white;
        }
        #archive-link {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            text-decoration: none;
            background-color: #e94560;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        #archive-link:hover {
            background-color: #0f3460;
        }
    </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
<script>
    let circles = [];

    function setup() {
        createCanvas(windowWidth, windowHeight);
        // Initialize circles
        for (let i = 0; i < 10; i++) {
            circles.push(new MovingCircle(random(width), random(height), random(30, 100), random(1, 5)));
        }
    }

    function draw() {
        background(26, 26, 46);

        // Update and show circles
        for (let circle of circles) {
            circle.update();
            circle.show();
        }
    }

    class MovingCircle {
        constructor(x, y, d, speed) {
            this.x = x;
            this.y = y;
            this.diameter = d;
            this.angle = random(TWO_PI);
            this.speed = speed;
        }

        update() {
            this.x += cos(this.angle) * this.speed;
            this.y += sin(this.angle) * this.speed;

            // Bouncing effect
            if (this.x > width || this.x < 0) this.angle = PI - this.angle;
            if (this.y > height || this.y < 0) this.angle = -this.angle;
        }

        show() {
            noStroke();
            fill(233, 69, 96, 150);
            ellipse(this.x, this.y, this.diameter);
        }
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
    }
</script>

<a id="archive-link" href="https://www.beautyisapattern.com/archive" target="_blank">Explore the Archive</a>

</body>
</html>
