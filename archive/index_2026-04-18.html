<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reflective Motion</title>
  <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #1a1a1d;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      height: 100vh;
      color: #eeeeee;
      font-family: 'Courier New', monospace;
    }
    a {
      margin-bottom: 20px;
      text-decoration: none;
      color: #e84545;
      transition: color 0.3s ease;
    }
    a:hover {
      color: #bb2205;
    }
    #p5-canvas-holder {
      position: absolute;
      top: 0;
      left: 0;
      z-index: -1;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <script>
    let orbs = [];
    let t = 0;
    
    function setup() {
      createCanvas(windowWidth, windowHeight);
      let colors = ['#ff2e63', '#08d9d6', '#f7f7f7', '#e84545'];
      for (let i = 0; i < 50; i++){
        orbs.push(new Orb(
          random(width), 
          random(height), 
          random(2, 7), 
          colors[floor(random(4))]
        ));
      }
    }

    function draw() {
      background(26, 26, 29, 80);
      orbs.forEach(orb => {
        orb.update();
        orb.display();
      });
    }

    class Orb {
      constructor(x, y, size, color) {
        this.pos = createVector(x, y);
        this.vel = p5.Vector.fromAngle(random(TWO_PI));
        this.size = size;
        this.color = color;
      }

      update() {
        this.pos.add(this.vel);
        if (this.pos.x > width || this.pos.x < 0) {
          this.vel.x *= -1;
        }
        if (this.pos.y > height || this.pos.y < 0) {
          this.vel.y *= -1;
        }
      }

      display() {
        noStroke();
        fill(this.color + ("70"));
        ellipse(this.pos.x, this.pos.y, this.size * 2);
        fill(this.color);
        ellipse(this.pos.x, this.pos.y, this.size);
      }
    }
  </script>
</head>
<body>
  <div id="p5-canvas-holder"></div>
  <a href="https://www.beautyisapattern.com/archive">Explore the Archive</a>
</body>
</html>
