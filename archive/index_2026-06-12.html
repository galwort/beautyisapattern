<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Quiet Reward of Wisdom</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100vh;
        }

        footer {
            text-align: center;
            padding: 10px;
        }

        a {
            color: #a5d6a7;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let colors;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            noStroke();
            // Define colors for the dynamic elements symbolizing thoughts and wisdom
            colors = [
                color(56, 45, 126, 150),
                color(170, 100, 50, 150),
                color(100, 150, 200, 150),
                color(255, 195, 0, 150),
                color(240, 85, 54, 150)
            ];  
            frameRate(30);
        }

        function draw() {
            // Gradient background for depth
            let gradientStart = color(10, 10, 20);
            let gradientEnd = color(10, 10, 10);
            setGradient(0, 0, width, height, gradientEnd, gradientStart, "Y");

            fillWiserBlobs();
        }

        function fillWiserBlobs() {
            // Dynamic blobs circling to visualize thoughts and wisdom
            translate(width/2, height/2);
            for (let i = 0; i < colors.length; i++) {
                fill(colors[i]);
                ellipse(
                    sin(frameCount * 0.02 + i) * 300,
                    cos(frameCount * 0.02 + i) * 200,
                    100, 100
                );
            }

            // Static central orb for a focal point
            fill(255, 255, 255, 150);
            ellipse(0, 0, 200, 200);
        }

        // Function to create gradient background
        function setGradient(x, y, w, h, c1, c2, axis) {
            noFill();

            if (axis === "Y") {
                for (let i = y; i <= y + h; i++) {
                    let inter = map(i, y, y + h, 0, 1);
                    let c = lerpColor(c1, c2, inter);
                    stroke(c);
                    line(x, i, x + w, i);
                }
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>

    <footer>
        <a href="https://www.beautyisapattern.com/archive">Visit the Archive</a>
    </footer>

</body>
</html>
