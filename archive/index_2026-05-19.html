<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Mind's Painting</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #e0f7fa;
        }
        footer {
            position: fixed;
            bottom: 16px;
            right: 20px;
            font-family: Arial, sans-serif;
            font-size: 14px;
        }
        a {
            color: #00796b;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
</head>
<body>
    <footer>
        <a href="https://www.beautyisapattern.com/archive">Visit the Archive</a>
    </footer>
    <script>
        let dots = [];
        const dotCount = 120;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < dotCount; i++) {
                dots.push(new Dot());
            }
        }

        function draw() {
            background(224, 247, 250, 25);
            for (let dot of dots) {
                dot.move();
                dot.display();
            }
        }

        class Dot {
            constructor() {
                this.startAngle = random(TWO_PI); // Starting point for each dot
                this.angleVel = random(0.01, 0.05); // Angular Velocity
                this.amplitude = random(30, 300); // Amplitude from center
                this.diameter = random(5, 10); // Size of each dot
                this.position = createVector(random(width), random(height));
            }

            move() {
                this.startAngle += this.angleVel;
                this.position.x = width / 2 + this.amplitude * cos(this.startAngle);
                this.position.y = height / 2 + this.amplitude * sin(this.startAngle);
            }

            display() {
                noStroke();
                fill(0, 121, 107, 150);
                ellipse(this.position.x, this.position.y, this.diameter);
            }
        }
    </script>
</body>
</html>
