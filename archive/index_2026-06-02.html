<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Flow of Forgiveness</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #1D1C44 30%, #2E0095);
        }
        footer {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
        }
        footer a {
            color: #91D7FF;
            text-decoration: none;
            transition: color 0.3s;
        }
        footer a:hover {
            color: #FFFFFF;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let particles = [];
        let waveAngle = 0;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < 150; i++) {
                particles.push(new Particle(random(width), random(height)));
            }
        }

        function draw() {
            background(29, 28, 68, 50);
            waveAngle += 0.02;
            for (let particle of particles) {
                particle.move();
                particle.show();
            }
        }

        class Particle {
            constructor(x, y) {
                this.pos = createVector(x, y);
                this.r = random(3, 8);
                this.color = color(random(100, 255), 150);
            }

            move() {
                let wave = p5.Vector.fromAngle(waveAngle + this.pos.x / 100);
                this.pos.add(wave);

                if (this.pos.x > width || this.pos.x < 0) this.pos.x = random(width);
                if (this.pos.y > height || this.pos.y < 0) this.pos.y = random(height);
            }

            show() {
                noStroke();
                fill(this.color);
                ellipse(this.pos.x, this.pos.y, this.r);
            }
        }
    </script>
</head>
<body>
    <footer>
        <a href="https://www.beautyisapattern.com/archive">Visit the Archive</a>
    </footer>
</body>
</html>
