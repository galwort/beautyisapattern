<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journey's Motion</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Raleway', sans-serif;
            background-color: #f0f0f0;
        }
        footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 1em;
        }
        footer a {
            color: #3498db;
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <script>
        let halfCircles = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < 50; i++) {
                halfCircles.push(new HalfCircle(random(width), random(height), random(20, 50)));
            }
        }

        function draw() {
            background(240, 240, 255);
            for (let hc of halfCircles) {
                hc.display();
                hc.move();
            }
        }

        class HalfCircle {
            constructor(x, y, r) {
                this.x = x;
                this.y = y;
                this.r = r;
                this.angle = random(TWO_PI);
                this.angleStep = random(0.01, 0.03);
                this.opacity = random(100, 255);
            }

            display() {
                fill(100, 150, 200, this.opacity);
                arc(this.x, this.y, this.r * 2, this.r, this.angle, this.angle + PI);
            }

            move() {
                this.x += cos(this.angle) * 0.5;
                this.y += sin(this.angle) * 0.5;
                this.angle += this.angleStep;
                if (this.x > width) this.x = 0;
                if (this.x < 0) this.x = width;
                if (this.y > height) this.y = 0;
                if (this.y < 0) this.y = height;
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
    <footer>
        <a href="https://www.beautyisapattern.com/archive">Explore the Beauty Archive</a>
    </footer>
</body>
</html>
