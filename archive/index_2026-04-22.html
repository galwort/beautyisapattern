<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serendipitous Patterns</title>
    <link rel="icon" type="image/x-icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #e3f2fd, #f5f5f5);
            font-family: Arial, sans-serif;
        }

        .footer {
            position: absolute;
            bottom: 15px;
            right: 15px;
            font-size: 14px;
        }

        .footer a {
            color: #00796B;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let particles = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            colorMode(HSB, 360, 100, 100, 100);
            for (let i = 0; i < 50; i++) {
                particles.push(new Particle(random(width), random(height), random(15, 30)));
            }
        }

        function draw() {
            background(220, 10, 100);
            for (let particle of particles) {
                particle.move();
                particle.display();
            }
        }

        class Particle {
            constructor(x, y, size) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.angle = random(TWO_PI);
                this.speed = random(1, 3);
                this.hue = random(360);
                this.alpha = random(50, 100);
            }

            move() {
                this.x += cos(this.angle) * this.speed;
                this.y += sin(this.angle) * this.speed;
                if (this.x > width) this.x = 0;
                if (this.x < 0) this.x = width;
                if (this.y > height) this.y = 0;
                if (this.y < 0) this.y = height;
            }

            display() {
                stroke(this.hue, 40, 80, 80);
                fill(this.hue, 60, 90, this.alpha);
                ellipse(this.x, this.y, this.size);
                this.angle += random(-0.05, 0.05);
            }
        }
    </script>
</head>
<body>
    <div class="footer">
        <a href="https://www.beautyisapattern.com/archive" target="_blank">Explore More Patterns</a>
    </div>
</body>
</html>
