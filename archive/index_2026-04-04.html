<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conscious Reflections</title>
    <link rel="icon" type="image/x-icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
        }
        a {
            position: absolute;
            bottom: 10px;
            right: 20px;
            color: #fff;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-size: 14px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
</head>
<body>

<a href="https://www.beautyisapattern.com/archive">Explore the Archive</a>

<script>
    let theta = 0;

    function setup() {
        createCanvas(windowWidth, windowHeight);
        noFill();
        stroke(255);
    }

    function draw() {
        background(18, 18, 18, 25);

        // Central circle
        translate(width / 2, height / 2);
        let numWaves = 8; // Number of concentric waves
        let maxSize = min(width, height) / 2.5; // Max size of the outermost wave

        for (let circle = 0; circle < numWaves; circle++) {
            let radius = map(circle, 0, numWaves, 10, maxSize);
            let angleOffset = theta + circle * PI / numWaves;

            beginShape();
            for (let a = 0; a <= TWO_PI; a += PI / 150) {
                let xOffset = cos(a + angleOffset) * 30;
                let yOffset = sin(a + angleOffset) * 30;
                let x = (radius + xOffset) * cos(a);
                let y = (radius + yOffset) * sin(a);
                vertex(x, y);
            }
            endShape(CLOSE);
        }

        // Increment the angle theta
        theta += 0.01;
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
    }
</script>

</body>
</html>
