<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Path of Inquiry</title>
  <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
  <style>
    body {
      margin: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f3f0eb; /* Subtle, muted background resembling parchment. */
    }
    .archive-link {
      position: fixed;
      bottom: 20px;
      right: 20px;
      font-family: "Lucida Sans", sans-serif;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.8);
      padding: 8px 12px;
      text-decoration: none;
      color: #666;
      border-radius: 8px;
      transition: background 0.3s ease;
    }
    .archive-link:hover {
      background: rgba(255, 255, 255, 1);
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
</head>
<body>

<script>
  let particles = [];

  function setup() {
    createCanvas(windowWidth, windowHeight);
    for (let i = 0; i < 100; i++) { 
      particles.push(new Particle());
    }
  }

  function draw() {
    background(243, 240, 235, 20); // Transparent background for trails.
    for (let particle of particles) {
      particle.update();
      particle.show();
    }
  }

  class Particle {
    constructor() {
      this.x = random(width);
      this.y = random(height);
      this.size = random(5, 12);
      this.speedX = random(-2, 2);
      this.speedY = random(-2, 2);
      this.color = color(random(255), random(100, 155), random(155, 200), 150);
    }

    update() {
      this.x += this.speedX;
      this.y += this.speedY;

      // Wrap around canvas
      if (this.x > width || this.x < 0) {
        this.speedX *= -1;
      }

      if (this.y > height || this.y < 0) {
        this.speedY *= -1;
      }
    }

    show() {
      fill(this.color);
      noStroke();
      ellipse(this.x, this.y, this.size);
    }
  }

  function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
  }
</script>

<a href="https://www.beautyisapattern.com/archive" class="archive-link">Explore the Archive</a>

</body>
</html>
