<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <title>Path of Aspiration</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
            font-family: 'Tahoma', sans-serif;
        }

        footer {
            position: absolute;
            bottom: 10px;
            right: 20px;
            font-size: 14px;
        }

        footer a {
            color: #1E90FF;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div id="canvasContainer"></div>
    <footer>
        <a href="https://www.beautyisapattern.com/archive" target="_blank">Explore the Archive</a>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let spirals = [];
        const numSpirals = 800;

        function setup() {
            let canvas = createCanvas(windowWidth, windowHeight);
            canvas.parent('canvasContainer');
            
            for (let i = 0; i < numSpirals; i++) {
                spirals.push(new Spiral(random(width), random(height), random(2, 5), random(TWO_PI)));
            }
        }

        function draw() {
            background('rgba(0,0,0,0.05)');
            spirals.forEach(spiral => {
                spiral.update();
                spiral.display();
            });
        }

        class Spiral {
            constructor(x, y, s, angle) {
                this.x = x;
                this.y = y;
                this.size = s;
                this.angle = angle;
                this.t = 0;
            }

            update() {
                this.t += 0.01;
                this.x += cos(this.angle + this.t) * this.size;
                this.y += sin(this.angle + this.t) * this.size;

                if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
                    this.x = random(width);
                    this.y = random(height);
                    this.t = 0;
                }
            }

            display() {
                noStroke();
                let r = map(sin(this.t), -1, 1, 100, 255);
                let g = map(cos(this.t), -1, 1, 100, 255);
                let b = map(this.x, 0, width, 128, 255);
                fill(r, g, b, 150);
                ellipse(this.x, this.y, this.size*20, this.size*20);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>

</html>
