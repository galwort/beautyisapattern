<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forging Paths Beyond</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #1e2022;
            color: #eee;
        }
        footer {
            position: absolute;
            bottom: 20px;
            text-align: center;
            color: #4ecca3;
        }
        a {
            color: #f6b93b;
            text-decoration: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let numParticles = 150;
        let particles = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < numParticles; i++) {
                particles.push(new Particle(random(width), random(height)));
            }
        }

        function draw() {
            background(30, 32, 34, 30);
            for (let particle of particles) {
                particle.update();
                particle.show();
            }
        }

        class Particle {
            constructor(x, y) {
                this.pos = createVector(x, y);
                this.vel = p5.Vector.random2D();
                this.vel.mult(random(2, 5));
                this.acc = createVector();
                this.maxSpeed = 5;
                this.rgb = [random(100, 255), random(100, 255), random(100, 255)];
                this.size = random(4, 8);
            }

            update() {
                this.vel.add(this.acc);
                this.vel.limit(this.maxSpeed);
                this.pos.add(this.vel);

                if (this.pos.x > width) this.pos.x = 0;
                if (this.pos.x < 0) this.pos.x = width;
                if (this.pos.y > height) this.pos.y = 0;
                if (this.pos.y < 0) this.pos.y = height;
            }

            show() {
                noStroke();
                fill(...this.rgb, 150);
                ellipse(this.pos.x, this.pos.y, this.size);
            }
        }
    </script>
</head>
<body>
    <footer>
        <a href="https://www.beautyisapattern.com/archive" target="_blank">Explore our universe</a>
    </footer>
</body>
</html>
