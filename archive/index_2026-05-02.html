<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celestial Reflections</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
        }
        #archive-link {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #fff;
            font-size: 0.9em;
            text-decoration: none;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 10px;
            border-radius: 5px;
            transition: transform 0.3s;
        }
        #archive-link:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>

    <script>
        let stars = [];
        const numStars = 800;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < numStars; i++) {
                stars[i] = new Star();
            }
        }

        function draw() {
            background(0, 15); // slight trail effect
            translate(width / 2, height / 2);

            for (let star of stars) {
                star.update();
                star.display();
            }
        }

        class Star {
            constructor() {
                this.reset();
                this.z = random(width);
                this.pz = this.z;
            }

            reset() {
                this.x = random(-width, width);
                this.y = random(-height, height);
                this.size = random(1, 3);
            }

            update() {
                this.z -= 5;
                if (this.z < 1) {
                    this.reset();
                    this.z = width;
                    this.pz = this.z;
                }
            }

            display() {
                fill(255);
                noStroke();
                const sx = map(this.x / this.z, 0, 1, 0, width);
                const sy = map(this.y / this.z, 0, 1, 0, height);

                const r = map(this.z, 0, width, this.size * 8, 0);
                ellipse(sx, sy, r, r);

                const px = map(this.x / this.pz, 0, 1, 0, width);
                const py = map(this.y / this.pz, 0, 1, 0, height);

                this.pz = this.z;

                stroke(255, 150);
                line(px, py, sx, sy);
            }
        }

        windowResized = function() {
            resizeCanvas(windowWidth, windowHeight);
            stars.forEach(star => star.reset());
        }
    </script>

    <a id="archive-link" href="https://www.beautyisapattern.com/archive" target="_blank">Explore the Archive</a>
</body>
</html>
