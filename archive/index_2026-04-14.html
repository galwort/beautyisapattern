<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silent Echoes</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
        .archive-link {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: white;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-size: 0.9em;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 5px 10px;
            border-radius: 5px;
        }
        a.archive-link:hover {
            background-color: rgba(0, 0, 0, 0.7);
        }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let circles = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            noStroke();
        }

        function draw() {
            background(30, 30, 60, 100);  // A muted, tranquil background

            // Draw and update circles
            circles.forEach(circle => {
                circle.update();
                circle.display();
            });

            // Remove faded out circles
            circles = circles.filter(circle => circle.opacity > 0);

            // Occasionally add a new circle
            if (random() < 0.02) {
                circles.push(new Circle(random(width), random(height)));
            }
        }

        class Circle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = random(30, 50);
                this.opacity = 200;
            }

            update() {
                this.size += 0.2;
                this.opacity -= 1;
            }

            display() {
                fill(200, 200, 255, this.opacity);
                ellipse(this.x, this.y, this.size);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
    <a class="archive-link" href="https://www.beautyisapattern.com/archive" target="_blank">View Archive</a>
</body>
</html>
