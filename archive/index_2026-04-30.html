<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmony Through Balance</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #e8f5e9;
        }
        
        a {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 14px;
            color: #333;
            text-decoration: none;
            background-color: rgba(255, 255, 255, 0.85);
            padding: 6px 12px;
            border-radius: 8px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
        }
        a:hover {
            background-color: rgba(200, 200, 200, 0.8);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
</head>
<body>

<script>
    let particles = [];

    function setup() {
        createCanvas(windowWidth, windowHeight);
        let n = 200;
        for(let i = 0; i < n; i++) {
            particles.push(new Particle(random(width), random(height)));
        }
    }

    function draw() {
        background(232, 245, 233, 100);
        noStroke();
        for(let p of particles) {
            let distanceFromCenter = dist(p.x, p.y, width/2, height/2);
            let colorIntensity = map(distanceFromCenter, 0, width/2, 255, 50);
            fill(155 - colorIntensity, colorIntensity, 100, 150);

            p.update();
            p.display();
        }
    }

    class Particle {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.angle = random(TWO_PI);
            this.radius = random(5, 15);
            this.speed = 0.5;
        }

        update() {
            this.angle += random(-0.05, 0.05);
            this.x += this.speed * cos(this.angle);
            this.y += this.speed * sin(this.angle);

            // Re-spawn at random when out of bounds, symbolizing misunderstandings reappearing
            if(this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
                this.x = random(width);
                this.y = random(height);
            }
        }

        display() {
            ellipse(this.x, this.y, this.radius * (1 - 0.9 * sin(frameCount * 0.01 + this.radius)),
                    this.radius * (1 - 0.9 * sin(frameCount * 0.01 + this.radius)));
        }
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
    }
</script>

</body>
</html>
