<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <title>Guiding Light and Celestial Stars</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle, #020020, #000000);
        }

        #archive-link {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #ffffff;
            text-decoration: none;
            font-family: Arial, sans-serif;
        }

        #archive-link:hover {
            text-decoration: underline;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.min.js"></script>
</head>
<body>
<a id="archive-link" href="https://www.beautyisapattern.com/archive">Explore Archive</a>

<script>
    let stars = [];
    let lightAngle = 0;

    function setup() {
        createCanvas(windowWidth, windowHeight);
        for (let i = 0; i < 300; i++) {
            stars.push(new Star(random(width), random(height), random(1, 3)));
        }
    }

    function draw() {
        background(0, 0, 0, 25);
        drawStars();
        drawMovingLight();
    }

    function drawStars() {
        for (let star of stars) {
            star.twinkle();
            star.show();
        }
    }

    function drawMovingLight() {
        let lightX = width / 2 + cos(lightAngle) * width * 0.5;
        let lightY = height / 2 + sin(lightAngle) * height * 0.5;
        lightAngle += 0.002;

        noStroke();
        fill(255, 204, 0, 80);
        ellipse(lightX, lightY, 400, 400);
    }

    class Star {
        constructor(x, y, radius) {
            this.x = x;
            this.y = y;
            this.radius = radius;
            this.baseColor = random(150, 255);
            this.twinkleAmount = 0;
            this.twinkleSpeed = random(0.002, 0.008);
        }

        twinkle() {
            this.twinkleAmount = this.baseColor + sin(millis() * this.twinkleSpeed) * 30;
        }

        show() {
            noStroke();
            fill(this.twinkleAmount);
            ellipse(this.x, this.y, this.radius);
        }
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
    }

</script>

</body>
</html>
