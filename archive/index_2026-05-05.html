<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathways & Possibilities</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
        body, html {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle, #282c34, #3e444d);
        }
        #archive { 
            position: absolute; 
            bottom: 10px; 
            right: 10px; 
            color: rgba(255,255,255,0.8); 
            font-family: Arial, sans-serif;
            text-decoration: none;
        }
        #archive:hover {
            color: white;
            text-shadow: 0 0 5px rgba(255,255,255,0.8);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let pathways = [];
        let maxPaths = 200;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            noFill();
            strokeWeight(2);
            for (let i = 0; i < maxPaths; i++) {
                pathways.push(new Path(random(width), random(height)));
            }
        }

        function draw() {
            background(0, 50);
            for (let path of pathways) {
                path.update();
                path.render();
            }
        }

        class Path {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.angle = random(TWO_PI);
                this.color = color(random(100, 255), random(100, 255), random(100, 255), 150);
            }

            update() {
                this.x += cos(this.angle) * 2;
                this.y += sin(this.angle) * 2;
                if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
                    this.angle = random(TWO_PI);
                }
            }

            render() {
                stroke(this.color);
                point(this.x, this.y);
            }
        }
    </script>
</head>
<body>
    <a href="https://www.beautyisapattern.com/archive" id="archive">Explore the Archive &rarr;</a>
</body>
</html>
