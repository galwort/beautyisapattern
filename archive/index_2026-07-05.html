<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journey to Becoming</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1e1e2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            display: block;
        }
        footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            text-align: center;
            background-color: rgba(30, 30, 46, 0.85);
            color: #fff;
            padding: 10px 0;
            font-family: 'Arial', sans-serif;
            font-size: 14px;
        }
        a {
            color: #9a6df1;
            text-decoration: none;
            border-bottom: 1px dotted #9a6df1;
            transition: color 0.3s ease;
        }
        a:hover {
            color: #b794f6;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let startAngle = 0;
        let angleVel = 0.1;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            noFill();
            stroke(255, 240);
        }

        function draw() {
            background(30, 30, 46, 25);
            let r = map(sin(startAngle), -1, 1, 100, 400);
            translate(width / 2, height / 2);
            beginShape();
            for (let a = 0; a < TWO_PI * 5; a += 0.1) {
                let x = r * cos(a) * cos(a / 10);
                let y = r * sin(a) * cos(a / 10);
                vertex(x, y);
            }
            endShape(CLOSE);
            startAngle += angleVel;
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</head>
<body>
    <footer>
        <a href="https://www.beautyisapattern.com/archive">Explore the Archive</a>
    </footer>
</body>
</html>
