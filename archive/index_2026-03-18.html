<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow of Time</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #061722;
            font-family: 'Arial', sans-serif;
        }
        .archive-link {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #ffffff;
            text-decoration: none;
            font-size: 0.8em;
            background-color: rgba(255, 255, 255, 0.2);
            padding: 5px 10px;
            border-radius: 5px;
        }
        .archive-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        function setup() {
            createCanvas(windowWidth, windowHeight);
        }

        function draw() {
            background(6, 23, 34);
            let waveHeight = height * 0.25;
            let waveSpeed = millis() * 0.001;

            noFill();
            strokeWeight(2);

            for (let i = 0; i < 5; i++) {
                let alpha = map(i, 0, 4, 50, 200);
                stroke(0, i * 50, 150, alpha);
                beginShape();

                for (let x = 0; x <= width; x += 20) {
                    let y = height * 0.5 + sin(x * 0.02 + waveSpeed + i) * waveHeight;
                    vertex(x, y);
                }

                endShape();
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
    <a class="archive-link" href="https://www.beautyisapattern.com/archive">Visit the Archive</a>
</body>
</html>
