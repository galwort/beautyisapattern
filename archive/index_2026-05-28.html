<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Essence of Happiness</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f7f9fc;
        }
        #footer {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-family: Arial, sans-serif;
            color: #444;
            background: rgba(255, 255, 255, 0.7);
            padding: 5px 10px;
            border-radius: 5px;
        }
        #footer a {
            color: #007acc;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        const particles = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            noStroke();
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle(random(width), random(height), randomColor()));
            }
        }

        function draw() {
            background(247, 249, 252, 25);
            for (let particle of particles) {
                particle.move();
                particle.display();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.size = random(5, 10);
                this.speed = createVector(random(-1, 1), random(-1, 1));
                this.color = color;
                this.angle = random(TWO_PI);
            }

            move() {
                this.angle += 0.01;
                let direction = createVector(sin(this.angle) * 2, cos(this.angle) * 2);
                this.x += direction.x + this.speed.x;
                this.y += direction.y + this.speed.y;

                if (this.x > width || this.x < 0) this.speed.x *= -1;
                if (this.y > height || this.y < 0) this.speed.y *= -1;
            }

            display() {
                fill(...this.color, 150);
                ellipse(this.x, this.y, this.size);
            }
        }

        function randomColor() {
            const colors = [[255, 107, 129], [102, 166, 215], [131, 223, 117]];
            return random(colors);
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
    <div id="footer">
        Visit our <a href="https://www.beautyisapattern.com/archive" target="_blank">Archive</a>
    </div>
</body>
</html>
