<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Shared Joy and Divided Burdens</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(154deg, #fffafa, #e0f7fa);
        }
        .archive-link {
            position: absolute;
            bottom: 15px;
            right: 20px;
            color: #006699;
            text-decoration: none;
            font-family: 'Verdana', sans-serif;
            font-size: 14px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
</head>
<body>
    <script>
        let particles = [];
        const numParticles = 200;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < numParticles; i++) {
                let size = random(5, 20);
                particles.push(new Particle(random(width), random(height), size));
            }
        }

        function draw() {
            background(255, 250, 250);
            for (let particle of particles) {
                particle.move();
                particle.connect(particles);
                particle.display();
            }
        }

        class Particle {
            constructor(x, y, size) {
                this.position = createVector(x, y);
                this.velocity = createVector(random(-2, 2), random(-1, 1));
                this.size = size;
                this.color = color(random(50, 255), random(150, 255), random(150, 255));
            }

            move() {
                this.position.add(this.velocity);
                if (this.position.x < 0 || this.position.x > width) this.velocity.x *= -1;
                if (this.position.y < 0 || this.position.y > height) this.velocity.y *= -1;
            }

            connect(others) {
                for (let other of others) {
                    if (this !== other) {
                        let distance = dist(this.position.x, this.position.y, other.position.x, other.position.y);
                        if (distance < 150) {
                            stroke(200, 200, 250, 50);
                            line(this.position.x, this.position.y, other.position.x, other.position.y);
                        }
                    }
                }
            }

            display() {
                noStroke();
                fill(this.color);
                ellipse(this.position.x, this.position.y, this.size);
            }
        }
    </script>
    
    <a class="archive-link" href="https://www.beautyisapattern.com/archive" target="_blank">Visit the Archive</a>
</body>
</html>
