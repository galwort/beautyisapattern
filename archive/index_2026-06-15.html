<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <title>Path to Triumph</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            min-height: 100vh;
        }

        .archive-link {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #fff;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-size: 14px;
        }

        .archive-link:hover {
            text-decoration: underline;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let particles = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle(random(width), random(height)));
            }
        }

        function draw() {
            background(0);
            for (let particle of particles) {
                particle.update();
                particle.display();
            }
        }

        class Particle {
            constructor(x, y) {
                this.pos = createVector(x, y);
                this.vel = createVector(random(-2, 2), random(-2, 2));
                this.acc = createVector(0, random(0.05, 0.1));
                this.size = random(2, 4);
            }

            update() {
                this.vel.add(this.acc);
                this.pos.add(this.vel);
                if (this.pos.y > height) {
                    this.pos.y = 0;
                    this.pos.x = random(width);
                    this.vel = createVector(random(-2, 2), random(-1, 0));
                }
            }

            display() {
                noStroke();
                fill(255, 150);
                ellipse(this.pos.x, this.pos.y, this.size);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</head>

<body>
    <a class="archive-link" href="https://www.beautyisapattern.com/archive" target="_blank">Visit Archive</a>
</body>

</html>
