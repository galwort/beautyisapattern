<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Uncomfortable Art of Growth</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle, #e0eafc, #cfdef3);
        }
        a {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #444;
            text-decoration: none;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            opacity: 0.8;
            transition: opacity 0.3s;
        }
        a:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let particles = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            noStroke();
            // Initialize particles
            for (let i = 0; i < 150; i++) {
                particles.push(new Particle(random(width), random(height)));
            }
        }

        function draw() {
            background(224, 234, 252, 30);
            particles.forEach(particle => {
                particle.update();
                particle.display();
            });
            translate(width/2, height/2);
            let angle = radians(frameCount % 360);
            let radius = 100 + 80 * sin(frameCount * 0.02);
            fill(90, 50, 180, 150);
            ellipse(radius * cos(angle), radius * sin(angle), 200);
        }

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.diameter = random(5, 15);
                this.speed = random(1, 3);
                this.angle = random(TWO_PI);
            }

            update() {
                this.x += this.speed * cos(this.angle);
                this.y += this.speed * sin(this.angle);
                this.x = (this.x + width) % width;
                this.y = (this.y + height) % height;
                this.angle += random(-0.05, 0.05);
            }

            display() {
                fill(255, 180, 180, 150);
                ellipse(this.x, this.y, this.diameter);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
    <a href="https://www.beautyisapattern.com/archive" target="_blank">Explore the Archive</a>
</body>
</html>
