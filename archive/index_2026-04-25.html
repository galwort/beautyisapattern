<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <title>The Rhythm of Success</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #2f2e41;
            font-family: 'Courier New', Courier, monospace;
        }
        .footer {
            position: absolute;
            bottom: 5%;
            right: 5%;
            color: #ffffff;
            font-size: 1em;
            letter-spacing: 1px;
        }
        a {
            color: #2299ff;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-bottom 0.3s;
        }
        a:hover {
            border-bottom: 1px solid #2299ff;
        }
    </style>
</head>
<body>
    <div class="footer">
        <a href="https://www.beautyisapattern.com/archive">Explore the Archive</a>
    </div>
    <script>
        let angle = 0;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            noFill();
            strokeWeight(2);
        }

        function draw() {
            background(47, 46, 65, 50);
            translate(width / 2, height / 2);

            let layers = 10;
            let span = map(sin(angle), -1, 1, 50, 200);

            for (let i = 0; i < layers; i++) {
                let radius = i * span;
                stroke(255, 204, map(i, 0, layers, 100, 255), 180);
                ellipse(0, 0, radius*2 , radius*2 );
                rotate(PI / layers + angle * 0.02);
            }

            angle += 0.01;
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
