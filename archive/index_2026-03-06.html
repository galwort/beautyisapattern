<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unveiling Strength</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #152238;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        a {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: #aac4e7;
            text-decoration: none;
            font-size: 14px;
        }
        #canvas-container {
            border: 2px solid #ffffff55;
            box-shadow: 0px 0px 15px 5px #ffffff22;
        }
    </style>
</head>
<body>

<div id="canvas-container"></div>
<a href="https://www.beautyisapattern.com/archive" target="_blank">Visit Our Archive</a>

<script>
    let cols, rows;
    let scl = 20;
    let w = 1400;
    let h = 800;
    let terrain = [];
    let flying = 0;

    function setup() {
        let container = createCanvas(w, h, WEBGL);
        container.parent('canvas-container');
        cols = w / scl;
        rows = h / scl;
        for (let x = 0; x < cols; x++) {
            terrain[x] = [];
        }
    }

    function draw() {
        flying -= 0.05;
        let yoff = flying;
        for (let y = 0; y < rows; y++) {
            let xoff = 0;
            for (let x = 0; x < cols; x++) {
                terrain[x][y] = map(noise(xoff, yoff), 0, 1, -100, 100);
                xoff += 0.2;
            }
            yoff += 0.2;
        }
        
        background(21, 34, 56);
        translate(0, 50);
        rotateX(PI / 3);
        fill(200, 200, 250, 50);
        stroke(255);
        translate(-w / 2, -h / 2);

        for (let y = 0; y < rows - 1; y++) {
            beginShape(TRIANGLE_STRIP);
            for (let x = 0; x < cols; x++) {
                vertex(x * scl, y * scl, terrain[x][y]);
                vertex(x * scl, (y + 1) * scl, terrain[x][y + 1]);
            }
            endShape();
        }
    }

    function windowResized() {
        let container = select('#canvas-container');
        resizeCanvas(container.width, container.height);
    }
</script>

</body>
</html>
