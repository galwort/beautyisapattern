<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Symphony of Kindness</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0c0f16;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .archive-link {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #d1d1d1;
            font-size: 14px;
        }
        .archive-link a {
            color: #7ad84e;
            text-decoration: none;
            transition: color 0.3s;
        }
        .archive-link a:hover {
            color: #b1e386;
        }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let shapes = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < 100; i++) {
                shapes.push(new KindnessParticle(random(width), random(height)));
            }
        }

        function draw() {
            background('#0c0f16');
            shapes.forEach(p => {
                p.update();
                p.display();
            });
        }

        class KindnessParticle {
            constructor(x, y) {
                this.pos = createVector(x, y);
                this.vel = p5.Vector.random2D();
                this.acc = createVector();
                this.maxSpeed = 2;

                this.hue = random(200, 330);
                this.sat = 100;
                this.bri = random(70, 150);

                this.size = random(5, 20);
            }

            update() {
                this.vel.add(this.acc);
                this.vel.limit(this.maxSpeed);
                this.pos.add(this.vel);
                this.acc.mult(0);

                this.edges();
            }

            edges() {
                if (this.pos.x > width) this.pos.x = 0;
                if (this.pos.x < 0) this.pos.x = width;
                if (this.pos.y > height) this.pos.y = 0;
                if (this.pos.y < 0) this.pos.y = height;
            }

            display() {
                push();
                colorMode(HSB);
                stroke(this.hue, this.sat, this.bri);
                fill(this.hue, this.sat, this.bri, this.size);
                ellipse(this.pos.x, this.pos.y, this.size);
                pop();
            }
        }
    </script>
    <div class="archive-link">
        <a href="https://www.beautyisapattern.com/archive" target="_blank">Explore the Archive</a>
    </div>
</body>
</html>
