<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imprints of Joy</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f5f5dc;
      }
      .archive-link {
        position: absolute;
        bottom: 10px;
        right: 10px;
        color: #555;
        text-decoration: none;
        font-size: 14px;
      }
      .archive-link:hover {
        text-decoration: underline;
      }
    </style>
</head>
<body>

<script>
    let wrinkles = [];
    function setup() {
        createCanvas(windowWidth, windowHeight);
        stroke(139, 69, 19, 180);
        noFill();

        for (let i = 0; i < 50; i++) {
            wrinkles.push(new Wrinkle(random(width), random(height)));
        }
    }

    function draw() {
        background(245, 245, 220);
        for (let w of wrinkles) {
            w.display();
            w.update();
        }
    }

    class Wrinkle {
        constructor(x, y) {
            this.pos = createVector(x, y);
            this.t = random(TWO_PI);
            this.offset = random(TWO_PI);
            this.size = random(30, 100);
        }

        update() {
            this.t += 0.01;
        }

        display() {
            beginShape();
            for (let angle = 0; angle < TWO_PI; angle += TWO_PI / 36) {
                let control = map(sin(this.t + angle * 5 + this.offset), -1, 1, 0, 20);
                let x = this.pos.x + cos(angle) * (this.size + control);
                let y = this.pos.y + sin(angle) * (this.size + control);
                curveVertex(x, y);
            }
            endShape(CLOSE);
        }
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
    }
</script>

<a href="https://www.beautyisapattern.com/archive" class="archive-link">Explore the Archive</a>

</body>
</html>
