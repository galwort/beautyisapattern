<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choices in Motion</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico">
    <style>
        body, html {
            margin: 0;
            overflow: hidden;
            background-color: #0d0d0d;
            color: white;
        }
        .archive-link {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: white;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-size: 12px;
            opacity: 0.6;
        }
        .archive-link:hover {
            opacity: 1;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let pointCount = 100;
        let points = [];
        let maxSpeed = 2;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < pointCount; i++) {
                points[i] = createVector(random(width), random(height));
            }
            noStroke();
        }

        function draw() {
            background(13, 13, 13, 25);
            fill(255);
            for (let i = 0; i < points.length; i++) {
                points[i].x += random(-maxSpeed, maxSpeed);
                points[i].y += random(-maxSpeed, maxSpeed);

                if (points[i].x > width) points[i].x = 0;
                if (points[i].x < 0) points[i].x = width;
                if (points[i].y > height) points[i].y = 0;
                if (points[i].y < 0) points[i].y = height;

                circle(points[i].x, points[i].y, 3);
            }

            // Draw connecting lines
            for (let i = 0; i < points.length; i++) {
                for (let j = i+1; j < points.length; j++) {
                    let distance = dist(points[i].x, points[i].y, points[j].x, points[j].y);
                    if (distance < 100) {
                        stroke(255, (100-distance));
                        line(points[i].x, points[i].y, points[j].x, points[j].y);
                    }
                }
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</head>
<body>
    <a href="https://www.beautyisapattern.com/archive" class="archive-link" target="_blank">Visit the Archive</a>
</body>
</html>
