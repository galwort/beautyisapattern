<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dance of Silence</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1b1b1f;
            color: #ffffff;
        }
        .archive-link {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #ffffff;
            font-family: 'Helvetica Neue', sans-serif;
            font-size: 14px;
            text-decoration: none;
            background-color: rgba(0,0,0,0.6);
            padding: 10px 15px;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        .archive-link:hover {
            background-color: rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        const bubbles = [];
        const numBubbles = 40;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < numBubbles; i++) {
                bubbles.push(new Bubble(random(width), random(height), random(20, 80)));
            }
        }

        function draw() {
            background(27, 27, 31, 150);
            for (const bubble of bubbles) {
                bubble.update();
                bubble.display();
            }
        }

        class Bubble {
            constructor(x, y, size) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.angle = random(TWO_PI);
                this.velocity = random(0.5, 2);
                this.color = color(random(100, 255), random(100, 255), random(100, 255), 100);
            }

            update() {
                this.x += this.velocity * cos(this.angle);
                this.y += this.velocity * sin(this.angle);

                if (this.x < 0 || this.x > width) {
                    this.angle = PI - this.angle;
                }
                if (this.y < 0 || this.y > height) {
                    this.angle = TWO_PI - this.angle;
                }

                // Gradually change size for dynamic effect
                this.size += 0.3 * sin(frameCount / 50);
            }

            display() {
                noStroke();
                fill(this.color);
                ellipse(this.x, this.y, this.size);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
    <a class="archive-link" href="https://www.beautyisapattern.com/archive">Explore the Archive</a>
</body>
</html>
