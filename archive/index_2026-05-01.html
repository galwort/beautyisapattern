<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Harmony of Similarity</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
        body, html {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        a {
            position: absolute;
            bottom: 10px;
            right: 10px;
            color: white;
            text-decoration: none;
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 10px;
            border-radius: 5px;
            box-shadow: 1px 1px 5px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.min.js"></script>
<script>
    let circles = [];

    function setup() {
        createCanvas(windowWidth, windowHeight);
        for (let i = 0; i < 50; i++) {
            circles.push(new Circle(random(width), random(height)));
        }
    }

    function draw() {
        background(20, 20, 70);
        for (let c of circles) {
            c.connect(circles);
            c.move();
            c.display();
        }
    }

    class Circle {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.dia = random(6, 12);
            this.xSpeed = random(-1, 1);
            this.ySpeed = random(-1, 1);
            this.color = color(255, 204, 0, 150);
        }

        move() {
            this.x += this.xSpeed;
            this.y += this.ySpeed;

            if (this.x > width || this.x < 0) {
                this.xSpeed *= -1;
            }

            if (this.y > height || this.y < 0) {
                this.ySpeed *= -1;
            }
        }

        connect(otherCircles) {
            for (let other of otherCircles) {
                if (other !== this) {
                    let d = dist(this.x, this.y, other.x, other.y);
                    if (d < 100) {
                        stroke(255, 102);
                        line(this.x, this.y, other.x, other.y);
                    }
                }
            }
        }

        display() {
            noStroke();
            fill(this.color);
            ellipse(this.x, this.y, this.dia);
        }
    }
</script>

</body>
</html>
