<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Will to Triumph</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
        }
        a {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: #fff;
            text-decoration: none;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 8px 12px;
            border-radius: 5px;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let petals = [];
        const centerX = 0.5;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            frameRate(30);
            angleMode(DEGREES);
            for (let i = 0; i < 100; i++) {
                petals.push(new Petal(random(width), random(height)));
            }
        }

        function draw() {
            background(0);
            const time = millis() / 1000;
            translate(width * centerX, height / 2);
            petals.forEach(petal => {
                petal.update(time);
                petal.show();
            });
        }

        class Petal {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.offsetAngle = random(360);
                this.radius = random(50, 150);
                this.color = color(random(155, 255), random(100, 200), random(50, 150), 100);
            }

            update(time) {
                this.angle = time * 360 + this.offsetAngle;
                this.size = this.radius + 20 * sin(time * 0.5);
            }

            show() {
                push();
                rotate(this.angle);
                fill(this.color);
                noStroke();
                ellipse(0, this.size, 20, 60);
                pop();
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
    <a href="https://www.beautyisapattern.com/archive" target="_blank" rel="noopener noreferrer">Explore the Archive</a>
</body>
</html>
