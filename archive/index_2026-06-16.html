<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moments from Triumph</title>
    <link rel="icon" href="https://www.beautyisapattern.com/favicon.ico" type="image/x-icon">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #2d2d2d;
        }

        footer {
            position: fixed;
            bottom: 10px;
            right: 10px;
        }

        footer a {
            text-decoration: none;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }

        footer a:hover {
            opacity: 1;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
</head>
<body>
    <script>
        let waves = [];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for (let i = 0; i < 50; i++) {
                waves.push(new WaveLine(random(height), random(0.1, 1.5)));
            }
        }

        function draw() {
            background(45);
            for (let wave of waves) {
                wave.update();
                wave.show();
            }
        }

        class WaveLine {
            constructor(y, speed) {
                this.yOffset = y;
                this.speed = speed;
                this.amplitude = random(20, 80);
                this.freq = random(0.01, 0.05);
                this.color = color(random(100, 255), random(50, 150), random(150, 255), 150);
            }

            update() {
                this.yOffset += this.speed;
                if (this.yOffset > height) {
                    this.yOffset = 0;
                }
            }

            show() {
                stroke(this.color);
                strokeWeight(2.5);
                noFill();
                beginShape();
                for (let x = 0; x < width; x += 10) {
                    let y = map(sin((x * this.freq) + this.yOffset), -1, 1, -this.amplitude, this.amplitude);
                    vertex(x, this.yOffset + y);
                }
                endShape();
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
    <footer>
        <a href="https://www.beautyisapattern.com/archive">Explore the Archive</a>
    </footer>
</body>
</html>
